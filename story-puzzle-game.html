<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Story Puzzle Game</title>
    <style>
        :root {
            --paper: #fff8ef;
            --paper-shadow: rgba(87, 73, 45, 0.14);
            --line: rgba(210, 167, 113, 0.2);
            --ink: #33415c;
            --ink-soft: rgba(51, 65, 92, 0.72);
            --blue: #4d8cf7;
            --teal: #2fa7a0;
            --orange: #f59f44;
            --pink: #eb6f92;
            --purple: #7a67d8;
            --green: #3aa76d;
            --green-soft: #ecfff3;
            --slot: #fffdfa;
            --slot-border: #b8cfee;
            --panel: rgba(255, 255, 255, 0.82);
            --panel-border: rgba(163, 134, 92, 0.12);
            --shadow: rgba(81, 73, 60, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 18%, rgba(245, 168, 96, 0.2), transparent 26%),
                radial-gradient(circle at 82% 14%, rgba(115, 170, 255, 0.16), transparent 24%),
                radial-gradient(circle at 78% 82%, rgba(235, 111, 146, 0.14), transparent 28%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 246, 235, 0.98)),
                repeating-linear-gradient(
                    180deg,
                    transparent 0 38px,
                    var(--line) 38px 40px
                ),
                var(--paper);
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::before {
            background:
                linear-gradient(90deg, rgba(244, 149, 94, 0.18) 0 6px, transparent 6px),
                linear-gradient(180deg, rgba(255,255,255,0.38), transparent 20%);
            background-size: 100% 100%, 100% 100%;
            opacity: 0.55;
        }

        body::after {
            background:
                radial-gradient(circle at center, transparent 62%, rgba(46, 58, 96, 0.06) 100%),
                repeating-linear-gradient(
                    45deg,
                    rgba(255,255,255,0.05) 0 2px,
                    transparent 2px 6px
                );
            opacity: 0.7;
        }

        .app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            min-height: 100dvh;
            max-width: 1400px;
            margin: 0 auto;
            padding: 22px 18px 28px;
            display: flex;
        }

        .paper-board {
            position: relative;
            flex: 1;
            min-height: calc(100dvh - 50px);
            padding: clamp(18px, 4vw, 38px);
            background: rgba(255, 252, 247, 0.72);
            border: 1px solid rgba(197, 161, 116, 0.18);
            border-radius: 30px;
            box-shadow: 0 24px 48px var(--paper-shadow);
            overflow: hidden;
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 22px;
            align-items: stretch;
        }

        .paper-board::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.58), transparent 42%),
                radial-gradient(circle at 14% 18%, rgba(98, 178, 248, 0.08), transparent 20%),
                radial-gradient(circle at 86% 80%, rgba(245, 159, 68, 0.08), transparent 24%);
            pointer-events: none;
        }

        .story-card {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            grid-template-rows: minmax(0, 1fr) auto;
            gap: 24px;
            align-items: stretch;
            min-height: 100%;
        }

        .story-panel,
        .word-panel {
            background: var(--panel);
            border-radius: 28px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 14px 30px rgba(82, 67, 44, 0.09);
            padding: clamp(18px, 3vw, 30px);
        }

        .story-panel {
            min-height: 0;
            display: flex;
            align-items: center;
        }

        .story-stage {
            width: 100%;
            display: grid;
            gap: 20px;
        }

        .story-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(180, 149, 110, 0.18);
        }

        .story-title {
            font-size: clamp(1rem, 1.8vw, 1.35rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--ink-soft);
        }

        .level-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(77, 140, 247, 0.12);
            border: 2px solid rgba(77, 140, 247, 0.18);
            color: var(--blue);
            font-size: 1rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .story-hint-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
        }

        .story-hint,
        .progress-pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.95rem;
            font-weight: 800;
        }

        .story-hint {
            background: rgba(245, 159, 68, 0.12);
            color: #9a6223;
        }

        .progress-pill {
            background: rgba(47, 167, 160, 0.12);
            color: #247e79;
        }

        .story-text {
            font-size: clamp(2rem, 4.2vw, 3.6rem);
            line-height: 1.45;
            font-weight: 800;
            color: var(--ink);
        }

        .story-text .chunk {
            white-space: pre-wrap;
        }

        .story-text .story-word {
            display: inline;
            font: inherit;
            font-weight: 900;
            -webkit-text-stroke: 2px currentColor;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .story-text .blank,
        .word-tile {
            appearance: none;
            -webkit-appearance: none;
            font-family: inherit;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
        }

        .story-text .blank {
            min-width: 1.9em;
            margin: 0 0.12em;
            padding: 0.05em 0.26em 0.08em;
            border: 4px dashed var(--slot-border);
            background: var(--slot);
            font-size: 1em;
            line-height: inherit;
            -webkit-text-stroke: 2px currentColor;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            vertical-align: baseline;
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .story-text .blank.outlined-blue,
        .word-tile.outlined-blue {
            color: #4f95ff;
        }

        .story-text .blank.outlined-orange,
        .word-tile.outlined-orange {
            color: #ff9d3e;
        }

        .story-text .blank.outlined-teal,
        .word-tile.outlined-teal {
            color: #26b8ba;
        }

        .story-text .blank.outlined-pink,
        .word-tile.outlined-pink {
            color: #ff5b95;
        }

        .story-text .blank.outlined-purple,
        .word-tile.outlined-purple {
            color: #8660f0;
        }

        .story-text .blank.active {
            transform: scale(1.04);
            box-shadow: 0 0 0 8px rgba(77, 140, 247, 0.14);
            border-style: solid;
        }

        .story-text .blank.correct {
            background: var(--green-soft);
            border-color: var(--green);
            border-style: solid;
            color: var(--green);
            -webkit-text-stroke: 0;
            -webkit-text-fill-color: currentColor;
            box-shadow: 0 10px 18px rgba(56, 184, 108, 0.18);
        }

        .story-text .blank.hint-hidden {
            color: transparent;
            -webkit-text-stroke: 0;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .story-text .blank.wrong {
            background: rgba(255, 94, 120, 0.08);
            border-color: #ff6b8b;
            border-style: solid;
            animation: shake 0.36s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-7px); }
            75% { transform: translateX(7px); }
        }

        .word-panel {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 14px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 249, 242, 0.94));
        }

        .word-bank {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            align-content: flex-start;
            gap: 18px;
            min-height: var(--word-bank-height, 0px);
        }

        .word-tile {
            min-width: 108px;
            min-height: 68px;
            padding: 12px 20px;
            border: 4px solid currentColor;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 12px 20px var(--shadow);
            font-size: clamp(2rem, 3vw, 3rem);
            line-height: 1;
            cursor: grab;
            touch-action: none;
            -webkit-text-stroke: 0;
            -webkit-text-fill-color: currentColor;
        }

        .word-tile:nth-child(3n + 1) { transform: rotate(-4deg); }
        .word-tile:nth-child(3n + 2) { transform: rotate(3deg); }
        .word-tile:nth-child(3n + 3) { transform: rotate(-2deg); }

        .word-tile:hover,
        .word-tile.selected {
            box-shadow: 0 16px 28px rgba(44, 60, 110, 0.2);
            transform: translateY(-4px) scale(1.04);
        }

        .word-tile.dragging {
            opacity: 0.45;
            cursor: grabbing;
        }

        .word-tile.used {
            display: none;
        }

        .next-button {
            appearance: none;
            -webkit-appearance: none;
            min-width: 108px;
            min-height: 68px;
            padding: 12px 20px;
            border: 4px solid #3978dc;
            border-radius: 18px;
            background: linear-gradient(180deg, #5e9bff, #3978dc);
            color: #fff;
            font: inherit;
            font-size: clamp(1.15rem, 2vw, 1.45rem);
            font-weight: 900;
            line-height: 1;
            box-shadow: 0 12px 20px rgba(77, 140, 247, 0.24);
            cursor: pointer;
            align-self: end;
            white-space: nowrap;
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

        .next-button:hover,
        .next-button:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 16px 26px rgba(61, 139, 253, 0.28);
        }

        .next-button:active {
            transform: translateY(0);
        }

        .next-button:disabled {
            background: linear-gradient(180deg, #c9d8ee, #b9c7dc);
            border-color: #b9c7dc;
            box-shadow: none;
            color: rgba(43, 70, 115, 0.65);
            cursor: not-allowed;
            transform: none;
        }

        .celebration {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            z-index: 10;
            padding: 18px;
        }

        .celebration.active {
            animation: fadeCelebrate 1.15s ease;
        }

        .celebration-message {
            min-width: min(520px, 100%);
            padding: 22px 26px;
            border-radius: 28px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,249,242,0.95));
            color: var(--ink);
            border: 1px solid rgba(175, 150, 112, 0.18);
            box-shadow: 0 22px 40px rgba(76, 85, 59, 0.16);
            text-align: center;
        }

        .celebration-title {
            display: block;
            color: var(--green);
            font-size: clamp(1.7rem, 4vw, 2.85rem);
            font-weight: 900;
            line-height: 1.05;
        }

        .celebration-detail {
            display: block;
            margin-top: 10px;
            color: var(--ink-soft);
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 800;
        }

        @keyframes fadeCelebrate {
            0% { opacity: 0; transform: scale(0.7); }
            35% { opacity: 1; transform: scale(1.04); }
            100% { opacity: 0; transform: scale(1.15); }
        }

        .confetti {
            position: fixed;
            top: -8vh;
            width: 14px;
            height: 22px;
            border-radius: 6px;
            pointer-events: none;
            z-index: 9;
            animation: confetti-fall 1.35s linear forwards;
        }

        @keyframes confetti-fall {
            from {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            to {
                transform: translateY(112vh) rotate(540deg);
                opacity: 0;
            }
        }

        .drag-clone {
            position: fixed;
            left: 0;
            top: 0;
            pointer-events: none;
            z-index: 30;
            margin: 0;
            will-change: left, top, transform;
        }

        @media (max-width: 980px) {
            .story-panel {
                min-height: 280px;
            }
        }

        @media (max-width: 700px) {
            .app {
                padding: 14px 10px 20px;
            }

            .paper-board {
                min-height: calc(100dvh - 34px);
            }

            .story-hint-row {
                align-items: stretch;
            }

            .story-text {
                font-size: clamp(1.55rem, 7vw, 2.2rem);
            }

            .word-tile {
                min-width: 86px;
                min-height: 56px;
                font-size: clamp(1.4rem, 7vw, 2rem);
                -webkit-text-fill-color: currentColor;
            }

            .next-button {
                min-width: 86px;
                min-height: 56px;
                padding: 10px 14px;
                font-size: 1rem;
            }
        }
    </style>
</head>

                    ". They look at the ",
                    { answer: "pictures", style: "outlined-orange" },
                    "."
                ]
            },
            {
                level: 12,
                hiddenCount: 3,
                title: "Bike Ride",
                parts: [
                    "The family rides ",
                    { answer: "bikes", style: "outlined-orange" },
                    " on the ",
                    { answer: "path", style: "outlined-teal" },
                    ". They stop by a big ",
                    { answer: "tree", style: "outlined-blue" },
                    "."
                ]
            }
        ];

        const GENERATED_WORD_STYLES = [
            "outlined-blue",
            "outlined-orange",
            "outlined-teal",
            "outlined-pink",
            "outlined-purple"
        ];

        const NON_CANDIDATE_WORDS = new Set([
            "a", "an", "and", "are", "as", "at", "be", "before", "behind", "by", "for",
            "from", "he", "her", "his", "i", "in", "into", "is", "it", "its", "later",
            "my", "near", "now", "of", "on", "out", "she", "than", "that", "the", "their",
            "them", "then", "there", "they", "this", "to", "together", "up", "while", "with"
        ]);

        const CELEBRATION_LINES = [
            { title: "Great job!", detail: "You solved this story." },
            { title: "Nice work!", detail: "Every missing word is in the right place." },
            { title: "You did it!", detail: "That story is complete and ready for the next one." },
            { title: "Excellent reading!", detail: "You matched every word correctly." },
            { title: "Brilliant!", detail: "The whole story makes sense now." }
        ];

        class StoryPuzzleGame {
            constructor(stories) {
                this.stories = this.shuffle(stories);
                this.storyIndex = 0;
                this.selectedTileId = null;
                this.dragState = null;

                this.storyText = document.getElementById("storyText");
                this.storyTitle = document.getElementById("storyTitle");
                this.levelBadge = document.getElementById("levelBadge");
                this.storyHint = document.getElementById("storyHint");
                this.progressPill = document.getElementById("progressPill");
                this.wordBank = document.getElementById("wordBank");
                this.celebration = document.getElementById("celebration");
                this.celebrationTitle = document.getElementById("celebrationTitle");
                this.celebrationDetail = document.getElementById("celebrationDetail");
                this.nextButton = document.getElementById("nextButton");
                this.wordBankHeight = 0;
                this.completedStories = 0;
                this.puzzleSolved = false;
                this.boundPointerMove = (moveEvent) => this.handlePointerMove(moveEvent);
                this.boundPointerUp = (upEvent) => this.handlePointerUp(upEvent);

                this.nextButton.addEventListener("click", () => this.nextStory());

                this.renderStory();
            }

            shuffle(items) {
                const copy = items.slice();
                for (let i = copy.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [copy[i], copy[j]] = [copy[j], copy[i]];
                }
                return copy;
            }

            get currentStory() {
                return this.stories[this.storyIndex];
            }

            get currentLevel() {
                return this.currentStory.level;
            }

            getGeneratedWordStyle(seed) {
                return GENERATED_WORD_STYLES[seed % GENERATED_WORD_STYLES.length];
            }

            isGeneratedCandidate(word, previousWord, nextWord) {
                const lowerWord = word.toLowerCase();
                const lowerPrevious = previousWord ? previousWord.toLowerCase() : "";
                const lowerNext = nextWord ? nextWord.toLowerCase() : "";

                if (word !== lowerWord || NON_CANDIDATE_WORDS.has(lowerWord)) {
                    return false;
                }

                if (!/^[a-z]+(?:'[a-z]+)?$/.test(lowerWord)) {
                    return false;
                }

                if (lowerWord.length < 4 && !["one", "two", "three", "four", "five", "half"].includes(lowerWord)) {
                    return false;
                }

                if (["the", "a", "an", "my", "his", "her", "their", "our"].includes(lowerPrevious)) {
                    return true;
                }

                if (["is", "are", "was", "were", "looks", "sounds", "feels"].includes(lowerNext)) {
                    return true;
                }

                return lowerWord.length >= 5;
            }

            scoreCandidate(candidate) {
                const lowerWord = candidate.answer.toLowerCase();
                const previousWord = candidate.previousWord ? candidate.previousWord.toLowerCase() : "";
                let score = candidate.source === "authored" ? 6 : 2;

                if (["the", "a", "an", "my", "his", "her", "their", "our"].includes(previousWord)) {
                    score += 2;
                }

                if (lowerWord.length >= 6) {
                    score += 1;
                }

                if (["one", "two", "three", "four", "five", "half"].includes(lowerWord)) {
                    score -= 1;
                }

                return score;
            }

            buildStoryCandidates(story) {
                const units = [];
                const wordPattern = /([A-Za-z]+(?:'[A-Za-z]+)?)/g;

                story.parts.forEach((part, partIndex) => {
                    if (typeof part !== "string") {
                        units.push({
                            type: "candidate",
                            key: `authored-${partIndex}`,
                            answer: part.answer,
                            style: part.style,
                            source: "authored",
                            previousWord: "",
                            nextWord: ""
                        });
                        return;
                    }

                    const matches = Array.from(part.matchAll(wordPattern));
                    if (!matches.length) {
                        units.push({ type: "text", text: part });
                        return;
                    }

                    let lastIndex = 0;
                    matches.forEach((match, matchIndex) => {
                        const [word] = match;
                        const wordIndex = match.index ?? 0;

                        if (wordIndex > lastIndex) {
                            units.push({ type: "text", text: part.slice(lastIndex, wordIndex) });
                        }

                        const previousWord = matches[matchIndex - 1]?.[0] ?? "";
                        const nextWord = matches[matchIndex + 1]?.[0] ?? "";
                        if (this.isGeneratedCandidate(word, previousWord, nextWord)) {
                            units.push({
                                type: "candidate",
                                key: `generated-${partIndex}-${wordIndex}`,
                                answer: word,
                                style: this.getGeneratedWordStyle(partIndex + matchIndex),
                                source: "generated",
                                previousWord,
                                nextWord
                            });
                        } else {
                            units.push({ type: "text", text: word });
                        }

                        lastIndex = wordIndex + word.length;
                    });

                    if (lastIndex < part.length) {
                        units.push({ type: "text", text: part.slice(lastIndex) });
                    }
                });

                return units;
            }

            pickPuzzleWords(candidates, hiddenCount) {
                const count = Math.min(candidates.length, Math.max(1, hiddenCount));
                const weighted = candidates
                    .map((candidate) => ({
                        ...candidate,
                        random: Math.random(),
                        score: this.scoreCandidate(candidate)
                    }))
                    .sort((left, right) => {
                        if (right.score !== left.score) {
                            return right.score - left.score;
                        }

                        return left.random - right.random;
                    });

                const shortlistSize = Math.min(weighted.length, Math.max(count + 2, count));
                const shortlist = this.shuffle(weighted.slice(0, shortlistSize));
                return new Set(shortlist.slice(0, count).map((candidate) => candidate.key));
            }

            prepareStoryRound(story) {
                const units = this.buildStoryCandidates(story);
                const candidates = units.filter((unit) => unit.type === "candidate");
                const selectedKeys = this.pickPuzzleWords(candidates, story.hiddenCount ?? candidates.length);
                let blankIndex = 0;

                const renderUnits = units.map((unit) => {
                    if (unit.type !== "candidate") {
                        return unit;
                    }

                    if (!selectedKeys.has(unit.key)) {
                        return {
                            type: "word",
                            text: unit.answer,
                            style: unit.style,
                            source: unit.source
                        };
                    }

                    const blankId = `blank-${blankIndex}`;
                    blankIndex += 1;
                    return {
                        type: "blank",
                        blankId,
                        answer: unit.answer,
                        style: unit.style
                    };
                });

                return {
                    blanks: renderUnits.filter((unit) => unit.type === "blank"),
                    renderUnits
                };
            }

            updateNextButton() {
                this.nextButton.disabled = !this.puzzleSolved;
            }

            renderStory() {
                this.selectedTileId = null;
                this.puzzleSolved = false;
                this.updateNextButton();
                this.clearDragState();
                this.wordBank.style.removeProperty("--word-bank-height");

                const story = this.currentStory;
                const { blanks, renderUnits } = this.prepareStoryRound(story);
                const shuffledTiles = this.shuffle(blanks.map((blank, index) => ({
                    id: `tile-${index}`,
                    answer: blank.answer,
                    style: blank.style,
                    blankId: blank.blankId,
                    used: false
                })));

                this.activeTiles = shuffledTiles;
                this.activeBlanks = blanks.reduce((map, blank) => {
                    map[blank.blankId] = {
                        answer: blank.answer,
                        style: blank.style,
                        filled: false
                    };
                    return map;
                }, {});

                this.storyTitle.textContent = story.title;
                this.levelBadge.textContent = `Level ${this.currentLevel}`;
                this.storyHint.textContent = `Find ${blanks.length === 1 ? "the missing word" : `all ${blanks.length} missing words`}.`;
                this.progressPill.textContent = `Story ${this.completedStories + 1} of ${this.stories.length}`;

                this.storyText.innerHTML = "";
                renderUnits.forEach((part) => {
                    if (part.type === "text") {
                        const span = document.createElement("span");
                        span.className = "chunk";
                        span.textContent = part.text;
                        this.storyText.appendChild(span);
                        return;
                    }

                    if (part.type === "word") {
                        const word = document.createElement("span");
                        word.className = part.source === "authored" ? `story-word ${part.style}` : "chunk";
                        word.textContent = part.text;
                        this.storyText.appendChild(word);
                        return;
                    }

                    const blank = document.createElement("button");
                    blank.type = "button";
                    blank.className = `blank ${part.style} hint-hidden`;
                    blank.dataset.blankId = part.blankId;
                    blank.dataset.answer = part.answer;
                    blank.style.minWidth = `${Math.max(1.9, part.answer.length * 0.82)}em`;
                    blank.setAttribute("aria-label", "Place the missing word");
                    blank.textContent = part.answer;
                    blank.addEventListener("click", () => this.handleBlankClick(blank.dataset.blankId));
                    this.storyText.appendChild(blank);
                });

                this.wordBank.innerHTML = "";
                this.activeTiles.forEach((tile) => {
                    const button = document.createElement("button");
                    button.type = "button";
                    button.className = `word-tile ${tile.style}`;
                    button.dataset.tileId = tile.id;
                    button.dataset.answer = tile.answer;
                    button.dataset.blankId = tile.blankId;
                    button.textContent = tile.answer;

                    button.addEventListener("click", () => this.handleTileClick(tile.id));
                    button.addEventListener("pointerdown", (event) => this.handlePointerDown(event, tile.id));

                    this.wordBank.appendChild(button);
                });

                Array.from(this.storyText.querySelectorAll(".blank")).forEach((blank) => {
                    blank.addEventListener("dragover", (event) => event.preventDefault());
                    blank.addEventListener("drop", (event) => this.handleDrop(event, blank.dataset.blankId));
                });

                requestAnimationFrame(() => {
                    this.wordBankHeight = this.wordBank.getBoundingClientRect().height;
                    this.wordBank.style.setProperty("--word-bank-height", `${this.wordBankHeight}px`);
                });
            }

            getTileElement(tileId) {
                return this.wordBank.querySelector(`[data-tile-id="${tileId}"]`);
            }

            getBlankElement(blankId) {
                return this.storyText.querySelector(`[data-blank-id="${blankId}"]`);
            }

            handleTileClick(tileId) {
                const tile = this.activeTiles.find((entry) => entry.id === tileId);
                if (!tile || tile.used) {
                    return;
                }

                if (this.selectedTileId === tileId) {
                    this.selectedTileId = null;
                } else {
                    this.selectedTileId = tileId;
                }

                this.syncSelectedTile();
            }

            handleBlankClick(blankId) {
                if (!this.selectedTileId) {
                    return;
                }

                this.tryPlaceTile(this.selectedTileId, blankId);
            }

            syncSelectedTile() {
                Array.from(this.wordBank.children).forEach((tile) => {
                    tile.classList.toggle("selected", tile.dataset.tileId === this.selectedTileId);
                });
            }

            clearBlankFocus() {
                Array.from(this.storyText.querySelectorAll(".blank")).forEach((blank) => {
                    blank.classList.remove("active");
                });
            }

            handleDrop(event, blankId) {
                event.preventDefault();
                const tileId = event.dataTransfer.getData("text/plain") || this.selectedTileId;
                this.tryPlaceTile(tileId, blankId);
            }

            handlePointerDown(event, tileId) {
                const tile = this.activeTiles.find((entry) => entry.id === tileId);
                if (!tile || tile.used) {
                    return;
                }

                if (event.pointerType === "mouse" && event.button !== 0) {
                    return;
                }

                event.preventDefault();
                this.clearDragState();
                const tileElement = this.getTileElement(tileId);
                const rect = tileElement.getBoundingClientRect();
                const clone = tileElement.cloneNode(true);
                clone.classList.add("drag-clone");
                clone.style.width = `${rect.width}px`;
                clone.style.height = `${rect.height}px`;
                document.body.appendChild(clone);

                tileElement.classList.add("dragging");
                this.selectedTileId = tileId;
                this.syncSelectedTile();
                this.highlightTarget(tile.blankId);

                this.dragState = {
                    tileId,
                    clone,
                    pointerId: event.pointerId,
                    sourceElement: tileElement,
                    lastX: event.clientX,
                    lastY: event.clientY,
                    frame: null
                };
                this.positionClone(event.clientX, event.clientY);

                tileElement.setPointerCapture(event.pointerId);
                tileElement.addEventListener("pointermove", this.boundPointerMove);
                tileElement.addEventListener("pointerup", this.boundPointerUp);
                tileElement.addEventListener("pointercancel", this.boundPointerUp);
            }

            handlePointerMove(event) {
                if (!this.dragState || event.pointerId !== this.dragState.pointerId) {
                    return;
                }

                this.dragState.lastX = event.clientX;
                this.dragState.lastY = event.clientY;
                if (!this.dragState.frame) {
                    this.dragState.frame = requestAnimationFrame(() => {
                        if (!this.dragState) {
                            return;
                        }

                        this.dragState.frame = null;
                        this.positionClone(this.dragState.lastX, this.dragState.lastY);
                    });
                }

                const target = document.elementFromPoint(event.clientX, event.clientY);
                const blank = target && target.closest(".blank");
                this.clearBlankFocus();
                if (blank && !blank.classList.contains("correct")) {
                    blank.classList.add("active");
                }
            }

            handlePointerUp(event) {
                if (!this.dragState || event.pointerId !== this.dragState.pointerId) {
                    return;
                }

                const tileElement = this.getTileElement(this.dragState.tileId);
                const target = document.elementFromPoint(event.clientX, event.clientY);
                const blank = target && target.closest(".blank");

                if (blank) {
                    this.tryPlaceTile(this.dragState.tileId, blank.dataset.blankId);
                } else {
                    this.clearBlankFocus();
                }

                if (tileElement) {
                    this.clearDragState(tileElement);
                    return;
                }

                this.clearDragState();
            }

            positionClone(clientX, clientY) {
                if (!this.dragState) {
                    return;
                }

                this.dragState.clone.style.left = `${clientX}px`;
                this.dragState.clone.style.top = `${clientY}px`;
                this.dragState.clone.style.transform = "translate(-50%, -50%) rotate(-3deg)";
            }

            clearDragState(tileElement = this.dragState && this.dragState.sourceElement) {
                if (!this.dragState) {
                    return;
                }

                if (this.dragState.frame) {
                    cancelAnimationFrame(this.dragState.frame);
                }

                if (tileElement) {
                    tileElement.classList.remove("dragging");
                    tileElement.removeEventListener("pointermove", this.boundPointerMove);
                    tileElement.removeEventListener("pointerup", this.boundPointerUp);
                    tileElement.removeEventListener("pointercancel", this.boundPointerUp);
                    if (this.dragState.pointerId != null && tileElement.hasPointerCapture?.(this.dragState.pointerId)) {
                        tileElement.releasePointerCapture(this.dragState.pointerId);
                    }
                }

                this.dragState.clone.remove();
                this.dragState = null;
            }

            highlightTarget(blankId) {
                this.clearBlankFocus();
                const blank = this.getBlankElement(blankId);
                if (blank && !blank.classList.contains("correct")) {
                    blank.classList.add("active");
                }
            }

            tryPlaceTile(tileId, blankId) {
                const tile = this.activeTiles.find((entry) => entry.id === tileId);
                const blankState = this.activeBlanks[blankId];
                const blankElement = this.getBlankElement(blankId);
                const tileElement = this.getTileElement(tileId);

                if (!tile || !blankState || !blankElement || !tileElement || tile.used || blankState.filled) {
                    return;
                }

                this.clearBlankFocus();

                if (tile.blankId !== blankId) {
                    blankElement.classList.remove("wrong");
                    void blankElement.offsetWidth;
                    blankElement.classList.add("wrong");
                    return;
                }

                tile.used = true;
                blankState.filled = true;
                this.selectedTileId = null;
                this.syncSelectedTile();

                blankElement.classList.remove("active", "wrong", "hint-hidden");
                blankElement.classList.add("correct");
                blankElement.textContent = tile.answer;

                tileElement.classList.remove("selected", "dragging");
                tileElement.classList.add("used");

                if (this.activeTiles.every((entry) => entry.used)) {
                    this.handleStoryComplete();
                }
            }

            handleStoryComplete() {
                this.puzzleSolved = true;
                this.updateNextButton();
                this.launchCelebration();
            }

            launchCelebration() {
                const feedback = CELEBRATION_LINES[Math.floor(Math.random() * CELEBRATION_LINES.length)];
                this.celebrationTitle.textContent = feedback.title;
                this.celebrationDetail.textContent = `${feedback.detail} ${this.currentStory.title} is done.`;
                this.celebration.classList.remove("active");
                void this.celebration.offsetWidth;
                this.celebration.classList.add("active");

                const colors = ["#ff9f1c", "#38b86c", "#4f95ff", "#ff5b95", "#8c6df2"];
                for (let i = 0; i < 20; i += 1) {
                    const confetti = document.createElement("div");
                    confetti.className = "confetti";
                    confetti.style.left = `${Math.random() * 100}vw`;
                    confetti.style.background = colors[i % colors.length];
                    confetti.style.animationDelay = `${Math.random() * 0.15}s`;
                    confetti.style.transform = `rotate(${Math.random() * 180}deg)`;
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 1500);
                }
            }

            nextStory() {
                if (!this.puzzleSolved) {
                    return;
                }

                this.completedStories += 1;
                if (this.storyIndex >= this.stories.length - 1) {
                    this.stories = this.shuffle(this.stories);
                    this.storyIndex = 0;
                } else {
                    this.storyIndex += 1;
                }
                this.renderStory();
            }
        }

        new StoryPuzzleGame(STORY_SET);
    </script>
</body>
</html>
