<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Opposite Words Match</title>
    <style>
        @font-face {
            font-family: 'Koodak';
            src: url("public/koodak.ttf") format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }

        :root {
            --app-height: 100dvh;
            --ui-font: 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif;
            --ink: #1a1a2e;
            --ink-soft: #5a5a7a;
            --panel: rgba(255, 255, 255, 0.82);
            --panel-strong: rgba(255, 255, 255, 0.94);
            --line: rgba(26, 26, 46, 0.1);
            --glow: 0 24px 60px rgba(14, 14, 36, 0.22);
            --theme-accent: #f09b5a;
            --theme-accent-soft: rgba(240, 155, 90, 0.18);
            --rows: 2;
            --card-radius: 22px;
            --connector-size: clamp(32px, 3vw, 40px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            min-height: var(--app-height);
            height: var(--app-height);
            display: grid;
            place-items: center;
            font-family: var(--ui-font);
            color: var(--ink);
            padding: 10px;
            -webkit-touch-callout: none;
            transition: background 600ms ease;
        }

        html[data-theme="twilight"] body {
            background:
                radial-gradient(circle at 15% 20%, rgba(180, 100, 220, 0.45), transparent 22%),
                radial-gradient(circle at 80% 18%, rgba(100, 60, 200, 0.35), transparent 24%),
                radial-gradient(circle at 78% 85%, rgba(220, 80, 180, 0.25), transparent 26%),
                linear-gradient(140deg, #1a0a2e 0%, #3a1a6a 40%, #6a2a8a 100%);
            --theme-accent: #c084fc;
            --theme-accent-soft: rgba(192, 132, 252, 0.18);
        }
        html[data-theme="candy"] body {
            background:
                radial-gradient(circle at 18% 22%, rgba(255, 150, 180, 0.5), transparent 20%),
                radial-gradient(circle at 82% 15%, rgba(255, 200, 120, 0.4), transparent 22%),
                radial-gradient(circle at 80% 86%, rgba(255, 130, 160, 0.3), transparent 24%),
                linear-gradient(140deg, #2a0a14 0%, #6a1a3a 42%, #b84a6a 100%);
            --theme-accent: #f472b6;
            --theme-accent-soft: rgba(244, 114, 182, 0.18);
        }
        html[data-theme="seafoam"] body {
            background:
                radial-gradient(circle at 14% 16%, rgba(80, 220, 200, 0.5), transparent 22%),
                radial-gradient(circle at 85% 14%, rgba(60, 190, 220, 0.35), transparent 24%),
                radial-gradient(circle at 80% 88%, rgba(100, 230, 180, 0.25), transparent 26%),
                linear-gradient(140deg, #042a24 0%, #0a5a4a 40%, #1a8a7a 100%);
            --theme-accent: #34d399;
            --theme-accent-soft: rgba(52, 211, 153, 0.18);
        }
        html[data-theme="emberglow"] body {
            background:
                radial-gradient(circle at 20% 18%, rgba(255, 140, 60, 0.5), transparent 20%),
                radial-gradient(circle at 78% 16%, rgba(220, 80, 40, 0.35), transparent 24%),
                radial-gradient(circle at 82% 86%, rgba(255, 160, 80, 0.25), transparent 24%),
                linear-gradient(140deg, #2a0a00 0%, #6a1a0a 40%, #b84a1a 100%);
            --theme-accent: #fb923c;
            --theme-accent-soft: rgba(251, 146, 60, 0.18);
        }

        .app {
            width: min(1240px, calc(100vw - 20px));
            height: min(860px, calc(var(--app-height) - 20px));
            border-radius: 38px;
            padding: clamp(14px, 1.8vw, 20px);
            display: flex;
            flex-direction: column;
            gap: 12px;
            background:
                linear-gradient(165deg, rgba(255, 240, 230, 0.92), rgba(240, 225, 215, 0.88));
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--glow), inset 0 2px 0 rgba(255, 255, 255, 0.5);
            overflow: hidden;
            position: relative;
        }

        .app::before {
            content: "";
            position: absolute;
            inset: 8px;
            border-radius: 32px;
            border: 2px solid rgba(26, 26, 46, 0.06);
            pointer-events: none;
        }

        .app::after {
            content: "";
            position: absolute;
            inset: 14px;
            border-radius: 26px;
            border: 1px dotted rgba(26, 26, 46, 0.08);
            pointer-events: none;
        }

        .topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 2px 4px 0;
        }

        .title-block {
            position: relative;
        }
        .title-block h1 {
            margin: 0;
            font-size: clamp(24px, 3vw, 38px);
            line-height: 1.05;
            letter-spacing: -0.03em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--ink) 30%, var(--theme-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .title-block h1 span {
            -webkit-text-fill-color: var(--theme-accent);
        }
        .title-block .subtitle {
            margin: 4px 0 0;
            font-size: clamp(11px, 1.1vw, 15px);
            color: var(--ink-soft);
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .status-strip {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 6px;
        }

        .status-pill {
            min-width: 64px;
            padding: 6px 10px;
            border-radius: 12px;
            background: var(--panel-strong);
            border: 1px solid rgba(26, 26, 46, 0.06);
            box-shadow: 0 4px 12px rgba(14, 14, 36, 0.06);
            text-align: center;
            font-variant-numeric: tabular-nums;
            position: relative;
        }
        .status-pill::before {
            content: "";
            position: absolute;
            top: -1px;
            left: 12px;
            right: 12px;
            height: 3px;
            border-radius: 0 0 3px 3px;
            background: var(--theme-accent);
            opacity: 0.5;
        }

        .status-pill span {
            display: block;
            font-size: 10px;
            color: var(--ink-soft);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .status-pill strong {
            display: block;
            margin-top: 1px;
            font-size: clamp(15px, 1.4vw, 20px);
            line-height: 1.15;
        }

        .board {
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: clamp(48px, 8vw, 140px);
            padding: clamp(12px, 1.4vw, 18px);
            border-radius: 28px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(248, 242, 238, 0.78));
            border: 1px solid rgba(26, 26, 46, 0.06);
            overflow: hidden;
        }

        #connectionCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .column {
            position: relative;
            z-index: 2;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        .column-header {
            text-align: center;
            font-size: clamp(12px, 1.2vw, 16px);
            font-weight: 800;
            color: var(--ink-soft);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 6px 0 4px;
            position: relative;
        }
        .column-header::after {
            content: "";
            display: block;
            width: 32px;
            height: 3px;
            border-radius: 3px;
            background: var(--theme-accent);
            margin: 5px auto 0;
            opacity: 0.4;
        }

        .word-list {
            flex: 1 1 auto;
            min-height: 0;
            display: grid;
            grid-template-rows: repeat(var(--rows), minmax(0, 1fr));
            gap: clamp(10px, 1.2vw, 16px);
        }

        .word-card {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            min-width: 0;
            padding: 8px 20px;
            border-radius: var(--card-radius);
            border: 2px solid rgba(26, 26, 46, 0.08);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 8px 20px rgba(14, 14, 36, 0.05);
            transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease, background 200ms ease;
            isolation: isolate;
        }

        .word-card[data-side="left"] {
            padding-right: 64px;
        }
        .word-card[data-side="left"]::before {
            content: "";
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 4px;
            border-radius: 4px;
            background: var(--theme-accent);
            opacity: 0.2;
            transition: opacity 200ms ease;
            pointer-events: none;
        }
        .word-card[data-side="left"].matched::before,
        .word-card[data-side="left"].is-origin::before {
            opacity: 0.5;
        }

        .word-card[data-side="right"] {
            padding-left: 64px;
        }
        .word-card[data-side="right"]::before {
            content: "";
            position: absolute;
            right: 0;
            top: 6px;
            bottom: 6px;
            width: 4px;
            border-radius: 4px;
            background: var(--theme-accent);
            opacity: 0.2;
            transition: opacity 200ms ease;
            pointer-events: none;
        }
        .word-card[data-side="right"].matched::before,
        .word-card[data-side="right"].is-origin::before {
            opacity: 0.5;
        }

        .word-card.is-origin {
            transform: scale(1.03);
            border-color: var(--theme-accent);
            box-shadow: 0 18px 40px rgba(14, 14, 36, 0.12);
        }

        .word-card.is-hover {
            transform: scale(1.02);
            border-color: var(--match-color, var(--theme-accent));
            box-shadow:
                0 18px 40px rgba(14, 14, 36, 0.14),
                0 0 0 5px var(--match-color, var(--theme-accent));
        }

        .word-card.matched {
            transform: scale(1.02);
            border-color: var(--match-color, var(--theme-accent));
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(248, 242, 248, 0.96));
            box-shadow:
                0 18px 40px rgba(14, 14, 36, 0.14),
                0 0 0 5px var(--match-color, var(--theme-accent)),
                inset 0 0 0 2px rgba(255, 255, 255, 0.7);
            animation: matchPulse 400ms ease;
        }

        @keyframes matchPulse {
            0% { transform: scale(1.02); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1.02); }
        }

        .word-card.wrong {
            animation: wobble 300ms ease;
            border-color: rgba(255, 86, 115, 0.7);
        }

        @keyframes wobble {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            20% { transform: translateX(-4px) rotate(-1deg); }
            40% { transform: translateX(4px) rotate(1deg); }
            60% { transform: translateX(-3px) rotate(-0.5deg); }
            80% { transform: translateX(3px) rotate(0.5deg); }
        }

        .word-text {
            width: 100%;
            min-width: 0;
            text-align: center;
            font-weight: 800;
            font-size: clamp(24px, 2.6vw, 38px);
            line-height: 1.15;
            letter-spacing: 0.02em;
        }

        .word-card .badge {
            display: none;
        }

        .word-card::after {
            content: "★";
            position: absolute;
            bottom: 6px;
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 400;
            color: #ffffff;
            background: var(--match-color, var(--theme-accent));
            opacity: 0;
            transform: scale(0.5) rotate(-30deg);
            transition: opacity 220ms ease, transform 220ms ease;
            box-shadow: 0 6px 16px rgba(14, 14, 36, 0.18);
        }
        .word-card[data-side="left"]::after { right: 14px; }
        .word-card[data-side="right"]::after { left: 14px; }

        .word-card.matched::after {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        .connector {
            position: absolute;
            top: 50%;
            width: var(--connector-size);
            height: var(--connector-size);
            border: none;
            border-radius: 6px;
            background:
                linear-gradient(145deg, #ffffff, #eef2f7);
            box-shadow: 0 6px 16px rgba(14, 14, 36, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            cursor: grab;
            touch-action: none;
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
            transform: translateY(-50%) rotate(45deg);
            padding: 0;
        }
        .connector::before {
            content: "";
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: rgba(26, 26, 46, 0.2);
            position: absolute;
            inset: 0;
            margin: auto;
            transition: background 160ms ease;
        }
        .connector::after {
            content: "";
            position: absolute;
            inset: 3px;
            border-radius: 4px;
            border: 1px solid rgba(26, 26, 46, 0.04);
            pointer-events: none;
        }

        .connector.left { left: 12px; }
        .connector.right { right: 12px; }

        .connector:active,
        .connector.is-active,
        .connector.is-hover {
            transform: translateY(-50%) rotate(45deg) scale(1.12);
            box-shadow: 0 10px 24px rgba(14, 14, 36, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .connector.is-active,
        .connector.is-hover,
        .connector.matched {
            box-shadow:
                0 10px 24px rgba(14, 14, 36, 0.2),
                0 0 0 5px rgba(255, 255, 255, 0.6),
                0 0 0 6px var(--match-color, var(--theme-accent));
        }

        .connector.is-active::before,
        .connector.is-hover::before,
        .connector.matched::before {
            background: var(--match-color, var(--theme-accent));
        }

        .connector.matched {
            cursor: default;
        }

        .toast {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            padding: 16px 36px;
            border-radius: 999px;
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(245, 240, 238, 0.98));
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 28px 50px rgba(14, 14, 36, 0.25);
            font-size: clamp(26px, 3.2vw, 44px);
            font-weight: 900;
            line-height: 1.1;
            color: var(--toast-color, var(--theme-accent));
            opacity: 0;
            pointer-events: none;
            transition: opacity 200ms ease, transform 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 4;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .spark {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            background: radial-gradient(circle, #ffffff 0%, var(--spark-color, var(--theme-accent)) 60%, transparent 74%);
            pointer-events: none;
            animation: spark 500ms ease-out forwards;
            z-index: 4;
        }

        @keyframes spark {
            from {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.4) rotate(0deg);
            }
            to {
                opacity: 0;
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.4) rotate(180deg);
            }
        }

        #resetBtn {
            cursor: pointer;
            border: none;
            font: inherit;
            color: var(--ink);
            background: rgba(255, 86, 115, 0.06);
            transition: background 180ms ease, transform 180ms ease;
            min-width: 44px;
            display: grid;
            place-items: center;
            line-height: 1;
            font-size: 20px;
        }
        #resetBtn:hover,
        #resetBtn:active {
            background: rgba(255, 86, 115, 0.18);
            transform: scale(1.06);
        }

        @media (max-width: 960px) {
            .board {
                gap: clamp(32px, 6vw, 72px);
            }
            .status-pill {
                min-width: 58px;
            }
        }

        @media (max-width: 760px) {
            .app {
                padding: 10px;
                border-radius: 28px;
            }
            .app::before {
                inset: 6px;
                border-radius: 24px;
            }
            .app::after {
                inset: 12px;
                border-radius: 18px;
            }
            .topbar {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .status-strip {
                justify-content: flex-start;
            }
            .board {
                gap: 12px;
                padding: 8px;
                border-radius: 20px;
            }
            .column-header {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .word-card {
                padding: 6px 12px;
            }
            .word-card[data-side="left"] {
                padding-right: 52px;
            }
            .word-card[data-side="right"] {
                padding-left: 52px;
            }
            .word-text {
                font-size: clamp(18px, 5.5vw, 24px);
            }
            .connector {
                --connector-size: clamp(28px, 8vw, 34px);
            }
            .connector.left { left: 8px; }
            .connector.right { right: 8px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="title-block">
                <h1>Opposite <span>Match</span></h1>
                <div class="subtitle" id="levelDescription">Level 1</div>
            </div>
            <div class="status-strip">
                <div class="status-pill">
                    <span>Level</span>
                    <strong id="levelLabel">1</strong>
                </div>
                <div class="status-pill">
                    <span>Words</span>
                    <strong id="wordsLabel">2</strong>
                </div>
                <div class="status-pill">
                    <span>Page</span>
                    <strong id="pageLabel">1 of 4</strong>
                </div>
                <div class="status-pill">
                    <span>Matched</span>
                    <strong id="matchLabel">0 of 2</strong>
                </div>
                <button class="status-pill" id="resetBtn" type="button" aria-label="Reset progress">↻</button>
            </div>
        </div>

        <div class="board" id="board">
            <canvas id="connectionCanvas"></canvas>

            <section class="column">
                <div class="column-header">Word</div>
                <div class="word-list" id="leftList"></div>
            </section>

            <section class="column">
                <div class="column-header">Opposite</div>
                <div class="word-list" id="rightList"></div>
            </section>

            <div class="toast" id="toast"></div>
        </div>
    </div>

    <script>
        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function pick(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        const OPPOSITES = [
            { left: "big", right: "small" },
            { left: "hot", right: "cold" },
            { left: "up", right: "down" },
            { left: "day", right: "night" },
            { left: "fast", right: "slow" },
            { left: "loud", right: "quiet" },
            { left: "happy", right: "sad" },
            { left: "wet", right: "dry" },
            { left: "open", right: "closed" },
            { left: "full", right: "empty" },
            { left: "tall", right: "short" },
            { left: "hard", right: "soft" },
            { left: "clean", right: "dirty" },
            { left: "light", right: "heavy" },
            { left: "push", right: "pull" },
            { left: "in", right: "out" },
            { left: "above", right: "below" },
            { left: "start", right: "finish" },
            { left: "near", right: "far" },
            { left: "early", right: "late" },
            { left: "old", right: "new" },
            { left: "thick", right: "thin" },
            { left: "smooth", right: "rough" },
            { left: "right", right: "left" },
            { left: "on", right: "off" },
            { left: "high", right: "low" },
            { left: "wake", right: "sleep" },
            { left: "give", right: "take" },
            { left: "brave", right: "scared" },
            { left: "same", right: "different" },
            { left: "bright", right: "dim" },
            { left: "sweet", right: "sour" },
            { left: "laugh", right: "cry" },
            { left: "sit", right: "stand" },
            { left: "go", right: "stop" },
            { left: "front", right: "back" },
            { left: "more", right: "less" },
            { left: "many", right: "few" },
            { left: "first", right: "last" },
            { left: "young", right: "old" },
            { left: "top", right: "bottom" },
            { left: "straight", right: "crooked" },
            { left: "strong", right: "weak" },
            { left: "rich", right: "poor" },
            { left: "sharp", right: "dull" },
            { left: "noisy", right: "silent" },
            { left: "buy", right: "sell" },
            { left: "borrow", right: "lend" },
            { left: "enter", right: "exit" },
            { left: "build", right: "break" },
            { left: "find", right: "lose" },
            { left: "catch", right: "throw" },
            { left: "together", right: "apart" },
            { left: "safe", right: "dangerous" },
            { left: "rainy", right: "sunny" },
            { left: "round", right: "square" },
            { left: "smile", right: "frown" },
            { left: "whisper", right: "shout" },
            { left: "polite", right: "rude" },
            { left: "asleep", right: "awake" },
        ];

        const TIERS = [
            { minLevel: 1, pairs: OPPOSITES.slice(0, 10) },
            { minLevel: 2, pairs: OPPOSITES.slice(0, 16) },
            { minLevel: 3, pairs: OPPOSITES.slice(0, 22) },
            { minLevel: 4, pairs: OPPOSITES.slice(0, 28) },
            { minLevel: 5, pairs: OPPOSITES.slice(0, 34) },
            { minLevel: 7, pairs: OPPOSITES.slice(0, 40) },
            { minLevel: 9, pairs: OPPOSITES.slice(0, 46) },
            { minLevel: 11, pairs: OPPOSITES.slice(0, 52) },
            { minLevel: 13, pairs: OPPOSITES.slice(0, 56) },
            { minLevel: 16, pairs: OPPOSITES },
        ];

        const THEME_RANGES = [
            { min: 1, max: 3, theme: 'twilight' },
            { min: 4, max: 6, theme: 'candy' },
            { min: 7, max: 9, theme: 'seafoam' },
            { min: 10, max: Infinity, theme: 'emberglow' },
        ];

        class OppositeMatchGame {
            constructor() {
                this.board = document.getElementById('board');
                this.canvas = document.getElementById('connectionCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.leftList = document.getElementById('leftList');
                this.rightList = document.getElementById('rightList');
                this.levelLabel = document.getElementById('levelLabel');
                this.pageLabel = document.getElementById('pageLabel');
                this.matchLabel = document.getElementById('matchLabel');
                this.wordsLabel = document.getElementById('wordsLabel');
                this.levelDescription = document.getElementById('levelDescription');
                this.toast = document.getElementById('toast');

                this.level = 1;
                this.pagesClearedInLevel = 0;
                this.loadProgress();
                this.matchesMade = 0;
                this.connectionSerial = 0;
                this.activeDrag = null;
                this.connections = [];
                this.currentPairs = [];
                this.hoverConnector = null;
                this.resizeFrame = 0;
                this.pageAdvanceTimeout = 0;
                this.toastTimeout = 0;

                this.handleResize = this.handleResize.bind(this);
                this.handlePointerMove = this.handlePointerMove.bind(this);
                this.handlePointerUp = this.handlePointerUp.bind(this);

                const resetBtn = document.getElementById('resetBtn');
                if (resetBtn) {
                    resetBtn.addEventListener('click', () => this.resetProgress());
                }

                this.init();
            }

            async init() {
                this.syncViewportHeight();
                window.addEventListener('resize', this.handleResize, { passive: true });
                window.addEventListener('orientationchange', this.handleResize, { passive: true });
                if (window.visualViewport) {
                    window.visualViewport.addEventListener('resize', this.handleResize, { passive: true });
                }

                const start = () => this.startPage();
                if (document.fonts && document.fonts.ready) {
                    Promise.race([
                        document.fonts.ready,
                        new Promise(resolve => setTimeout(resolve, 700))
                    ]).then(start);
                } else {
                    start();
                }
            }

            syncViewportHeight() {
                const visualViewport = window.visualViewport;
                const viewportHeight = Math.round((visualViewport ? visualViewport.height : 0) || window.innerHeight || 0);
                if (viewportHeight > 0) {
                    document.documentElement.style.setProperty('--app-height', `${viewportHeight}px`);
                }
            }

            handleResize() {
                this.syncViewportHeight();
                cancelAnimationFrame(this.resizeFrame);
                this.resizeFrame = requestAnimationFrame(() => {
                    this.resizeCanvas();
                    this.redrawConnections();
                });
            }

            loadProgress() {
                try {
                    const saved = localStorage.getItem('opposite-match-progress');
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (typeof data.level === 'number') this.level = data.level;
                        if (typeof data.pagesClearedInLevel === 'number') this.pagesClearedInLevel = data.pagesClearedInLevel;
                    }
                } catch (_) {}
            }

            saveProgress() {
                try {
                    localStorage.setItem('opposite-match-progress', JSON.stringify({
                        level: this.level,
                        pagesClearedInLevel: this.pagesClearedInLevel
                    }));
                } catch (_) {}
            }

            resetProgress() {
                if (!confirm('Reset all progress? Your level will be set back to 1.')) return;
                localStorage.removeItem('opposite-match-progress');
                this.level = 1;
                this.pagesClearedInLevel = 0;
                this.connections = [];
                this.startPage();
            }

            wordsPerPage() {
                return Math.min(2 + Math.floor((this.level - 1) / 2), 7);
            }

            totalPagesPerLevel() {
                return 4;
            }

            getTier(level) {
                let tier = TIERS[0];
                for (const t of TIERS) {
                    if (level >= t.minLevel) tier = t;
                }
                return tier;
            }

            getLevelName(level) {
                return `Level ${level}`;
            }

            getTheme(level) {
                for (const range of THEME_RANGES) {
                    if (level >= range.min && level <= range.max) return range.theme;
                }
                return 'lilac';
            }

            applyTheme(level) {
                const theme = this.getTheme(level);
                document.documentElement.dataset.theme = theme;
                this.levelDescription.textContent = this.getLevelName(level);
            }

            getLevelUpMessage(level) {
                if (level % 5 === 0) return `Level ${level} — On Fire!`;
                if (level % 3 === 0) return `Level ${level} — Keep Going!`;
                return `Level ${level}!`;
            }

            getPageClearMessage() {
                const msgs = ['Brilliant!', 'Fantastic!', 'Nailed It!', 'Super!', 'Boom!', 'Splendid!', 'Stellar!'];
                return pick(msgs);
            }

            generatePage(count) {
                const tier = this.getTier(this.level);
                const available = shuffle(tier.pairs);
                const selected = available.slice(0, count);

                const leftItems = selected.map(p => ({ display: p.left, value: p.left, key: p.left }));
                const rightItems = shuffle(selected.map(p => ({ display: p.right, value: p.left, key: p.right })));

                return { leftItems, rightItems, pairs: selected };
            }

            startPage() {
                clearTimeout(this.pageAdvanceTimeout);
                this.clearToast();
                this.matchesMade = 0;
                this.connections = [];
                this.activeDrag = null;
                this.connectionSerial = 0;
                this.clearHoverConnector();

                const count = this.wordsPerPage();
                const { leftItems, rightItems, pairs } = this.generatePage(count);
                this.currentLeftItems = leftItems;
                this.currentRightItems = rightItems;
                this.currentPairs = pairs;

                this.applyTheme(this.level);
                this.renderPage();
                this.resizeCanvas();
                this.redrawConnections();
                this.updateStatus();
            }

            renderPage() {
                const wordCount = this.currentLeftItems.length;
                this.board.style.setProperty('--rows', String(wordCount));
                this.leftList.innerHTML = '';
                this.rightList.innerHTML = '';

                for (const item of this.currentLeftItems) {
                    this.leftList.appendChild(this.createCard(item, 'left'));
                }

                for (const item of this.currentRightItems) {
                    this.rightList.appendChild(this.createCard(item, 'right'));
                }
            }

            createCard(item, side) {
                const card = document.createElement('article');
                card.className = 'word-card';
                card.dataset.value = item.value;
                card.dataset.side = side;

                const word = document.createElement('div');
                word.className = 'word-text';
                word.textContent = item.display;

                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.textContent = '';
                card.appendChild(badge);

                const connector = document.createElement('button');
                connector.type = 'button';
                connector.className = `connector ${side === 'left' ? 'right' : 'left'}`;
                connector.dataset.value = item.value;
                connector.dataset.side = side;
                connector.setAttribute('aria-label', side === 'left' ? `Match ${item.display}` : `Opposite for ${item.display}`);
                connector.addEventListener('pointerdown', event => this.beginDrag(event, connector));
                card.addEventListener('pointerdown', event => {
                    if (event.target.closest('.connector')) return;
                    this.beginDrag(event, connector);
                });

                card.append(word, connector);
                return card;
            }

            updateStatus() {
                const pageNumber = this.pagesClearedInLevel + 1;
                const totalPages = this.totalPagesPerLevel();
                const words = this.currentLeftItems.length;

                this.levelLabel.textContent = String(this.level);
                this.pageLabel.textContent = `${pageNumber} of ${totalPages}`;
                this.matchLabel.textContent = `${this.matchesMade} of ${words}`;
                this.wordsLabel.textContent = String(words);
            }

            resizeCanvas() {
                const rect = this.board.getBoundingClientRect();
                const ratio = window.devicePixelRatio || 1;
                this.canvas.width = Math.round(rect.width * ratio);
                this.canvas.height = Math.round(rect.height * ratio);
                this.canvas.style.width = `${rect.width}px`;
                this.canvas.style.height = `${rect.height}px`;
                this.ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
            }

            getConnectorPoint(connector) {
                const connectorRect = connector.getBoundingClientRect();
                const boardRect = this.board.getBoundingClientRect();
                return {
                    x: connectorRect.left - boardRect.left + (connectorRect.width / 2),
                    y: connectorRect.top - boardRect.top + (connectorRect.height / 2)
                };
            }

            beginDrag(event, connector) {
                if (connector.classList.contains('matched')) return;
                if (this.activeDrag) return;

                event.preventDefault();

                const value = connector.dataset.value;
                const side = connector.dataset.side;
                const color = this.nextColor();
                const startCard = connector.closest('.word-card');

                this.activeDrag = {
                    value,
                    side,
                    startConnector: connector,
                    startCard,
                    color,
                    pointer: this.clientToBoardPoint(event.clientX, event.clientY)
                };

                connector.classList.add('is-active');
                startCard.classList.add('is-origin');
                startCard.style.setProperty('--match-color', color);
                connector.style.setProperty('--match-color', color);

                window.addEventListener('pointermove', this.handlePointerMove);
                window.addEventListener('pointerup', this.handlePointerUp);
                window.addEventListener('pointercancel', this.handlePointerUp);

                this.redrawConnections();
            }

            clientToBoardPoint(clientX, clientY) {
                const rect = this.board.getBoundingClientRect();
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            handlePointerMove(event) {
                if (!this.activeDrag) return;
                this.activeDrag.pointer = this.clientToBoardPoint(event.clientX, event.clientY);
                const hovered = this.findConnectorAt(event.clientX, event.clientY);
                this.setHoverConnector(hovered);
                this.redrawConnections();
            }

            handlePointerUp(event) {
                if (!this.activeDrag) return;

                const drag = this.activeDrag;
                const target = this.findConnectorAt(event.clientX, event.clientY);
                const validTarget = target
                    && target !== drag.startConnector
                    && target.dataset.side !== drag.side
                    && !target.classList.contains('matched');

                if (validTarget && target.dataset.value === drag.value) {
                    this.completeMatch(drag, target);
                } else {
                    if (validTarget) {
                        this.flashWrong(target.closest('.word-card'));
                    }
                    this.resetDragState();
                }

                window.removeEventListener('pointermove', this.handlePointerMove);
                window.removeEventListener('pointerup', this.handlePointerUp);
                window.removeEventListener('pointercancel', this.handlePointerUp);
            }

            findConnectorAt(clientX, clientY) {
                const element = document.elementFromPoint(clientX, clientY);
                let connector = element ? element.closest('.connector') : null;
                if (!connector) {
                    const card = element ? element.closest('.word-card') : null;
                    connector = card ? card.querySelector('.connector') : null;
                }
                if (!connector) return null;
                if (!this.activeDrag) return connector;
                return connector.dataset.side !== this.activeDrag.side ? connector : null;
            }

            setHoverConnector(connector) {
                if (this.hoverConnector === connector) return;

                if (this.hoverConnector) {
                    this.hoverConnector.classList.remove('is-hover');
                    const previousCard = this.hoverConnector.closest('.word-card');
                    if (previousCard) previousCard.classList.remove('is-hover');
                }

                this.hoverConnector = connector;

                if (connector && this.activeDrag) {
                    const card = connector.closest('.word-card');
                    connector.classList.add('is-hover');
                    connector.style.setProperty('--match-color', this.activeDrag.color);
                    if (card) {
                        card.classList.add('is-hover');
                        card.style.setProperty('--match-color', this.activeDrag.color);
                    }
                }
            }

            clearHoverConnector() {
                if (!this.hoverConnector) return;
                this.hoverConnector.classList.remove('is-hover');
                const card = this.hoverConnector.closest('.word-card');
                if (card) card.classList.remove('is-hover');
                this.hoverConnector = null;
            }

            flashWrong(card) {
                if (!card) return;
                card.classList.remove('wrong');
                void card.offsetWidth;
                card.classList.add('wrong');
                setTimeout(() => card.classList.remove('wrong'), 280);
            }

            completeMatch(drag, targetConnector) {
                const leftConnector = drag.side === 'left' ? drag.startConnector : targetConnector;
                const rightConnector = drag.side === 'right' ? drag.startConnector : targetConnector;
                const color = drag.color;

                this.connections.push({
                    value: drag.value,
                    leftConnector,
                    rightConnector,
                    color
                });

                this.markMatched(leftConnector, color);
                this.markMatched(rightConnector, color);
                this.spawnSpark(leftConnector, color);
                this.spawnSpark(rightConnector, color);

                this.matchesMade += 1;
                this.resetDragState();
                this.redrawConnections();
                this.updateStatus();

                if (this.matchesMade === this.currentLeftItems.length) {
                    this.finishPage();
                }
            }

            markMatched(connector, color) {
                const card = connector.closest('.word-card');
                connector.classList.add('matched');
                connector.style.setProperty('--match-color', color);
                card.classList.add('matched');
                card.style.setProperty('--match-color', color);
            }

            spawnSpark(connector, color) {
                const point = this.getConnectorPoint(connector);

                for (let index = 0; index < 6; index += 1) {
                    const spark = document.createElement('div');
                    const angle = (Math.PI * 2 * index) / 6;
                    const distance = 22 + (index % 2) * 8;
                    spark.className = 'spark';
                    spark.style.left = `${point.x}px`;
                    spark.style.top = `${point.y}px`;
                    spark.style.setProperty('--spark-color', color);
                    spark.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
                    spark.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
                    this.board.appendChild(spark);
                    setTimeout(() => spark.remove(), 520);
                }
            }

            finishPage() {
                this.pagesClearedInLevel += 1;
                const leveledUp = this.pagesClearedInLevel >= this.totalPagesPerLevel();

                if (leveledUp) {
                    this.level += 1;
                    this.pagesClearedInLevel = 0;
                    this.applyTheme(this.level);
                    this.showToast(this.getLevelUpMessage(this.level));
                } else {
                    this.showToast(this.getPageClearMessage());
                }
                this.saveProgress();

                this.pageAdvanceTimeout = window.setTimeout(() => {
                    this.startPage();
                }, leveledUp ? 1500 : 900);
            }

            showToast(text) {
                clearTimeout(this.toastTimeout);
                const lastConnection = this.connections[this.connections.length - 1];
                this.toast.textContent = text;
                this.toast.style.setProperty('--toast-color', lastConnection ? lastConnection.color : 'var(--theme-accent)');
                this.toast.classList.add('show');
                this.toastTimeout = window.setTimeout(() => this.clearToast(), 900);
            }

            clearToast() {
                this.toast.classList.remove('show');
            }

            resetDragState() {
                if (!this.activeDrag) return;

                this.activeDrag.startConnector.classList.remove('is-active');
                this.activeDrag.startCard.classList.remove('is-origin');
                this.activeDrag.startCard.classList.remove('is-hover');
                if (!this.activeDrag.startCard.classList.contains('matched')) {
                    this.activeDrag.startCard.style.removeProperty('--match-color');
                    this.activeDrag.startConnector.style.removeProperty('--match-color');
                }

                this.activeDrag = null;
                this.clearHoverConnector();
                this.redrawConnections();
            }

            nextColor() {
                const hue = (this.connectionSerial * 47) % 360;
                this.connectionSerial += 1;
                return `hsl(${hue} 88% 58%)`;
            }

            redrawConnections() {
                const ctx = this.ctx;
                if (!ctx) return;

                const rect = this.board.getBoundingClientRect();
                ctx.clearRect(0, 0, rect.width, rect.height);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for (const connection of this.connections) {
                    const start = this.getConnectorPoint(connection.leftConnector);
                    const end = this.getConnectorPoint(connection.rightConnector);
                    this.drawCurve(start, end, connection.color, 1);
                }

                if (this.activeDrag) {
                    const start = this.getConnectorPoint(this.activeDrag.startConnector);
                    const end = this.hoverConnector
                        ? this.getConnectorPoint(this.hoverConnector)
                        : this.activeDrag.pointer;
                    this.drawCurve(start, end, this.activeDrag.color, 0.85);
                }
            }

            drawCurve(start, end, color, alpha) {
                const ctx = this.ctx;
                const midX = (start.x + end.x) / 2;
                const bend = Math.max(48, Math.abs(end.x - start.x) * 0.2);

                ctx.save();
                ctx.strokeStyle = color;
                ctx.globalAlpha = alpha;
                ctx.lineWidth = 6;
                ctx.shadowColor = color;
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.bezierCurveTo(midX - bend, start.y, midX + bend, end.y, end.x, end.y);
                ctx.stroke();

                ctx.globalAlpha = alpha * 0.3;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.bezierCurveTo(midX - bend, start.y, midX + bend, end.y, end.x, end.y);
                ctx.stroke();
                ctx.restore();
            }
        }

        new OppositeMatchGame();
    </script>
</body>
</html>
