<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی ردیابی</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Koodak';
            src: url('./public/koodak.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }

        :root {
            --farsi-font: 'Koodak', 'B Koodak', 'Vazirmatn', 'Vazir', 'Tahoma', 'Arial', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--farsi-font);
            background: linear-gradient(135deg, #e6f5ff 0%, #f0f8ff 50%, #fafcff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
            -webkit-text-size-adjust: 100%;
        }

        /* Background dots pattern */
        .dots-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(79, 163, 209, 0.15);
            border-radius: 50%;
        }

        .container {
            background: linear-gradient(135deg, #ffffff 0%, #fafcff 100%);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 900px;
            width: 90%;
            position: relative;
            z-index: 1;
            border: 4px solid rgba(79, 163, 209, 0.2);
        }

        h1 {
            color: #4fa3d1;
            font-size: 2.2em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px rgba(255,164,91,0.2);
            letter-spacing: 1px;
        }

        .instructions {
            font-size: 1em;
            color: #6bcf7f;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .canvas-container {
            position: relative;
            display: inline-block;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 3px solid rgba(79, 163, 209, 0.2);
        }

        canvas {
            display: block;
            border-radius: 15px;
            touch-action: none;
            cursor: crosshair;
        }

        .celebration-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            font-weight: 900;
            z-index: 1000;
            animation: celebrate 1s ease-out;
            pointer-events: none;
            background: linear-gradient(135deg, #6bcf7f 0%, #4fa3d1 100%);
            padding: 30px 50px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 6px solid #ffffff;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
        }

        @keyframes celebrate {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.15) rotate(5deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confetti-fall 2s linear forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .shape-indicator {
            font-size: 1.2em;
            color: #4fa3d1;
            margin-top: 15px;
            font-weight: 600;
        }

        .score-info {
            font-size: 1.5em;
            background: linear-gradient(135deg, #ff6b9d, #ffa45b);
            color: white;
            margin: 15px auto 0 auto;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 6px 15px rgba(255, 107, 157, 0.4);
            animation: scoreFloat 2s ease-in-out infinite;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        @keyframes scoreFloat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pulse {
            animation: pulse 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <!-- Background dots -->
    <div class="dots-background" id="dots-background"></div>

    <div class="container">
        <h1>✏️ بازی ردیابی فارسی</h1>
        <div class="instructions" id="instructions">حرف را دنبال کن!</div>

        <div class="canvas-container">
            <canvas id="canvas" width="600" height="400"></canvas>
        </div>

        <div class="shape-indicator" id="shape-indicator">حرف: ا</div>
        <div class="score-info" id="score-info">امتیاز: ۳۰</div>
    </div>

    <div class="celebration" id="celebration"></div>

    <script>
        class TracingGame {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.fontStack = "'Koodak', 'B Koodak', 'Vazirmatn', 'Vazir', 'Tahoma', 'Arial', sans-serif";
                this.drawing = false;
                this.currentShapeIndex = 0;
                this.traceCache = new Map();
                this.fontReady = false;
                this.successPending = false;
                this.activePointerId = null;
                this.lastTracePoint = null;
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();

                // Difficulty scoring system
                this.difficultyScore = 30.0; // Internal floating point score (1-100)
                this.consecutiveSuccesses = 0;
                this.consecutiveFailures = 0;

                // Level progression: 10 letters, then words
                this.levels = [];

                // Levels 1-10: Farsi Letters
                const letters = ['ا', 'ب', 'پ', 'د', 'م', 'ن', 'و', 'ل', 'ر', 'س'];
                letters.forEach(letter => {
                    this.levels.push({
                        name: letter,
                        category: 'letter',
                        type: 'letter',
                        letter: letter
                    });
                });

                // Levels 11+: Simple Farsi words
                const words = [
                    'بابا', 'ماما', 'آب', 'نان', 'سیب', 'گل', 'پا', 'دست',
                    'خانه', 'ماشین', 'توپ', 'عروسک', 'کتاب', 'مداد', 'پاکن', 'کیف',
                    'کفش', 'جوراب', 'پیراهن', 'شلوار', 'کلاه', 'بینی', 'چشم', 'گوش',
                    'مو', 'لب', 'دهن', 'دندان', 'زبان', 'دستکش', 'خورشید', 'ماه',
                    'ستاره', 'ابر', 'باران', 'برف', 'باد', 'دریا', 'رود', 'ماهی',
                    'پرنده', 'گنجشک', 'گربه', 'سگ', 'خرس', 'خرگوش', 'اردک', 'مرغ',
                    'جوجه', 'اسب', 'گاو', 'بز', 'درخت', 'برگ', 'باغ', 'گلبرگ',
                    'رنگ', 'آبی', 'قرمز', 'زرد', 'سبز', 'صورتی', 'نارنجی', 'بنفش',
                    'شیر', 'پنیر', 'کیک', 'موز', 'انار', 'هلو', 'توت', 'خرما',
                    'اتوبوس', 'دوچرخه', 'قطار', 'پنجره', 'میز', 'صندلی', 'بالش', 'پتو',
                    'مامان', 'بابایی', 'دوست', 'بازی', 'تاب', 'سرسره'
                ];
                words.forEach(word => {
                    this.levels.push({
                        name: word,
                        category: 'word',
                        type: 'word',
                        word: word
                    });
                });

                this.shapes = this.levels; // Keep compatibility

                this.init();
            }

            generateStarPoints(cx, cy, spikes, outerRadius, innerRadius) {
                const points = [];
                const step = Math.PI / spikes;

                for (let i = 0; i < 2 * spikes; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = i * step - Math.PI / 2;
                    points.push([
                        cx + radius * Math.cos(angle),
                        cy + radius * Math.sin(angle)
                    ]);
                }
                points.push(points[0]); // Close the shape
                return points;
            }

            getShapeText(shape) {
                return shape.type === 'letter' ? shape.letter : shape.word;
            }

            getTraceModel(shape) {
                const text = this.getShapeText(shape);
                if (!text) return null;

                if (!this.traceCache.has(text)) {
                    this.traceCache.set(text, this.generateTextTraceModel(text));
                }

                return this.traceCache.get(text);
            }

            getShapePaths(shape) {
                const model = this.getTraceModel(shape);
                return model ? model.segments : [];
            }

            generateTextTraceModel(text) {
                const render = this.renderTextMask(text);
                if (!render) return null;

                const { mask, bounds, fontSize } = render;
                const components = this.findConnectedComponents(mask);
                if (!components.length) return null;

                const transform = this.getTextBoundsTransform(bounds);
                const largestArea = Math.max(...components.map(component => component.pixels.length));
                const model = {
                    text,
                    bounds,
                    transform,
                    components: [],
                    segments: []
                };

                components.forEach(component => {
                    const traceComponent = this.buildTraceComponent(
                        component,
                        mask[0].length,
                        mask.length,
                        transform,
                        largestArea,
                        fontSize
                    );

                    if (!traceComponent) return;
                    model.components.push(traceComponent);
                    traceComponent.guideSegments.forEach(segment => model.segments.push(segment));
                });

                return model;
            }

            renderTextMask(text) {
                const width = 1200;
                const height = 700;
                const padding = 80;
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });

                let fontSize = text.length > 3 ? 260 : 300;
                ctx.textBaseline = 'alphabetic';
                ctx.textAlign = 'right';
                ctx.direction = 'rtl';

                while (fontSize > 140) {
                    ctx.font = `400 ${fontSize}px ${this.fontStack}`;
                    if (ctx.measureText(text).width <= width - padding * 2) {
                        break;
                    }
                    fontSize -= 10;
                }

                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#4fa3d1';
                ctx.fillText(text, width - padding, height * 0.66);

                const imageData = ctx.getImageData(0, 0, width, height);
                const bounds = this.findOpaqueBounds(imageData, width, height);
                if (!bounds) return null;

                const paddedBounds = {
                    minX: Math.max(0, bounds.minX - 10),
                    minY: Math.max(0, bounds.minY - 10),
                    maxX: Math.min(width - 1, bounds.maxX + 10),
                    maxY: Math.min(height - 1, bounds.maxY + 10)
                };

                const mask = [];
                for (let y = paddedBounds.minY; y <= paddedBounds.maxY; y++) {
                    const row = [];
                    for (let x = paddedBounds.minX; x <= paddedBounds.maxX; x++) {
                        const alpha = imageData.data[(y * width + x) * 4 + 3];
                        row.push(alpha > 20 ? 1 : 0);
                    }
                    mask.push(row);
                }

                return { canvas, mask, bounds: paddedBounds, fontSize };
            }

            findOpaqueBounds(imageData, width, height) {
                let minX = width;
                let minY = height;
                let maxX = -1;
                let maxY = -1;

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const alpha = imageData.data[(y * width + x) * 4 + 3];
                        if (alpha > 20) {
                            minX = Math.min(minX, x);
                            minY = Math.min(minY, y);
                            maxX = Math.max(maxX, x);
                            maxY = Math.max(maxY, y);
                        }
                    }
                }

                if (maxX === -1) return null;
                return { minX, minY, maxX, maxY };
            }

            findConnectedComponents(mask) {
                const height = mask.length;
                const width = mask[0].length;
                const visited = Array.from({ length: height }, () => Array(width).fill(false));
                const components = [];

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        if (!mask[y][x] || visited[y][x]) continue;

                        const queue = [[x, y]];
                        const pixels = [];
                        visited[y][x] = true;
                        let minX = x;
                        let minY = y;
                        let maxX = x;
                        let maxY = y;

                        while (queue.length) {
                            const [cx, cy] = queue.pop();
                            pixels.push([cx, cy]);
                            minX = Math.min(minX, cx);
                            minY = Math.min(minY, cy);
                            maxX = Math.max(maxX, cx);
                            maxY = Math.max(maxY, cy);

                            for (let ny = cy - 1; ny <= cy + 1; ny++) {
                                for (let nx = cx - 1; nx <= cx + 1; nx++) {
                                    if (nx < 0 || ny < 0 || nx >= width || ny >= height) continue;
                                    if (!mask[ny][nx] || visited[ny][nx]) continue;
                                    visited[ny][nx] = true;
                                    queue.push([nx, ny]);
                                }
                            }
                        }

                        components.push({
                            pixels,
                            bbox: { minX, minY, maxX, maxY },
                            width: maxX - minX + 1,
                            height: maxY - minY + 1
                        });
                    }
                }

                return components;
            }

            isDotComponent(component, largestArea, fontSize) {
                const area = component.pixels.length;
                const maxDotSize = fontSize * 0.28;
                const aspectRatio = Math.max(component.width, component.height) / Math.max(1, Math.min(component.width, component.height));
                return area < largestArea * 0.12 &&
                    component.width <= maxDotSize &&
                    component.height <= maxDotSize &&
                    aspectRatio <= 1.8;
            }

            componentToEllipsePath(component) {
                const centerX = (component.bbox.minX + component.bbox.maxX) / 2;
                const centerY = (component.bbox.minY + component.bbox.maxY) / 2;
                const radiusX = Math.max(5, component.width / 2);
                const radiusY = Math.max(5, component.height / 2);
                const points = [];
                const samples = 20;

                for (let i = 0; i <= samples; i++) {
                    const angle = (i / samples) * Math.PI * 2;
                    points.push([
                        centerX + Math.cos(angle) * radiusX,
                        centerY + Math.sin(angle) * radiusY
                    ]);
                }

                return points;
            }

            buildTraceComponent(component, width, height, transform, largestArea, fontSize) {
                const localMask = this.createComponentMask(component, width, height);
                const isDot = this.isDotComponent(component, largestArea, fontSize);
                const localGuidePaths = isDot
                    ? [this.componentToEllipsePath(component)]
                    : this.traceSkeletonPaths(this.zhangSuenThinning(localMask)).filter(path => path.length >= 2);

                if (!localGuidePaths.length) return null;

                const guideSegments = this.normalizePathsToCanvas(localGuidePaths, transform);
                const strokeLength = this.calculatePathCollectionLength(localGuidePaths);
                const estimatedThickness = isDot
                    ? Math.max(component.width, component.height)
                    : Math.max(10, component.pixels.length / Math.max(1, strokeLength));
                const sampleSpacing = isDot ? 10 : 12;
                const litRadius = isDot
                    ? Math.max(component.width, component.height) * transform.scale
                    : Math.max(9, estimatedThickness * transform.scale * 0.34);
                const hitPadding = isDot
                    ? Math.max(2, estimatedThickness * 0.1)
                    : Math.max(4, estimatedThickness * 0.3);

                const samplesBySegment = guideSegments.map((segment, segmentIndex) =>
                    this.sampleSegmentPoints(segment, sampleSpacing).map((sample, order) => ({
                        ...sample,
                        lit: false,
                        segmentIndex,
                        order
                    }))
                );

                return {
                    type: isDot ? 'dot' : 'stroke',
                    localMask,
                    localBBox: component.bbox,
                    guideSegments,
                    samplesBySegment,
                    hitPadding,
                    litRadius,
                    interactionCount: 0,
                    minInteractions: isDot ? 1 : Math.max(5, Math.ceil(guideSegments.reduce((sum, segment) => sum + segment.length, 0) / 18)),
                    completed: false
                };
            }

            calculatePathCollectionLength(paths) {
                let length = 0;

                paths.forEach(path => {
                    for (let i = 0; i < path.length - 1; i++) {
                        const dx = path[i + 1][0] - path[i][0];
                        const dy = path[i + 1][1] - path[i][1];
                        length += Math.hypot(dx, dy);
                    }
                });

                return length;
            }

            createComponentMask(component, width, height) {
                const componentMask = Array.from({ length: height }, () => Array(width).fill(0));
                component.pixels.forEach(([x, y]) => {
                    componentMask[y][x] = 1;
                });
                return componentMask;
            }

            zhangSuenThinning(mask) {
                const skeleton = mask.map(row => row.slice());
                const height = skeleton.length;
                const width = skeleton[0].length;
                let changed = true;

                while (changed) {
                    changed = false;
                    const toRemove = [];

                    for (let y = 1; y < height - 1; y++) {
                        for (let x = 1; x < width - 1; x++) {
                            if (skeleton[y][x] !== 1) continue;
                            const neighbors = this.getSkeletonNeighbors(skeleton, x, y);
                            const count = neighbors.reduce((sum, value) => sum + value, 0);
                            const transitions = this.countNeighborTransitions(neighbors);

                            if (
                                count >= 2 && count <= 6 &&
                                transitions === 1 &&
                                neighbors[0] * neighbors[2] * neighbors[4] === 0 &&
                                neighbors[2] * neighbors[4] * neighbors[6] === 0
                            ) {
                                toRemove.push([x, y]);
                            }
                        }
                    }

                    if (toRemove.length) {
                        changed = true;
                        toRemove.forEach(([x, y]) => {
                            skeleton[y][x] = 0;
                        });
                    }

                    toRemove.length = 0;

                    for (let y = 1; y < height - 1; y++) {
                        for (let x = 1; x < width - 1; x++) {
                            if (skeleton[y][x] !== 1) continue;
                            const neighbors = this.getSkeletonNeighbors(skeleton, x, y);
                            const count = neighbors.reduce((sum, value) => sum + value, 0);
                            const transitions = this.countNeighborTransitions(neighbors);

                            if (
                                count >= 2 && count <= 6 &&
                                transitions === 1 &&
                                neighbors[0] * neighbors[2] * neighbors[6] === 0 &&
                                neighbors[0] * neighbors[4] * neighbors[6] === 0
                            ) {
                                toRemove.push([x, y]);
                            }
                        }
                    }

                    if (toRemove.length) {
                        changed = true;
                        toRemove.forEach(([x, y]) => {
                            skeleton[y][x] = 0;
                        });
                    }
                }

                return skeleton;
            }

            getSkeletonNeighbors(mask, x, y) {
                return [
                    mask[y - 1][x],
                    mask[y - 1][x + 1],
                    mask[y][x + 1],
                    mask[y + 1][x + 1],
                    mask[y + 1][x],
                    mask[y + 1][x - 1],
                    mask[y][x - 1],
                    mask[y - 1][x - 1]
                ];
            }

            countNeighborTransitions(neighbors) {
                let transitions = 0;
                for (let i = 0; i < neighbors.length; i++) {
                    const current = neighbors[i];
                    const next = neighbors[(i + 1) % neighbors.length];
                    if (current === 0 && next === 1) {
                        transitions++;
                    }
                }
                return transitions;
            }

            traceSkeletonPaths(skeleton) {
                const nodes = new Map();
                const edges = new Set();
                const height = skeleton.length;
                const width = skeleton[0].length;

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        if (!skeleton[y][x]) continue;
                        const key = `${x},${y}`;
                        const neighbors = [];

                        for (let ny = y - 1; ny <= y + 1; ny++) {
                            for (let nx = x - 1; nx <= x + 1; nx++) {
                                if ((nx === x && ny === y) || nx < 0 || ny < 0 || nx >= width || ny >= height) continue;
                                if (skeleton[ny][nx]) {
                                    neighbors.push(`${nx},${ny}`);
                                    edges.add(this.makeEdgeKey(key, `${nx},${ny}`));
                                }
                            }
                        }

                        nodes.set(key, neighbors);
                    }
                }

                const visitedEdges = new Set();
                const paths = [];
                const importantNodes = [...nodes.keys()].filter(key => {
                    const degree = nodes.get(key).length;
                    return degree !== 2;
                });

                importantNodes.forEach(startKey => {
                    nodes.get(startKey).forEach(nextKey => {
                        const edgeKey = this.makeEdgeKey(startKey, nextKey);
                        if (visitedEdges.has(edgeKey)) return;
                        const path = this.walkSkeletonPath(startKey, nextKey, nodes, visitedEdges);
                        if (path.length > 1) {
                            paths.push(this.simplifyPath(path));
                        }
                    });
                });

                edges.forEach(edgeKey => {
                    if (visitedEdges.has(edgeKey)) return;
                    const [startKey, nextKey] = edgeKey.split('|');
                    const path = this.walkSkeletonPath(startKey, nextKey, nodes, visitedEdges, true);
                    if (path.length > 1) {
                        paths.push(this.simplifyPath(path));
                    }
                });

                return paths;
            }

            walkSkeletonPath(startKey, nextKey, nodes, visitedEdges, closeCycle = false) {
                const path = [this.parsePointKey(startKey)];
                let previousKey = startKey;
                let currentKey = nextKey;

                while (currentKey) {
                    path.push(this.parsePointKey(currentKey));
                    const edgeKey = this.makeEdgeKey(previousKey, currentKey);
                    visitedEdges.add(edgeKey);

                    const neighbors = nodes.get(currentKey) || [];
                    const unvisitedNeighbors = neighbors.filter(candidate => {
                        if (candidate === previousKey) return false;
                        return !visitedEdges.has(this.makeEdgeKey(currentKey, candidate));
                    });

                    if (!unvisitedNeighbors.length) {
                        if (closeCycle && currentKey !== startKey) {
                            const cycleEdge = this.makeEdgeKey(currentKey, startKey);
                            if (nodes.get(currentKey).includes(startKey) && !visitedEdges.has(cycleEdge)) {
                                previousKey = currentKey;
                                currentKey = startKey;
                                continue;
                            }
                        }
                        break;
                    }

                    previousKey = currentKey;
                    currentKey = unvisitedNeighbors[0];

                    if (!closeCycle && nodes.get(previousKey).length !== 2) {
                        break;
                    }
                }

                return path;
            }

            makeEdgeKey(a, b) {
                return [a, b].sort().join('|');
            }

            parsePointKey(key) {
                return key.split(',').map(Number);
            }

            simplifyPath(path) {
                if (path.length <= 2) return path;
                const simplified = this.rdp(path, 1.8);
                return this.resamplePath(simplified, 8);
            }

            rdp(points, epsilon) {
                if (points.length < 3) return points;

                let maxDistance = 0;
                let index = 0;
                const start = points[0];
                const end = points[points.length - 1];

                for (let i = 1; i < points.length - 1; i++) {
                    const distance = this.distanceToLineSegment(
                        { x: points[i][0], y: points[i][1] },
                        { x: start[0], y: start[1] },
                        { x: end[0], y: end[1] }
                    );
                    if (distance > maxDistance) {
                        maxDistance = distance;
                        index = i;
                    }
                }

                if (maxDistance <= epsilon) {
                    return [start, end];
                }

                const left = this.rdp(points.slice(0, index + 1), epsilon);
                const right = this.rdp(points.slice(index), epsilon);
                return left.slice(0, -1).concat(right);
            }

            resamplePath(path, spacing) {
                if (path.length < 2) return path;

                const result = [path[0]];
                let lastPoint = path[0];
                let accumulated = 0;

                for (let i = 1; i < path.length; i++) {
                    let start = lastPoint;
                    let end = path[i];
                    let segmentLength = Math.hypot(end[0] - start[0], end[1] - start[1]);

                    while (accumulated + segmentLength >= spacing) {
                        const ratio = (spacing - accumulated) / segmentLength;
                        const point = [
                            start[0] + (end[0] - start[0]) * ratio,
                            start[1] + (end[1] - start[1]) * ratio
                        ];
                        result.push(point);
                        start = point;
                        segmentLength = Math.hypot(end[0] - start[0], end[1] - start[1]);
                        accumulated = 0;
                    }

                    accumulated += segmentLength;
                    lastPoint = end;
                }

                const lastResult = result[result.length - 1];
                const lastPath = path[path.length - 1];
                if (lastResult[0] !== lastPath[0] || lastResult[1] !== lastPath[1]) {
                    result.push(path[path.length - 1]);
                }

                return result;
            }

            normalizePathsToCanvas(paths, transform) {
                if (!paths.length) return [];
                const { scale, offsetX, offsetY } = transform;

                return paths.map(path => path.map(([x, y]) => [
                    offsetX + x * scale,
                    offsetY + y * scale
                ]));
            }

            getTextBoundsTransform(bounds) {
                const sourceWidth = bounds.maxX - bounds.minX + 1;
                const sourceHeight = bounds.maxY - bounds.minY + 1;
                const availableWidth = this.canvas.width - 120;
                const availableHeight = this.canvas.height - 120;
                const scale = Math.min(availableWidth / sourceWidth, availableHeight / sourceHeight);
                const offsetX = (this.canvas.width - sourceWidth * scale) / 2;
                const offsetY = (this.canvas.height - sourceHeight * scale) / 2;

                return { sourceWidth, sourceHeight, scale, offsetX, offsetY };
            }

            drawTextBackdrop(text) {
                const render = this.renderTextMask(text);
                if (!render) return;

                const { canvas, bounds } = render;
                const { sourceWidth, sourceHeight, scale, offsetX, offsetY } = this.getTextBoundsTransform(bounds);

                this.ctx.save();
                this.ctx.globalAlpha = 0.18;
                this.ctx.drawImage(
                    canvas,
                    bounds.minX,
                    bounds.minY,
                    sourceWidth,
                    sourceHeight,
                    offsetX,
                    offsetY,
                    sourceWidth * scale,
                    sourceHeight * scale
                );
                this.ctx.restore();
            }

            async init() {
                this.createBackgroundDots();
                this.setupEventListeners();
                await this.ensureFontReady();
                this.drawCurrentShape();
                this.updateScoreDisplay();
            }

            async ensureFontReady() {
                if (!document.fonts || !document.fonts.load) {
                    this.fontReady = true;
                    return;
                }

                try {
                    await Promise.race([
                        Promise.all([
                            document.fonts.load('400 160px "Koodak"'),
                            document.fonts.load('400 160px "Vazirmatn"'),
                            document.fonts.ready
                        ]),
                        new Promise(resolve => setTimeout(resolve, 1800))
                    ]);
                } catch (error) {
                    // Fall through and draw with whatever font stack the browser resolved.
                }

                this.fontReady = true;
                this.traceCache.clear();
                this.redrawCanvas();
                setTimeout(() => {
                    this.traceCache.clear();
                    this.redrawCanvas();
                }, 350);
            }

            createBackgroundDots() {
                const dotsContainer = document.getElementById('dots-background');
                const spacing = 30;

                for (let x = spacing; x < window.innerWidth; x += spacing) {
                    for (let y = spacing; y < window.innerHeight; y += spacing) {
                        const dot = document.createElement('div');
                        dot.className = 'dot';
                        dot.style.left = x + 'px';
                        dot.style.top = y + 'px';
                        dotsContainer.appendChild(dot);
                    }
                }
            }

            setupEventListeners() {
                // Use Pointer Events API which handles touch, pen, and mouse uniformly
                // This ensures Apple Pencil works correctly on iPad
                if (window.PointerEvent) {
                    this.canvas.addEventListener('pointerdown', (e) => this.startDrawing(e));
                    this.canvas.addEventListener('pointermove', (e) => this.draw(e));
                    this.canvas.addEventListener('pointerup', (e) => this.stopDrawing(e));
                    this.canvas.addEventListener('pointercancel', (e) => this.stopDrawing(e));
                    this.canvas.addEventListener('pointerleave', (e) => this.stopDrawing(e));
                } else {
                    // Fallback for older browsers
                    // Touch events
                    this.canvas.addEventListener('touchstart', (e) => this.startDrawing(e), { passive: false });
                    this.canvas.addEventListener('touchmove', (e) => this.draw(e), { passive: false });
                    this.canvas.addEventListener('touchend', (e) => this.stopDrawing(e), { passive: false });

                    // Mouse events
                    this.canvas.addEventListener('mousedown', (e) => this.startDrawing(e));
                    this.canvas.addEventListener('mousemove', (e) => this.draw(e));
                    this.canvas.addEventListener('mouseup', (e) => this.stopDrawing(e));
                    this.canvas.addEventListener('mouseleave', (e) => this.stopDrawing(e));
                }
            }

            getCoordinates(e) {
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;

                // Handle touch events (for older browsers without Pointer Events)
                if (e.touches) {
                    e.preventDefault();
                    return {
                        x: (e.touches[0].clientX - rect.left) * scaleX,
                        y: (e.touches[0].clientY - rect.top) * scaleY
                    };
                }

                // Handle pointer and mouse events
                // Pointer events work for touch, pen (Apple Pencil), and mouse
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            }

            startDrawing(e) {
                e.preventDefault();
                this.drawing = true;
                this.activePointerId = typeof e.pointerId === 'number' ? e.pointerId : null;
                if (this.activePointerId !== null && this.canvas.setPointerCapture) {
                    this.canvas.setPointerCapture(this.activePointerId);
                }

                this.lastTracePoint = null;
                this.processTracePoint(this.getCoordinates(e));
            }

            draw(e) {
                if (!this.drawing) return;
                e.preventDefault();
                if (typeof e.pointerId === 'number' && this.activePointerId !== null && e.pointerId !== this.activePointerId) {
                    return;
                }

                this.processTracePoint(this.getCoordinates(e));
            }

            stopDrawing(e) {
                if (!this.drawing) return;

                this.drawing = false;
                if (typeof e.pointerId === 'number' && this.activePointerId !== null && this.canvas.releasePointerCapture) {
                    try {
                        this.canvas.releasePointerCapture(this.activePointerId);
                    } catch (error) {
                        // Ignore capture release failures from browsers that already released it.
                    }
                }
                this.activePointerId = null;
                this.lastTracePoint = null;
            }

            drawCurrentShape() {
                const shape = this.shapes[this.currentShapeIndex];
                const text = this.getShapeText(shape);
                const model = this.getTraceModel(shape);

                // Update instructions based on category
                const instructions = document.getElementById('instructions');
                if (shape.category === 'letter') {
                    instructions.textContent = 'حرف را دنبال کن!';
                    document.getElementById('shape-indicator').textContent = `حرف: ${shape.name}`;
                } else if (shape.category === 'word') {
                    instructions.textContent = 'کلمه را دنبال کن!';
                    document.getElementById('shape-indicator').textContent = `کلمه: ${shape.name}`;
                }

                if (text) {
                    this.drawTextBackdrop(text);
                }

                if (!model) return;
                this.drawGuidePaths(model);
                this.drawAcceptedGuideOverlay(model);
            }

            drawGuidePaths(model) {
                this.ctx.save();
                this.ctx.setLineDash([10, 10]);
                this.ctx.strokeStyle = 'rgba(79, 163, 209, 0.38)';
                this.ctx.lineWidth = 4;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                model.segments.forEach(segment => this.strokeSegment(segment));
                this.ctx.restore();
            }

            drawAcceptedGuideOverlay(model) {
                this.ctx.save();
                this.ctx.setLineDash([10, 10]);
                this.ctx.strokeStyle = '#6bcf7f';
                this.ctx.lineWidth = 7;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                this.ctx.shadowColor = 'rgba(107, 207, 127, 0.72)';
                this.ctx.shadowBlur = 14;

                model.components.forEach(component => {
                    component.samplesBySegment.forEach(samples => {
                        const litPath = [];

                        samples.forEach(sample => {
                            if (!sample.lit) {
                                if (litPath.length >= 2) {
                                    this.strokeLitSegment(litPath);
                                }
                                litPath.length = 0;
                                return;
                            }

                            litPath.push([sample.x, sample.y]);
                        });

                        if (litPath.length >= 2) {
                            this.strokeLitSegment(litPath);
                        }
                    });

                    if (component.type === 'dot' && component.completed) {
                        this.fillCompletedDot(component);
                    }
                });

                this.ctx.restore();
            }

            strokeSegment(points) {
                this.ctx.beginPath();
                this.ctx.moveTo(points[0][0], points[0][1]);
                for (let i = 1; i < points.length; i++) {
                    this.ctx.lineTo(points[i][0], points[i][1]);
                }
                this.ctx.stroke();
            }

            strokeLitSegment(points) {
                this.strokeSegment(points);
            }

            fillCompletedDot(component) {
                const segment = component.guideSegments[0];
                if (!segment || !segment.length) return;

                const center = segment.reduce((acc, point) => ({
                    x: acc.x + point[0],
                    y: acc.y + point[1]
                }), { x: 0, y: 0 });
                center.x /= segment.length;
                center.y /= segment.length;

                const radius = Math.max(
                    10,
                    ...segment.map(point => Math.hypot(point[0] - center.x, point[1] - center.y))
                );

                this.ctx.save();
                this.ctx.fillStyle = '#6bcf7f';
                this.ctx.shadowColor = 'rgba(107, 207, 127, 0.72)';
                this.ctx.shadowBlur = 18;
                this.ctx.beginPath();
                this.ctx.arc(center.x, center.y, radius * 0.8, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.restore();
            }

            redrawCanvas() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.drawCurrentShape();
            }

            getTraceAcceptanceThreshold() {
                if (this.difficultyScore <= 50) {
                    return 0.78 + (this.difficultyScore / 50) * 0.08;
                }

                return 0.86 + ((this.difficultyScore - 50) / 50) * 0.08;
            }

            sampleSegmentPoints(segment, spacing = 8) {
                if (!segment.length) return [];

                const samples = [{ x: segment[0][0], y: segment[0][1] }];

                for (let i = 0; i < segment.length - 1; i++) {
                    const start = { x: segment[i][0], y: segment[i][1] };
                    const end = { x: segment[i + 1][0], y: segment[i + 1][1] };
                    const length = Math.hypot(end.x - start.x, end.y - start.y);
                    const steps = Math.max(1, Math.ceil(length / spacing));

                    for (let step = 1; step <= steps; step++) {
                        const t = step / steps;
                        samples.push({
                            x: start.x + (end.x - start.x) * t,
                            y: start.y + (end.y - start.y) * t
                        });
                    }
                }

                return samples;
            }

            processTracePoint(point) {
                const shape = this.shapes[this.currentShapeIndex];
                const model = this.getTraceModel(shape);
                if (!model || this.successPending) return;

                const changed = this.applyTraceSegmentToModel(this.lastTracePoint, point, model);
                this.lastTracePoint = point;
                if (!changed) return;

                this.redrawCanvas();

                if (this.isTracingValid()) {
                    this.successPending = true;
                    this.onSuccess();
                    this.celebrate();
                    setTimeout(() => {
                        this.nextShape();
                    }, 1200);
                }
            }

            applyTraceSegmentToModel(fromPoint, toPoint, model) {
                if (!fromPoint) {
                    return this.applyTracePointToModel(toPoint, model);
                }

                const distance = Math.hypot(toPoint.x - fromPoint.x, toPoint.y - fromPoint.y);
                const steps = Math.max(1, Math.ceil(distance / 6));
                let changed = false;

                for (let step = 1; step <= steps; step++) {
                    const t = step / steps;
                    const point = {
                        x: fromPoint.x + (toPoint.x - fromPoint.x) * t,
                        y: fromPoint.y + (toPoint.y - fromPoint.y) * t
                    };
                    changed = this.applyTracePointToModel(point, model) || changed;
                }

                return changed;
            }

            applyTracePointToModel(point, model) {
                let changed = false;

                model.components.forEach(component => {
                    if (!this.isPointInsideComponent(point, component, model.transform)) {
                        return;
                    }

                    if (component.type === 'dot') {
                        changed = this.completeDot(component) || changed;
                        return;
                    }

                    changed = this.lightStrokeComponent(component, point) || changed;
                });

                return changed;
            }

            isPointInsideComponent(point, component, transform) {
                const localPoint = this.canvasPointToLocal(point, transform);
                const x = Math.round(localPoint.x);
                const y = Math.round(localPoint.y);

                if (
                    x < component.localBBox.minX - component.hitPadding ||
                    x > component.localBBox.maxX + component.hitPadding ||
                    y < component.localBBox.minY - component.hitPadding ||
                    y > component.localBBox.maxY + component.hitPadding
                ) {
                    return false;
                }

                const searchRadius = Math.ceil(component.hitPadding);
                for (let offsetY = -searchRadius; offsetY <= searchRadius; offsetY++) {
                    for (let offsetX = -searchRadius; offsetX <= searchRadius; offsetX++) {
                        const sampleX = x + offsetX;
                        const sampleY = y + offsetY;
                        if (
                            sampleY < 0 ||
                            sampleY >= component.localMask.length ||
                            sampleX < 0 ||
                            sampleX >= component.localMask[0].length
                        ) {
                            continue;
                        }

                        if (component.localMask[sampleY][sampleX]) {
                            return true;
                        }
                    }
                }

                return false;
            }

            canvasPointToLocal(point, transform) {
                return {
                    x: (point.x - transform.offsetX) / transform.scale,
                    y: (point.y - transform.offsetY) / transform.scale
                };
            }

            completeDot(component) {
                if (component.completed) return false;

                component.completed = true;
                component.samplesBySegment.forEach(samples => {
                    samples.forEach(sample => {
                        sample.lit = true;
                    });
                });
                return true;
            }

            lightStrokeComponent(component, point) {
                let changed = false;
                let nearestSegment = null;
                let nearestIndex = -1;
                let nearestDistance = Infinity;

                component.samplesBySegment.forEach(samples => {
                    samples.forEach((sample, index) => {
                        const distance = Math.hypot(sample.x - point.x, sample.y - point.y);
                        if (distance < nearestDistance) {
                            nearestDistance = distance;
                            nearestIndex = index;
                            nearestSegment = samples;
                        }
                    });
                });

                if (!nearestSegment || nearestIndex === -1) {
                    return false;
                }

                const spreadRadius = nearestDistance <= component.litRadius ? 1 : 0;
                for (let i = Math.max(0, nearestIndex - spreadRadius); i <= Math.min(nearestSegment.length - 1, nearestIndex + spreadRadius); i++) {
                    if (!nearestSegment[i].lit) {
                        nearestSegment[i].lit = true;
                        changed = true;
                    }
                }

                if (changed) {
                    component.interactionCount++;
                }

                return changed;
            }

            isTracingValid() {
                const shape = this.shapes[this.currentShapeIndex];
                const model = this.getTraceModel(shape);
                if (!model) return false;

                const requiredCoverage = this.getTraceAcceptanceThreshold();

                return model.components.every(component => {
                    if (component.type === 'dot') {
                        return component.completed;
                    }

                    let totalSamples = 0;
                    let litSamples = 0;
                    component.samplesBySegment.forEach(samples => {
                        totalSamples += samples.length;
                        litSamples += samples.filter(sample => sample.lit).length;
                    });

                    const coverage = totalSamples > 0 ? (litSamples / totalSamples) : 0;
                    const minimumLitSamples = Math.max(5, Math.ceil(totalSamples * 0.4));

                    return coverage >= requiredCoverage &&
                        litSamples >= minimumLitSamples &&
                        component.interactionCount >= component.minInteractions;
                });
            }

            getShapeSegments(shape) {
                // Returns array of segments (each segment is an array of [x,y] points)
                const segments = [];

                if (shape.type === 'circle') {
                    // Sample points around the circle
                    const numSamples = Math.min(50 + Math.floor(this.difficultyScore / 2), 100);
                    const circlePoints = [];
                    for (let i = 0; i <= numSamples; i++) {
                        const angle = (i / numSamples) * Math.PI * 2;
                        circlePoints.push([
                            shape.center[0] + shape.radius * Math.cos(angle),
                            shape.center[1] + shape.radius * Math.sin(angle)
                        ]);
                    }
                    segments.push(circlePoints);
                } else if (shape.type === 'letter') {
                    const paths = this.getShapePaths(shape);
                    paths.forEach(path => segments.push(path));
                } else if (shape.type === 'word') {
                    const paths = this.getShapePaths(shape);
                    paths.forEach(path => segments.push(path));
                } else if (shape.type === 'multiline') {
                    shape.paths.forEach(path => segments.push(path));
                } else {
                    // Single polygon
                    segments.push(shape.points);
                }

                return segments;
            }

            isPointNearSegment(point, segment, threshold) {
                // Check if point is near any part of the segment
                for (let i = 0; i < segment.length - 1; i++) {
                    const dist = this.distanceToLineSegment(
                        point,
                        {x: segment[i][0], y: segment[i][1]},
                        {x: segment[i+1][0], y: segment[i+1][1]}
                    );
                    if (dist < threshold) {
                        return true;
                    }
                }
                return false;
            }

            distanceToLineSegment(p, v, w) {
                // Distance from point p to line segment vw
                const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
                if (l2 === 0) return Math.sqrt(Math.pow(p.x - v.x, 2) + Math.pow(p.y - v.y, 2));

                let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
                t = Math.max(0, Math.min(1, t));

                const projX = v.x + t * (w.x - v.x);
                const projY = v.y + t * (w.y - v.y);

                return Math.sqrt(Math.pow(p.x - projX, 2) + Math.pow(p.y - projY, 2));
            }

            calculateShapeLength(shape) {
                let length = 0;

                if (shape.type === 'circle') {
                    length = 2 * Math.PI * shape.radius;
                } else if (shape.type === 'letter') {
                    const paths = this.getShapePaths(shape);
                    paths.forEach(path => {
                        for (let i = 0; i < path.length - 1; i++) {
                            const dx = path[i+1][0] - path[i][0];
                            const dy = path[i+1][1] - path[i][1];
                            length += Math.sqrt(dx * dx + dy * dy);
                        }
                    });
                } else if (shape.type === 'word') {
                    const paths = this.getShapePaths(shape);
                    paths.forEach(path => {
                        for (let i = 0; i < path.length - 1; i++) {
                            const dx = path[i+1][0] - path[i][0];
                            const dy = path[i+1][1] - path[i][1];
                            length += Math.sqrt(dx * dx + dy * dy);
                        }
                    });
                } else if (shape.type === 'multiline') {
                    shape.paths.forEach(path => {
                        for (let i = 0; i < path.length - 1; i++) {
                            const dx = path[i+1][0] - path[i][0];
                            const dy = path[i+1][1] - path[i][1];
                            length += Math.sqrt(dx * dx + dy * dy);
                        }
                    });
                } else {
                    for (let i = 0; i < shape.points.length - 1; i++) {
                        const dx = shape.points[i+1][0] - shape.points[i][0];
                        const dy = shape.points[i+1][1] - shape.points[i][1];
                        length += Math.sqrt(dx * dx + dy * dy);
                    }
                }

                return length;
            }

            clearCanvas() {
                const shape = this.shapes[this.currentShapeIndex];
                const model = this.getTraceModel(shape);
                if (model) {
                    model.components.forEach(component => {
                        component.completed = false;
                        component.interactionCount = 0;
                        component.samplesBySegment.forEach(samples => {
                            samples.forEach(sample => {
                                sample.lit = false;
                            });
                        });
                    });
                }
                this.lastTracePoint = null;
                this.redrawCanvas();
            }

            nextShape() {
                this.successPending = false;
                this.currentShapeIndex = (this.currentShapeIndex + 1) % this.shapes.length;
                this.clearCanvas();
            }

            playCelebrationSound() {
                const now = this.audioContext.currentTime;
                const frequencies = [523.25, 659.25, 783.99];

                frequencies.forEach((freq, index) => {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);

                    oscillator.frequency.value = freq;
                    oscillator.type = 'sine';

                    const startTime = now + index * 0.1;
                    gainNode.gain.setValueAtTime(0, startTime);
                    gainNode.gain.linearRampToValueAtTime(0.3, startTime + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);

                    oscillator.start(startTime);
                    oscillator.stop(startTime + 0.3);
                });
            }

            celebrate() {
                this.playCelebrationSound();

                const messages = ["عالی! ✨", "آفرین! ⭐", "فوق‌العاده! 🎉", "بی‌نظیر! 🌟"];
                const msg = messages[Math.floor(Math.random() * messages.length)];

                const celebration = document.createElement('div');
                celebration.className = 'celebration-overlay';
                celebration.textContent = msg;
                document.body.appendChild(celebration);

                setTimeout(() => {
                    celebration.remove();
                }, 1500);

                this.createConfetti();

                const container = document.querySelector('.container');
                container.classList.add('pulse');
                setTimeout(() => {
                    container.classList.remove('pulse');
                }, 500);
            }

            createConfetti() {
                const celebration = document.getElementById('celebration');
                const colors = ['#4fa3d1', '#6bcf7f', '#ffa45b', '#ff6b9d', '#ffd93d'];

                for (let i = 0; i < 40; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 0.3 + 's';
                    celebration.appendChild(confetti);

                    setTimeout(() => {
                        confetti.remove();
                    }, 2000);
                }
            }

            onSuccess() {
                // Increase difficulty when kid succeeds
                this.consecutiveSuccesses++;
                this.consecutiveFailures = 0;

                // Increase score based on consecutive successes
                // First success: +2 points
                // Second consecutive: +3 points
                // Third+ consecutive: +4 points
                let increment = 2;
                if (this.consecutiveSuccesses >= 3) {
                    increment = 4;
                } else if (this.consecutiveSuccesses >= 2) {
                    increment = 3;
                }

                this.difficultyScore = Math.min(100, this.difficultyScore + increment);
                this.updateScoreDisplay();
            }

            onFailure() {
                // Decrease difficulty when kid fails
                this.consecutiveFailures++;
                this.consecutiveSuccesses = 0;

                // Decrease score based on consecutive failures
                // First failure: -3 points
                // Second consecutive: -4 points
                // Third+ consecutive: -5 points
                let decrement = 3;
                if (this.consecutiveFailures >= 3) {
                    decrement = 5;
                } else if (this.consecutiveFailures >= 2) {
                    decrement = 4;
                }

                this.difficultyScore = Math.max(1, this.difficultyScore - decrement);
                this.updateScoreDisplay();
            }

            toPersianNumber(num) {
                const persianDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
                return num.toString().replace(/\d/g, x => persianDigits[parseInt(x)]);
            }

            updateScoreDisplay() {
                const scoreInfo = document.getElementById('score-info');
                const displayScore = Math.round(this.difficultyScore);
                scoreInfo.textContent = `امتیاز: ${this.toPersianNumber(displayScore)}`;

                // Update color based on difficulty level
                if (displayScore >= 70) {
                    scoreInfo.style.background = 'linear-gradient(135deg, #c44569, #ff6b9d)';
                    scoreInfo.style.boxShadow = '0 6px 15px rgba(196, 69, 105, 0.4)';
                } else if (displayScore >= 50) {
                    scoreInfo.style.background = 'linear-gradient(135deg, #ffa45b, #ffd93d)';
                    scoreInfo.style.boxShadow = '0 6px 15px rgba(255, 164, 91, 0.4)';
                } else {
                    scoreInfo.style.background = 'linear-gradient(135deg, #ff6b9d, #ffa45b)';
                    scoreInfo.style.boxShadow = '0 6px 15px rgba(255, 107, 157, 0.4)';
                }
            }
        }

        window.addEventListener('load', () => {
            new TracingGame();
        });
    </script>
</body>
</html>
