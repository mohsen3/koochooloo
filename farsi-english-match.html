<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Farsi English Match</title>
    <style>
        @font-face {
            font-family: 'Koodak';
            src: url("public/koodak.ttf") format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }

        :root {
            --app-height: 100dvh;
            --farsi-font: 'Koodak', 'Tahoma', sans-serif;
            --ui-font: 'Avenir Next', 'Trebuchet MS', 'Segoe UI', var(--farsi-font);
            --ink: #1c1c2e;
            --ink-soft: #5d6070;
            --panel: rgba(255, 255, 255, 0.65);
            --panel-strong: rgba(255, 255, 255, 0.88);
            --line: rgba(28, 28, 46, 0.08);
            --glow: 0 30px 70px rgba(16, 16, 40, 0.25);
            --accent-warm: #f8735e;
            --accent-cool: #3cd8be;
            --rows: 2;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            min-height: var(--app-height);
            height: var(--app-height);
            display: grid;
            place-items: center;
            font-family: var(--ui-font);
            color: var(--ink);
            background:
                radial-gradient(ellipse at 18% 22%, rgba(250, 210, 140, 0.35), transparent 48%),
                radial-gradient(ellipse at 85% 15%, rgba(200, 140, 250, 0.25), transparent 42%),
                radial-gradient(ellipse at 75% 82%, rgba(60, 216, 190, 0.2), transparent 44%),
                linear-gradient(132deg, #0f0c29 0%, #1a1a40 38%, #2d1b4e 72%, #1a2a3a 100%);
            padding: 10px;
            -webkit-touch-callout: none;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            width: 32vmax;
            height: 32vmax;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            pointer-events: none;
        }

        body::before {
            top: -12vmax;
            right: -8vmax;
            background: #e8a87c;
        }

        body::after {
            bottom: -14vmax;
            left: -10vmax;
            background: #5cd6c0;
        }

        .app {
            width: min(1240px, calc(100vw - 20px));
            height: min(860px, calc(var(--app-height) - 20px));
            border-radius: 36px;
            padding: clamp(12px, 1.6vw, 18px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            background:
                linear-gradient(155deg, rgba(255, 255, 255, 0.7), rgba(255, 248, 240, 0.55));
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--glow);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            overflow: hidden;
            position: relative;
            isolation: isolate;
        }

        .app::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 36px;
            padding: 1px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.05));
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
            pointer-events: none;
        }

        .topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 4px 4px 0;
        }

        .title-block h1 {
            margin: 0;
            font-size: clamp(22px, 2.8vw, 36px);
            line-height: 1;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--ink), #4a3f6b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-strip {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
            direction: rtl;
        }

        .status-pill {
            min-width: 68px;
            padding: 7px 10px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 12px rgba(16, 16, 40, 0.06);
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .status-pill span {
            display: block;
            font-size: 10px;
            letter-spacing: 0.04em;
            color: var(--ink-soft);
            text-transform: uppercase;
        }

        .status-pill strong {
            display: block;
            margin-top: 2px;
            font-size: clamp(16px, 1.5vw, 21px);
            line-height: 1.1;
            color: var(--ink);
        }

        .board {
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: clamp(64px, 10vw, 180px);
            padding: clamp(10px, 1.2vw, 14px);
            border-radius: 26px;
            background:
                linear-gradient(170deg, rgba(255, 255, 255, 0.6), rgba(255, 248, 240, 0.5));
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
            overflow: hidden;
        }

        #connectionCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .column {
            position: relative;
            z-index: 2;
            min-width: 0;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        .word-list {
            flex: 1 1 auto;
            min-height: 0;
            display: grid;
            grid-template-rows: repeat(var(--rows), minmax(0, 1fr));
            gap: clamp(8px, 1vw, 12px);
        }

        .word-card {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            min-width: 0;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(28, 28, 46, 0.07);
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 6px 16px rgba(16, 16, 40, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.7);
            transition: transform 200ms cubic-bezier(.34,1.56,.64,1), border-color 200ms ease, box-shadow 200ms ease, background 200ms ease;
            isolation: isolate;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .word-card[data-side="left"] {
            padding-right: 56px;
        }

        .word-card[data-side="right"] {
            padding-left: 56px;
        }

        .word-card.is-origin {
            transform: scale(1.025);
            border-color: rgba(248, 115, 94, 0.5);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 16px 40px rgba(248, 115, 94, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .word-card.is-hover {
            transform: scale(1.02);
            border-color: var(--match-color, rgba(60, 216, 190, 0.6));
            background: rgba(255, 255, 255, 0.94);
            box-shadow:
                0 16px 40px rgba(16, 16, 40, 0.1),
                0 0 0 3px var(--match-color, #3cd8be),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .word-card.matched {
            transform: scale(1.02);
            border-color: var(--match-color, #3cd8be);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(245, 252, 250, 0.92));
            box-shadow:
                0 16px 40px rgba(16, 16, 40, 0.1),
                0 0 0 3px var(--match-color, #3cd8be),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .word-card.wrong {
            animation: shake 300ms ease;
            border-color: rgba(255, 86, 115, 0.5);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-3px); }
        }

        .word-text {
            width: 100%;
            min-width: 0;
            text-align: center;
            font-weight: 700;
            font-size: clamp(18px, 2vw, 30px);
            line-height: 1.15;
            word-break: break-word;
        }

        .word-text[lang="fa"] {
            direction: rtl;
            font-family: var(--farsi-font);
            font-size: clamp(20px, 2.2vw, 34px);
        }

        .word-card::after {
            content: "";
            position: absolute;
            top: 8px;
            right: 12px;
            width: 24px;
            height: 24px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 700;
            color: #ffffff;
            background: var(--match-color, #3cd8be);
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 220ms cubic-bezier(.34,1.56,.64,1), transform 220ms cubic-bezier(.34,1.56,.64,1);
            box-shadow: 0 6px 14px rgba(16, 16, 40, 0.15);
        }

        .word-card.matched::after {
            content: "✓";
            opacity: 1;
            transform: scale(1);
        }

        .connector {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: clamp(28px, 2.8vw, 34px);
            height: clamp(28px, 2.8vw, 34px);
            border-radius: 999px;
            border: 2px solid rgba(28, 28, 46, 0.13);
            background:
                radial-gradient(circle at 36% 28%, #ffffff, #f5f0ff 55%, #e8e0f4 100%);
            box-shadow: 0 4px 10px rgba(16, 16, 40, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            cursor: grab;
            touch-action: none;
            transition: transform 160ms cubic-bezier(.34,1.56,.64,1), border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }

        .connector::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(28, 28, 46, 0.18);
            position: absolute;
            inset: 0;
            margin: auto;
            transition: background 160ms ease, transform 160ms cubic-bezier(.34,1.56,.64,1);
        }

        .connector.left {
            left: 10px;
        }

        .connector.right {
            right: 10px;
        }

        .connector:active,
        .connector.is-active,
        .connector.is-hover {
            transform: translateY(-50%) scale(1.1);
        }

        .connector:active::before,
        .connector.is-active::before {
            transform: scale(1.3);
        }

        .connector.is-active,
        .connector.is-hover,
        .connector.matched {
            border-color: var(--match-color, #3cd8be);
            background:
                radial-gradient(circle at 36% 28%, #ffffff, color-mix(in srgb, var(--match-color, #3cd8be) 20%, #f5f0ff) 55%, color-mix(in srgb, var(--match-color, #3cd8be) 30%, #e8e0f4) 100%);
            box-shadow:
                0 6px 16px rgba(16, 16, 40, 0.15),
                0 0 0 4px rgba(255, 255, 255, 0.5);
        }

        .connector.is-active::before,
        .connector.is-hover::before,
        .connector.matched::before {
            background: var(--match-color, #3cd8be);
        }

        .connector.matched {
            cursor: default;
        }

        .toast {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            padding: 18px 34px;
            border-radius: 26px;
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(255, 248, 240, 0.96));
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 28px 50px rgba(16, 16, 40, 0.25);
            font-family: var(--farsi-font);
            font-size: clamp(30px, 4vw, 54px);
            line-height: 1;
            color: var(--toast-color, #f8735e);
            opacity: 0;
            pointer-events: none;
            transition: opacity 200ms ease, transform 220ms cubic-bezier(.34,1.56,.64,1);
            z-index: 4;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .spark {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffffff 0%, var(--spark-color, #3cd8be) 55%, transparent 70%);
            pointer-events: none;
            animation: spark 520ms ease-out forwards;
            z-index: 4;
        }

        @keyframes spark {
            from {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.3);
            }
            to {
                opacity: 0;
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.3);
            }
        }

        #resetBtn {
            cursor: pointer;
            border: none;
            font: inherit;
            color: var(--ink-soft);
            background: rgba(248, 115, 94, 0.08);
            transition: background 200ms ease, transform 200ms cubic-bezier(.34,1.56,.64,1), color 200ms ease;
            min-width: 48px;
            display: grid;
            place-items: center;
            line-height: 1;
            font-size: clamp(18px, 1.6vw, 24px);
        }
        #resetBtn:hover,
        #resetBtn:active {
            background: rgba(248, 115, 94, 0.18);
            color: var(--ink);
            transform: scale(1.06);
        }

        html[data-level-theme="ocean"] body {
            background:
                radial-gradient(ellipse at 18% 22%, rgba(140, 220, 255, 0.3), transparent 48%),
                radial-gradient(ellipse at 85% 15%, rgba(100, 180, 250, 0.2), transparent 42%),
                radial-gradient(ellipse at 75% 82%, rgba(60, 200, 220, 0.18), transparent 44%),
                linear-gradient(132deg, #082032 0%, #0e4b5c 38%, #1a6d7a 72%, #0d3b4a 100%);
        }
        html[data-level-theme="ocean"] .app {
            background:
                linear-gradient(155deg, rgba(230, 248, 255, 0.7), rgba(210, 240, 250, 0.55));
        }
        html[data-level-theme="ocean"] .title-block h1 {
            background: linear-gradient(135deg, #0e4b5c, #1a6d7a);
            -webkit-background-clip: text;
            background-clip: text;
        }
        html[data-level-theme="sunset"] body {
            background:
                radial-gradient(ellipse at 18% 22%, rgba(255, 180, 120, 0.3), transparent 48%),
                radial-gradient(ellipse at 85% 15%, rgba(230, 100, 180, 0.2), transparent 42%),
                radial-gradient(ellipse at 75% 82%, rgba(255, 120, 100, 0.18), transparent 44%),
                linear-gradient(132deg, #2a0a1e 0%, #5c1a3e 38%, #8a2a4a 72%, #3a0a20 100%);
        }
        html[data-level-theme="sunset"] .app {
            background:
                linear-gradient(155deg, rgba(255, 240, 248, 0.7), rgba(255, 228, 238, 0.55));
        }
        html[data-level-theme="sunset"] .title-block h1 {
            background: linear-gradient(135deg, #5c1a3e, #8a2a4a);
            -webkit-background-clip: text;
            background-clip: text;
        }
        html[data-level-theme="royal"] body {
            background:
                radial-gradient(ellipse at 18% 22%, rgba(255, 210, 80, 0.3), transparent 48%),
                radial-gradient(ellipse at 85% 15%, rgba(230, 170, 60, 0.2), transparent 42%),
                radial-gradient(ellipse at 75% 82%, rgba(255, 200, 100, 0.18), transparent 44%),
                linear-gradient(132deg, #1a0f00 0%, #4a3008 38%, #7a5518 72%, #2a1800 100%);
        }
        html[data-level-theme="royal"] .app {
            background:
                linear-gradient(155deg, rgba(255, 250, 235, 0.7), rgba(255, 245, 220, 0.55));
        }
        html[data-level-theme="royal"] .title-block h1 {
            background: linear-gradient(135deg, #4a3008, #7a5518);
            -webkit-background-clip: text;
            background-clip: text;
        }

        @media (max-width: 960px) {
            .board {
                gap: clamp(40px, 8vw, 96px);
            }

            .status-pill {
                min-width: 64px;
            }
        }

        @media (max-width: 760px) {
            .app {
                padding: 10px;
            }

            .topbar {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .status-strip {
                justify-content: flex-start;
            }

            .board {
                gap: 16px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="title-block">
                <h1>بازی جور کردن فارسی و انگلیسی</h1>
            </div>
            <div class="status-strip" dir="rtl">
                <div class="status-pill">
                    <span>مرحله</span>
                    <strong id="levelLabel">۱</strong>
                </div>
                <div class="status-pill">
                    <span>واژه</span>
                    <strong id="wordsLabel">۲</strong>
                </div>
                <div class="status-pill">
                    <span>صفحه</span>
                    <strong id="pageLabel">۱ از ۴</strong>
                </div>
                <div class="status-pill">
                    <span>جور شده</span>
                    <strong id="matchLabel">۰ از ۲</strong>
                </div>
                <button class="status-pill" id="resetBtn" type="button" aria-label="Reset progress">↻</button>
            </div>
        </div>

        <div class="board" id="board">
            <canvas id="connectionCanvas"></canvas>

            <section class="column">
                <div class="word-list" id="englishList"></div>
            </section>

            <section class="column">
                <div class="word-list" id="farsiList"></div>
            </section>

            <div class="toast" id="toast"></div>
        </div>
    </div>

    <script>
        let WORD_BANK = [];

        class TranslationMatchingGame {
            constructor() {
                this.board = document.getElementById('board');
                this.canvas = document.getElementById('connectionCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.englishList = document.getElementById('englishList');
                this.farsiList = document.getElementById('farsiList');
                this.levelLabel = document.getElementById('levelLabel');
                this.pageLabel = document.getElementById('pageLabel');
                this.matchLabel = document.getElementById('matchLabel');
                this.wordsLabel = document.getElementById('wordsLabel');
                this.toast = document.getElementById('toast');

                this.level = 1;
                this.pagesClearedInLevel = 0;
                this.loadProgress();
                this.matchesMade = 0;
                this.connectionSerial = 0;
                this.activeDrag = null;
                this.connections = [];
                this.currentPairs = [];
                this.recentPairIds = [];
                this.hoverConnector = null;
                this.resizeFrame = 0;
                this.pageAdvanceTimeout = 0;
                this.toastTimeout = 0;

                this.handleResize = this.handleResize.bind(this);
                this.handlePointerMove = this.handlePointerMove.bind(this);
                this.handlePointerUp = this.handlePointerUp.bind(this);

                const resetBtn = document.getElementById('resetBtn');
                if (resetBtn) {
                    resetBtn.addEventListener('click', () => this.resetProgress());
                }

                this.init();
            }

            async loadWordBank() {
                const response = await fetch('data/farsi-word-bank.json');
                if (!response.ok) {
                    throw new Error(`Failed to load shared Farsi word bank: ${response.status}`);
                }

                const bank = await response.json();
                const groupSize = 20;
                const groups = [];

                for (let groupIndex = 0; groupIndex < bank.length; groupIndex += groupSize) {
                    const chunk = bank.slice(groupIndex, groupIndex + groupSize);
                    groups.push(chunk.map((entry, pairIndex) => ({
                        en: entry.en,
                        fa: entry.fa,
                        id: `g${Math.floor(groupIndex / groupSize) + 1}-${pairIndex + 1}`
                    })));
                }

                return groups;
            }

            async init() {
                WORD_BANK = await this.loadWordBank();
                this.syncViewportHeight();
                window.addEventListener('resize', this.handleResize, { passive: true });
                window.addEventListener('orientationchange', this.handleResize, { passive: true });
                if (window.visualViewport) {
                    window.visualViewport.addEventListener('resize', this.handleResize, { passive: true });
                }

                const start = () => this.startPage();

                if (document.fonts && document.fonts.ready) {
                    Promise.race([
                        document.fonts.ready,
                        new Promise(resolve => setTimeout(resolve, 700))
                    ]).then(start);
                } else {
                    start();
                }
            }

            syncViewportHeight() {
                const visualViewport = window.visualViewport;
                const viewportHeight = Math.round((visualViewport ? visualViewport.height : 0) || window.innerHeight || 0);
                if (viewportHeight > 0) {
                    document.documentElement.style.setProperty('--app-height', `${viewportHeight}px`);
                }
            }

            handleResize() {
                this.syncViewportHeight();
                cancelAnimationFrame(this.resizeFrame);
                this.resizeFrame = requestAnimationFrame(() => {
                    this.resizeCanvas();
                    this.redrawConnections();
                });
            }

            loadProgress() {
                try {
                    const saved = localStorage.getItem('farsi-english-match-progress');
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (typeof data.level === 'number') this.level = data.level;
                        if (typeof data.pagesClearedInLevel === 'number') this.pagesClearedInLevel = data.pagesClearedInLevel;
                    }
                } catch (_) { /* ignore */ }
            }

            saveProgress() {
                try {
                    localStorage.setItem('farsi-english-match-progress', JSON.stringify({
                        level: this.level,
                        pagesClearedInLevel: this.pagesClearedInLevel
                    }));
                } catch (_) { /* ignore */ }
            }

            resetProgress() {
                if (!confirm('آیا مطمئن هستید؟ تمام مراحل پاک می‌شوند.')) return;
                localStorage.removeItem('farsi-english-match-progress');
                this.level = 1;
                this.pagesClearedInLevel = 0;
                this.recentPairIds = [];
                this.connections = [];
                this.startPage();
            }

            wordsPerPage() {
                return Math.min(2 + (this.level - 1), 7);
            }

            totalPagesPerLevel() {
                return 4;
            }

            toFaNumber(value) {
                return String(value).replace(/\d/g, digit => '۰۱۲۳۴۵۶۷۸۹'[Number(digit)]);
            }

            shuffle(items) {
                const copy = [...items];
                for (let index = copy.length - 1; index > 0; index -= 1) {
                    const swapIndex = Math.floor(Math.random() * (index + 1));
                    [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
                }
                return copy;
            }

            unlockedGroups() {
                return WORD_BANK.slice(0, Math.min(this.level, WORD_BANK.length));
            }

            pickPairs() {
                const count = this.wordsPerPage();
                const groups = this.unlockedGroups();
                const currentGroup = groups[groups.length - 1];
                const unlocked = groups.flat();
                const recentSet = new Set(this.recentPairIds);
                const hardCount = Math.max(1, Math.min(count, Math.ceil(count / 2)));

                const fillFrom = source => {
                    const picked = [];
                    for (const pair of source) {
                        if (picked.length >= count) break;
                        if (picked.some(item => item.id === pair.id)) continue;
                        picked.push(pair);
                    }
                    return picked;
                };

                let primary = this.shuffle(currentGroup.filter(pair => !recentSet.has(pair.id))).slice(0, hardCount);
                if (primary.length < hardCount) {
                    const fallbackPrimary = this.shuffle(currentGroup).filter(pair => !primary.some(item => item.id === pair.id));
                    primary = primary.concat(fallbackPrimary.slice(0, hardCount - primary.length));
                }

                let remainderPool = this.shuffle(unlocked.filter(pair => !recentSet.has(pair.id) && !primary.some(item => item.id === pair.id)));
                let pairs = primary.concat(fillFrom(remainderPool).slice(0, count - primary.length));

                if (pairs.length < count) {
                    remainderPool = this.shuffle(unlocked.filter(pair => !pairs.some(item => item.id === pair.id)));
                    pairs = pairs.concat(fillFrom(remainderPool).slice(0, count - pairs.length));
                }

                return this.shuffle(pairs.slice(0, count));
            }

            updateRecentPairs(pairs) {
                this.recentPairIds.push(...pairs.map(pair => pair.id));
                const maxRecent = 18;
                if (this.recentPairIds.length > maxRecent) {
                    this.recentPairIds = this.recentPairIds.slice(-maxRecent);
                }
            }

            getLevelTheme(level) {
                if (level <= 2) return 'warm';
                if (level <= 5) return 'ocean';
                if (level <= 8) return 'sunset';
                return 'royal';
            }

            applyLevelTheme(level) {
                document.documentElement.dataset.levelTheme = this.getLevelTheme(level);
            }

            getLevelUpMessage(level) {
                if (level === 2) return 'آفرین! مرحله ۲';
                if (level === 3) return 'عالی! مرحله ۳';
                if (level === 5) return '🎉 مرحله ۵';
                if (level === 10) return '🔥 مرحله ۱۰';
                if (level % 5 === 0) return `🏆 مرحله ${this.toFaNumber(level)}`;
                if (level % 3 === 0) return `داغ داغ! مرحله ${this.toFaNumber(level)}`;
                return `مرحله ${this.toFaNumber(level)}`;
            }

            getPageClearMessage() {
                const msgs = ['آفرین', 'عالی', 'خوشگل', 'داغ داغ', 'به به'];
                return msgs[Math.floor(Math.random() * msgs.length)];
            }

            startPage() {
                clearTimeout(this.pageAdvanceTimeout);
                this.clearToast();
                this.matchesMade = 0;
                this.connections = [];
                this.currentPairs = this.pickPairs();
                this.updateRecentPairs(this.currentPairs);
                this.activeDrag = null;
                this.connectionSerial = 0;
                this.clearHoverConnector();
                this.applyLevelTheme(this.level);
                this.renderPage();
                this.resizeCanvas();
                this.redrawConnections();
                this.updateStatus();
            }

            renderPage() {
                const wordCount = this.currentPairs.length;
                this.board.style.setProperty('--rows', String(wordCount));
                this.englishList.innerHTML = '';
                this.farsiList.innerHTML = '';

                const leftPairs = this.shuffle(this.currentPairs);
                const rightPairs = this.shuffle(this.currentPairs);

                for (const pair of leftPairs) {
                    this.englishList.appendChild(this.createWordCard(pair, 'left'));
                }

                for (const pair of rightPairs) {
                    this.farsiList.appendChild(this.createWordCard(pair, 'right'));
                }
            }

            createWordCard(pair, side) {
                const card = document.createElement('article');
                card.className = 'word-card';
                card.dataset.pairId = pair.id;
                card.dataset.side = side;

                const word = document.createElement('div');
                word.className = 'word-text';
                if (side === 'left') {
                    word.lang = 'en';
                    word.textContent = pair.en;
                } else {
                    word.lang = 'fa';
                    word.dir = 'rtl';
                    word.textContent = pair.fa;
                }

                const connector = document.createElement('button');
                connector.type = 'button';
                connector.className = `connector ${side === 'left' ? 'right' : 'left'}`;
                connector.dataset.pairId = pair.id;
                connector.dataset.side = side;
                connector.setAttribute('aria-label', `Match ${side === 'left' ? pair.en : pair.fa}`);
                connector.addEventListener('pointerdown', event => this.beginDrag(event, connector));
                card.addEventListener('pointerdown', event => {
                    if (event.target.closest('.connector')) return;
                    this.beginDrag(event, connector);
                });

                card.append(word, connector);
                return card;
            }

            updateStatus() {
                const pageNumber = this.pagesClearedInLevel + 1;
                const totalPages = this.totalPagesPerLevel();
                const words = this.currentPairs.length;

                this.levelLabel.textContent = this.toFaNumber(this.level);
                this.pageLabel.textContent = `${this.toFaNumber(pageNumber)} از ${this.toFaNumber(totalPages)}`;
                this.matchLabel.textContent = `${this.toFaNumber(this.matchesMade)} از ${this.toFaNumber(words)}`;
                this.wordsLabel.textContent = this.toFaNumber(words);
            }

            resizeCanvas() {
                const rect = this.board.getBoundingClientRect();
                const ratio = window.devicePixelRatio || 1;
                this.canvas.width = Math.round(rect.width * ratio);
                this.canvas.height = Math.round(rect.height * ratio);
                this.canvas.style.width = `${rect.width}px`;
                this.canvas.style.height = `${rect.height}px`;
                this.ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
            }

            getConnectorPoint(connector) {
                const connectorRect = connector.getBoundingClientRect();
                const boardRect = this.board.getBoundingClientRect();
                return {
                    x: connectorRect.left - boardRect.left + (connectorRect.width / 2),
                    y: connectorRect.top - boardRect.top + (connectorRect.height / 2)
                };
            }

            beginDrag(event, connector) {
                if (connector.classList.contains('matched')) return;
                if (this.activeDrag) return;

                event.preventDefault();

                const pairId = connector.dataset.pairId;
                const side = connector.dataset.side;
                const color = this.nextColor();
                const startCard = connector.closest('.word-card');

                this.activeDrag = {
                    pairId,
                    side,
                    startConnector: connector,
                    startCard,
                    color,
                    pointer: this.clientToBoardPoint(event.clientX, event.clientY)
                };

                connector.classList.add('is-active');
                startCard.classList.add('is-origin');
                startCard.style.setProperty('--match-color', color);
                connector.style.setProperty('--match-color', color);

                window.addEventListener('pointermove', this.handlePointerMove);
                window.addEventListener('pointerup', this.handlePointerUp);
                window.addEventListener('pointercancel', this.handlePointerUp);

                this.redrawConnections();
            }

            clientToBoardPoint(clientX, clientY) {
                const rect = this.board.getBoundingClientRect();
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            handlePointerMove(event) {
                if (!this.activeDrag) return;

                this.activeDrag.pointer = this.clientToBoardPoint(event.clientX, event.clientY);
                const hovered = this.findConnectorAt(event.clientX, event.clientY);
                this.setHoverConnector(hovered);
                this.redrawConnections();
            }

            handlePointerUp(event) {
                if (!this.activeDrag) return;

                const drag = this.activeDrag;
                const target = this.findConnectorAt(event.clientX, event.clientY);
                const validTarget = target
                    && target !== drag.startConnector
                    && target.dataset.side !== drag.side
                    && !target.classList.contains('matched');

                if (validTarget && target.dataset.pairId === drag.pairId) {
                    this.completeMatch(drag, target);
                } else {
                    if (validTarget) {
                        this.flashWrong(target.closest('.word-card'));
                    }
                    this.resetDragState();
                }

                window.removeEventListener('pointermove', this.handlePointerMove);
                window.removeEventListener('pointerup', this.handlePointerUp);
                window.removeEventListener('pointercancel', this.handlePointerUp);
            }

            findConnectorAt(clientX, clientY) {
                const element = document.elementFromPoint(clientX, clientY);
                let connector = element ? element.closest('.connector') : null;
                if (!connector) {
                    const card = element ? element.closest('.word-card') : null;
                    connector = card ? card.querySelector('.connector') : null;
                }
                if (!connector) return null;
                if (!this.activeDrag) return connector;
                return connector.dataset.side !== this.activeDrag.side ? connector : null;
            }

            setHoverConnector(connector) {
                if (this.hoverConnector === connector) return;

                if (this.hoverConnector) {
                    this.hoverConnector.classList.remove('is-hover');
                    const previousCard = this.hoverConnector.closest('.word-card');
                    if (previousCard) {
                        previousCard.classList.remove('is-hover');
                    }
                }

                this.hoverConnector = connector;

                if (connector && this.activeDrag) {
                    const card = connector.closest('.word-card');
                    connector.classList.add('is-hover');
                    connector.style.setProperty('--match-color', this.activeDrag.color);
                    if (card) {
                        card.classList.add('is-hover');
                        card.style.setProperty('--match-color', this.activeDrag.color);
                    }
                }
            }

            clearHoverConnector() {
                if (!this.hoverConnector) return;
                this.hoverConnector.classList.remove('is-hover');
                const card = this.hoverConnector.closest('.word-card');
                if (card) {
                    card.classList.remove('is-hover');
                }
                this.hoverConnector = null;
            }

            flashWrong(card) {
                if (!card) return;
                card.classList.remove('wrong');
                void card.offsetWidth;
                card.classList.add('wrong');
                setTimeout(() => card.classList.remove('wrong'), 280);
            }

            completeMatch(drag, targetConnector) {
                const leftConnector = drag.side === 'left' ? drag.startConnector : targetConnector;
                const rightConnector = drag.side === 'right' ? drag.startConnector : targetConnector;
                const color = drag.color;

                this.connections.push({
                    pairId: drag.pairId,
                    leftConnector,
                    rightConnector,
                    color
                });

                this.markMatched(leftConnector, color);
                this.markMatched(rightConnector, color);
                this.spawnSpark(leftConnector, color);
                this.spawnSpark(rightConnector, color);

                this.matchesMade += 1;
                this.resetDragState();
                this.redrawConnections();
                this.updateStatus();

                if (this.matchesMade === this.currentPairs.length) {
                    this.finishPage();
                }
            }

            markMatched(connector, color) {
                const card = connector.closest('.word-card');
                connector.classList.add('matched');
                connector.style.setProperty('--match-color', color);
                card.classList.add('matched');
                card.style.setProperty('--match-color', color);
            }

            spawnSpark(connector, color) {
                const point = this.getConnectorPoint(connector);

                for (let index = 0; index < 6; index += 1) {
                    const spark = document.createElement('div');
                    const angle = (Math.PI * 2 * index) / 6;
                    const distance = 22 + (index % 2) * 8;
                    spark.className = 'spark';
                    spark.style.left = `${point.x}px`;
                    spark.style.top = `${point.y}px`;
                    spark.style.setProperty('--spark-color', color);
                    spark.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
                    spark.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
                    this.board.appendChild(spark);
                    setTimeout(() => spark.remove(), 520);
                }
            }

            finishPage() {
                this.pagesClearedInLevel += 1;
                const leveledUp = this.pagesClearedInLevel >= this.totalPagesPerLevel();

                if (leveledUp) {
                    this.level += 1;
                    this.pagesClearedInLevel = 0;
                    this.applyLevelTheme(this.level);
                    this.showToast(this.getLevelUpMessage(this.level));
                } else {
                    this.showToast(this.getPageClearMessage());
                }
                this.saveProgress();

                this.pageAdvanceTimeout = window.setTimeout(() => {
                    this.startPage();
                }, leveledUp ? 1200 : 900);
            }

            showToast(text) {
                clearTimeout(this.toastTimeout);
                const lastConnection = this.connections[this.connections.length - 1];
                this.toast.textContent = text;
                this.toast.style.setProperty('--toast-color', lastConnection ? lastConnection.color : '#ff7a59');
                this.toast.classList.add('show');
                this.toastTimeout = window.setTimeout(() => this.clearToast(), 760);
            }

            clearToast() {
                this.toast.classList.remove('show');
            }

            resetDragState() {
                if (!this.activeDrag) return;

                this.activeDrag.startConnector.classList.remove('is-active');
                this.activeDrag.startCard.classList.remove('is-origin');
                this.activeDrag.startCard.classList.remove('is-hover');
                if (!this.activeDrag.startCard.classList.contains('matched')) {
                    this.activeDrag.startCard.style.removeProperty('--match-color');
                    this.activeDrag.startConnector.style.removeProperty('--match-color');
                }

                this.activeDrag = null;
                this.clearHoverConnector();
                this.redrawConnections();
            }

            nextColor() {
                const hue = (this.connectionSerial * 47) % 360;
                this.connectionSerial += 1;
                return `hsl(${hue} 88% 58%)`;
            }

            redrawConnections() {
                const ctx = this.ctx;
                if (!ctx) return;

                const rect = this.board.getBoundingClientRect();
                ctx.clearRect(0, 0, rect.width, rect.height);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for (const connection of this.connections) {
                    const start = this.getConnectorPoint(connection.leftConnector);
                    const end = this.getConnectorPoint(connection.rightConnector);
                    this.drawCurve(start, end, connection.color, 1);
                }

                if (this.activeDrag) {
                    const start = this.getConnectorPoint(this.activeDrag.startConnector);
                    const end = this.hoverConnector
                        ? this.getConnectorPoint(this.hoverConnector)
                        : this.activeDrag.pointer;
                    this.drawCurve(start, end, this.activeDrag.color, 0.85);
                }
            }

            drawCurve(start, end, color, alpha) {
                const ctx = this.ctx;
                const midX = (start.x + end.x) / 2;
                const bend = Math.max(48, Math.abs(end.x - start.x) * 0.2);

                ctx.save();
                ctx.strokeStyle = color;
                ctx.globalAlpha = alpha;
                ctx.lineWidth = 5;
                ctx.setLineDash([12, 10]);
                ctx.shadowColor = color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.bezierCurveTo(midX - bend, start.y, midX + bend, end.y, end.x, end.y);
                ctx.stroke();
                ctx.restore();
            }
        }

        new TranslationMatchingGame();
    </script>
</body>
</html>
