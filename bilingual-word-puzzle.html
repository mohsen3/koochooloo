<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>پازل دو زبانه</title>
    <style>
        @font-face {
            font-family: 'Koodak';
            src: url("public/koodak.ttf") format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }

        :root {
            --app-height: 100dvh;
            --farsi-font: 'Koodak', 'Tahoma', sans-serif;
            --paper: #f7e7cf;
            --card: #fff9f0;
            --line: #d9b68a;
            --ink: #4f3a22;
            --good: #36b66d;
            --body-bg-light: #f5dfc2;
            --body-bg-paper: #f7e7cf;
            --game-border-color: rgba(255, 255, 255, 0.9);
            --play-area-border: rgba(150, 100, 60, 0.2);
            --play-area-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 245, 230, 0.8));
        }

        html {
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }
        * { box-sizing: border-box; }
        html, body, .game, .game * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            margin: 0;
            font-family: var(--farsi-font);
            min-height: 100vh;
            min-height: 100dvh;
            min-height: var(--app-height);
            height: var(--app-height);
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 15% 15%, rgba(255,255,255,0.7), transparent 20%),
                radial-gradient(circle at 80% 20%, rgba(255,220,170,0.45), transparent 20%),
                linear-gradient(135deg, var(--body-bg-light), var(--body-bg-paper));
            overflow: hidden;
            padding: 8px;
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        .game {
            width: min(1100px, 95vw);
            height: min(920px, calc(var(--app-height) - 16px));
            min-height: 0;
            display: flex;
            flex-direction: column;
            border-radius: 28px;
            border: 5px solid var(--game-border-color);
            box-shadow: 0 20px 60px rgba(89, 60, 32, 0.22);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 247, 234, 0.95));
            position: relative;
            padding: 16px clamp(12px, 1.5vw, 18px) clamp(12px, 1.5vw, 18px);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            color: var(--ink);
            margin-bottom: 8px;
            min-height: 48px;
        }
        .topbar-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        h1 {
            margin: 0;
            font-size: clamp(20px, 2.8vw, 36px);
            letter-spacing: 0.5px;
            line-height: 1;
        }
        .status {
            background: #fff;
            border: 2px solid #f1d6b1;
            border-radius: 999px;
            padding: 4px 14px;
            font-size: clamp(16px, 1.6vw, 24px);
            box-shadow: 0 6px 16px rgba(60, 40, 20, 0.1);
            white-space: nowrap;
        }
        .status-lang {
            direction: ltr;
            font-family: 'Trebuchet MS', 'Arial', sans-serif;
        }

        .play-area {
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
            border-radius: 16px;
            border: 2px dashed var(--play-area-border);
            background: var(--play-area-bg);
            transition: background 400ms ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .section {
            position: relative;
            flex: 1;
            min-height: 0;
            padding: 4px 0;
        }
        .section + .section {
            border-top: 2px dashed rgba(150, 100, 60, 0.15);
        }

        .section-label {
            text-align: center;
            font-size: clamp(13px, 1.1vw, 18px);
            color: #9a7a5a;
            letter-spacing: 1px;
            padding: 2px 0 0;
            direction: ltr;
            font-family: 'Trebuchet MS', 'Arial', sans-serif;
            opacity: 0.7;
        }

        .slots-row {
            display: flex;
            justify-content: center;
            gap: clamp(2px, 0.2vw, 4px);
            padding: 0 8px;
            pointer-events: none;
            z-index: 2;
            position: relative;
        }
        .slots-row.rtl {
            direction: rtl;
        }
        .slots-row.ltr {
            direction: ltr;
        }

        .slot {
            position: relative;
            height: clamp(100px, 13vmin, 180px);
            min-width: 64px;
            padding: 28px var(--pad-right, 16px) 32px var(--pad-left, 16px);
            border: 5px dashed #c99757;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(88px, 12vmin, 170px);
            line-height: 1;
            color: rgba(110, 75, 40, 0.45);
            background: rgba(255, 251, 243, 0.9);
            overflow: hidden;
            white-space: nowrap;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        }
        .slot.ready {
            border-color: #e4c8a2;
            background: rgba(255, 252, 247, 0.85);
        }
        .slot.waiting {
            opacity: 0.38;
            filter: saturate(0.72);
        }
        .slot.next {
            border-style: solid;
            border-color: #ffb446;
            background: rgba(255, 247, 214, 0.98);
            color: rgba(110, 75, 40, 0.8);
            box-shadow: 0 0 0 5px rgba(255, 198, 92, 0.18);
            animation: guidePulse 1100ms ease-in-out infinite;
        }
        .slot.good {
            border-style: solid;
            border-color: #8ddeaf;
            background: rgba(214, 255, 232, 0.95);
            transform: scale(1.06);
            animation: pop 260ms ease-out;
        }

        .slot.en-slot {
            font-family: 'Trebuchet MS', 'Arial', sans-serif;
            font-size: clamp(56px, 8vmin, 120px);
            height: clamp(72px, 10vmin, 140px);
            min-width: 48px;
            padding: 16px var(--pad-right, 10px) 18px var(--pad-left, 10px);
            border-width: 4px;
            border-radius: 16px;
        }

        @keyframes pop {
            0% { transform: scale(0.88); }
            100% { transform: scale(1.06); }
        }
        @keyframes guidePulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 5px rgba(255, 198, 92, 0.18); }
            50% { transform: scale(1.03); box-shadow: 0 0 0 9px rgba(255, 198, 92, 0.28); }
        }

        .tile {
            position: absolute;
            min-width: 64px;
            padding: 28px var(--pad-right, 16px) 32px var(--pad-left, 16px);
            border-radius: 24px;
            border: 5px solid rgba(177, 114, 45, 0.45);
            box-shadow: 0 12px 20px rgba(62, 44, 26, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(88px, 12vmin, 170px);
            line-height: 1;
            user-select: none;
            touch-action: none;
            cursor: grab;
            z-index: 3;
            transform: translate(-50%, -50%) rotate(var(--rot));
            transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
            background: var(--bg-pattern, #fff4de);
            overflow: hidden;
            white-space: nowrap;
        }
        .tile.en-tile {
            font-family: 'Trebuchet MS', 'Arial', sans-serif;
            font-size: clamp(56px, 8vmin, 120px);
            min-width: 48px;
            padding: 16px var(--pad-right, 10px) 18px var(--pad-left, 10px);
            border-width: 4px;
            border-radius: 16px;
        }

        .slot .char, .tile .char {
            display: block;
            line-height: 1.08;
            transform: translate(var(--char-shift-x, 0px), var(--char-shift-y, 1px));
            transform-origin: center;
        }
        .slot .char {
            color: rgba(110, 75, 40, 0.45);
        }
        .tile .char {
            color: #4f3a22;
            -webkit-background-clip: text;
            background-clip: text;
            background-image: var(--text-pattern);
            text-shadow: 2px 2px rgba(255,255,255,0.4);
            filter: drop-shadow(1px 2px 0 rgba(20, 20, 20, 0.2));
        }
        .tile.en-tile .char,
        .slot.en-slot .char {
            -webkit-background-clip: unset;
            background-clip: unset;
            background-image: none;
            text-shadow: none;
            filter: none;
            color: #4f3a22;
        }
        .slot.en-slot .char {
            color: rgba(110, 75, 40, 0.45);
        }

        .tile.dragging {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.08) rotate(0deg);
            box-shadow: 0 18px 26px rgba(34, 25, 14, 0.3);
            z-index: 9;
        }
        .tile.locked {
            cursor: default;
            pointer-events: none;
            animation: ding 320ms ease-out;
        }
        .tile.next {
            box-shadow: 0 16px 22px rgba(62, 44, 26, 0.26), 0 0 0 6px rgba(255, 195, 72, 0.2);
        }
        .tile.disabled {
            opacity: 0.3;
            filter: grayscale(0.24) saturate(0.7);
            pointer-events: none;
            cursor: default;
        }
        .tile.section-done {
            opacity: 0;
            pointer-events: none;
        }
        .tile.en-tile.disabled .char,
        .tile.en-tile.next .char {
            -webkit-background-clip: unset;
            background-clip: unset;
            background-image: none;
            text-shadow: none;
            filter: none;
        }

        @keyframes ding {
            0% { filter: saturate(1); }
            30% { filter: saturate(1.8) brightness(1.14); }
            100% { filter: saturate(1); }
        }

        .spark {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #ffe46a 55%, transparent 70%);
            pointer-events: none;
            animation: spark 500ms ease-out forwards;
            z-index: 10;
        }
        @keyframes spark {
            from { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
            to { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.25); opacity: 0; }
        }

        .win {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            background: rgba(255, 246, 225, 0.82);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 300ms ease;
            z-index: 100;
        }
        .win-badge {
            position: relative;
            padding: 18px 32px 16px;
            border: 4px solid rgba(95, 62, 28, 0.22);
            border-radius: 24px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 240, 210, 0.96));
            box-shadow:
                0 20px 34px rgba(72, 46, 21, 0.22),
                0 0 40px rgba(255, 200, 80, 0.3),
                inset 0 0 0 6px rgba(255, 255, 255, 0.5);
            font-size: clamp(48px, 7vw, 84px);
            color: #2f8f62;
            font-weight: 700;
            text-shadow: 0 2px 0 rgba(255, 255, 255, 0.6);
            z-index: 1;
            opacity: 0;
            transform: scale(0.2);
            font-family: var(--farsi-font);
        }
        .win.show {
            opacity: 1;
            pointer-events: auto;
        }
        .win.show .win-badge {
            animation: badgeBounce 520ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes badgeBounce {
            0% { transform: scale(0.2); opacity: 0; }
            50% { transform: scale(1.12); opacity: 1; }
            70% { transform: scale(0.92); }
            100% { transform: scale(1); opacity: 1; }
        }

        .confetti {
            position: absolute;
            pointer-events: none;
            z-index: 60;
            animation: confettiBurst 1200ms ease-out forwards;
        }
        @keyframes confettiBurst {
            0% { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--dr)) scale(0.3); }
        }

        #resetBtn {
            cursor: pointer;
            border: none;
            font: inherit;
            color: var(--ink);
            background: rgba(220, 90, 100, 0.12);
            transition: background 180ms ease, transform 180ms ease;
            display: grid;
            place-items: center;
            min-width: 42px;
            padding: 4px 10px;
            line-height: 1;
        }
        #resetBtn:hover, #resetBtn:active {
            background: rgba(220, 90, 100, 0.28);
            transform: scale(1.04);
        }

        .section-overlay {
            position: absolute;
            inset: 0;
            z-index: 5;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 300ms ease;
            border-radius: 12px;
        }
        .section-overlay.show {
            opacity: 1;
        }
        .section-overlay .check {
            font-size: clamp(40px, 6vw, 80px);
        }

        @media (max-height: 800px) {
            .game {
                padding: 10px;
            }
            .topbar {
                margin-bottom: 4px;
                min-height: 36px;
            }
            h1 { font-size: clamp(17px, 2.2vw, 24px); }
            .status { padding: 3px 10px; font-size: clamp(14px, 1.4vw, 18px); }

            .slot { height: clamp(72px, 10vmin, 120px); font-size: clamp(60px, 9vmin, 110px); min-width: 44px; padding: 18px var(--pad-right, 10px) 22px var(--pad-left, 10px); border-width: 3px; border-radius: 14px; }
            .slot.en-slot { height: clamp(52px, 7vmin, 90px); font-size: clamp(38px, 5.5vmin, 70px); min-width: 36px; padding: 10px var(--pad-right, 6px) 12px var(--pad-left, 6px); border-width: 3px; }
            .tile { min-width: 44px; font-size: clamp(60px, 9vmin, 110px); padding: 18px var(--pad-right, 10px) 22px var(--pad-left, 10px); border-width: 3px; border-radius: 14px; }
            .tile.en-tile { min-width: 36px; font-size: clamp(38px, 5.5vmin, 70px); padding: 10px var(--pad-right, 6px) 12px var(--pad-left, 6px); border-width: 3px; }
        }

        @media (max-width: 760px) {
            .game {
                height: min(920px, calc(var(--app-height) - 12px));
                padding: 10px;
            }
        }

        @media (max-width: 1024px) and (orientation: portrait) {
            .game {
                width: min(100vw - 10px, 900px);
                height: min(1100px, calc(var(--app-height) - 10px));
                border-radius: 22px;
                padding: 10px;
            }
            .topbar { margin-bottom: 4px; }

            .slot { height: clamp(80px, 11vmin, 130px); font-size: clamp(66px, 10vmin, 120px); min-width: 48px; }
            .slot.en-slot { height: clamp(58px, 8vmin, 100px); font-size: clamp(42px, 6vmin, 76px); min-width: 38px; }
            .tile { min-width: 48px; font-size: clamp(66px, 10vmin, 120px); }
            .tile.en-tile { min-width: 38px; font-size: clamp(42px, 6vmin, 76px); }
        }
    </style>
  <!-- pwa:head -->
  <meta name="theme-color" content="#ea7a3d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Koochooloo">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <!-- /pwa:head -->
</head>
<body>
    <div class="game">
        <div class="topbar">
            <h1>پازل دو زبانه</h1>
            <div class="topbar-meta">
                <div class="status status-lang" id="wordStatus">آب → water</div>
                <div class="status" id="status">مرحله ۱</div>
                <button type="button" class="status" id="resetBtn" aria-label="Reset progress">↻</button>
            </div>
        </div>
        <div class="play-area" id="playArea">
            <div class="section" id="faSection">
                <div class="section-label">فارسی</div>
                <div class="slots-row rtl" id="faSlots"></div>
                <div class="section-overlay" id="faOverlay"><span class="check">✓</span></div>
            </div>
            <div class="section" id="enSection">
                <div class="section-label">English</div>
                <div class="slots-row ltr" id="enSlots"></div>
                <div class="section-overlay" id="enOverlay"><span class="check">✓</span></div>
            </div>
            <div class="win" id="winMessage"><div class="win-badge">آفرین!</div></div>
        </div>
    </div>

    <script>
        const BILINGUAL_WORD_ORDER = [
            'آب', 'نان', 'گل', 'سیب', 'توپ', 'ماه', 'پا', 'دست',
            'بابا', 'مامان', 'بله', 'گربه', 'سگ', 'مرغ', 'ماهی',
            'گاو', 'بز', 'اسب', 'خروس', 'موش', 'جوجه', 'فیل', 'شیر',
            'خرس', 'ببر', 'موز', 'هلو', 'توت', 'لیمو', 'کیوی',
            'قرمز', 'آبی', 'زرد', 'سبز', 'سفید', 'سیاه', 'صورتی',
            'خانه', 'در', 'کلید', 'میز', 'تخت', 'کتاب', 'مداد',
            'کیف', 'کفش', 'کلاه', 'بازی', 'خواب', 'غذا',
            'خورشید', 'ابر', 'برگ', 'درخت', 'باران', 'برف',
            'مدرسه', 'کلاس', 'صندلی', 'زنگ',
            'گنجشک', 'خرگوش', 'دوچرخه', 'زرافه',
            'عروسک', 'ماشین', 'پنجره', 'گلابی', 'انگور', 'انجیر',
            'نارنجی', 'بنفش', 'جوراب', 'صابون',
            'بادام', 'آینه', 'لباس', 'حوله'
        ];

        const NON_JOIN_LEFT = new Set(['ا', 'آ', 'د', 'ذ', 'ر', 'ز', 'ژ', 'و']);
        const BOTTOM_HEAVY_LETTERS = new Set(['ب', 'پ', 'ت', 'ث', 'ج', 'چ', 'خ', 'ی']);

        document.addEventListener('gesturestart', function (e) { e.preventDefault(); }, { passive: false });
        {
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function (e) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) e.preventDefault();
                lastTouchEnd = now;
            }, { passive: false });
        }

        const PRESENTATION_FORMS = {
            'ا': { isolated: '\uFE8D', final: '\uFE8E' },
            'آ': { isolated: '\uFE81', final: '\uFE82' },
            'ب': { isolated: '\uFE8F', final: '\uFE90', initial: '\uFE91', medial: '\uFE92' },
            'پ': { isolated: '\uFB56', final: '\uFB57', initial: '\uFB58', medial: '\uFB59' },
            'ت': { isolated: '\uFE95', final: '\uFE96', initial: '\uFE97', medial: '\uFE98' },
            'ث': { isolated: '\uFE99', final: '\uFE9A', initial: '\uFE9B', medial: '\uFE9C' },
            'ج': { isolated: '\uFE9D', final: '\uFE9E', initial: '\uFE9F', medial: '\uFEA0' },
            'چ': { isolated: '\uFB7A', final: '\uFB7B', initial: '\uFB7C', medial: '\uFB7D' },
            'ح': { isolated: '\uFEA1', final: '\uFEA2', initial: '\uFEA3', medial: '\uFEA4' },
            'خ': { isolated: '\uFEA5', final: '\uFEA6', initial: '\uFEA7', medial: '\uFEA8' },
            'د': { isolated: '\uFEA9', final: '\uFEAA' },
            'ذ': { isolated: '\uFEAB', final: '\uFEAC' },
            'ر': { isolated: '\uFEAD', final: '\uFEAE' },
            'ز': { isolated: '\uFEAF', final: '\uFEB0' },
            'ژ': { isolated: '\uFB8A', final: '\uFB8B' },
            'س': { isolated: '\uFEB1', final: '\uFEB2', initial: '\uFEB3', medial: '\uFEB4' },
            'ش': { isolated: '\uFEB5', final: '\uFEB6', initial: '\uFEB7', medial: '\uFEB8' },
            'ص': { isolated: '\uFEB9', final: '\uFEBA', initial: '\uFEBB', medial: '\uFEBC' },
            'ض': { isolated: '\uFEBD', final: '\uFEBE', initial: '\uFEBF', medial: '\uFEC0' },
            'ط': { isolated: '\uFEC1', final: '\uFEC2', initial: '\uFEC3', medial: '\uFEC4' },
            'ظ': { isolated: '\uFEC5', final: '\uFEC6', initial: '\uFEC7', medial: '\uFEC8' },
            'ع': { isolated: '\uFEC9', final: '\uFECA', initial: '\uFECB', medial: '\uFECC' },
            'غ': { isolated: '\uFECD', final: '\uFECE', initial: '\uFECF', medial: '\uFED0' },
            'ف': { isolated: '\uFED1', final: '\uFED2', initial: '\uFED3', medial: '\uFED4' },
            'ق': { isolated: '\uFED5', final: '\uFED6', initial: '\uFED7', medial: '\uFED8' },
            'ک': { isolated: '\uFB8E', final: '\uFB8F', initial: '\uFB90', medial: '\uFB91' },
            'گ': { isolated: '\uFB92', final: '\uFB93', initial: '\uFB94', medial: '\uFB95' },
            'ل': { isolated: '\uFEDD', final: '\uFEDE', initial: '\uFEDF', medial: '\uFEE0' },
            'م': { isolated: '\uFEE1', final: '\uFEE2', initial: '\uFEE3', medial: '\uFEE4' },
            'ن': { isolated: '\uFEE5', final: '\uFEE6', initial: '\uFEE7', medial: '\uFEE8' },
            'ه': { isolated: '\uFEE9', final: '\uFEEA', initial: '\uFEEB', medial: '\uFEEC' },
            'و': { isolated: '\uFEED', final: '\uFEEE' },
            'ی': { isolated: '\uFBFC', final: '\uFBFD', initial: '\uFBFE', medial: '\uFBFF' }
        };

        const TEXT_PATTERNS = [
            'repeating-linear-gradient(45deg,#6a5cff 0 9px,#8a79ff 9px 18px)',
            'radial-gradient(circle at 25% 30%,#99f2ff 0 24%,#2bb6d9 26% 100%)',
            'repeating-linear-gradient(0deg,#ff7d7d 0 8px,#ffb35d 8px 16px)',
            'repeating-linear-gradient(120deg,#82d760 0 9px,#c7ed73 9px 18px)',
            'repeating-linear-gradient(60deg,#ff65be 0 8px,#ff95df 8px 16px)'
        ];

        const TILE_BG_PATTERNS = [
            'linear-gradient(135deg,#fffdf5,#f7f3ff)',
            'linear-gradient(135deg,#f8fff3,#fff6f0)',
            'linear-gradient(135deg,#f2ffff,#fff7f7)',
            'linear-gradient(135deg,#fffde6,#f5f2ff)'
        ];

        const WIN_BG_COLORS = [
            'linear-gradient(180deg, #fff3d6, #ffe4a8)',
            'linear-gradient(180deg, #d6ecff, #a8d4ff)',
            'linear-gradient(180deg, #ffd6e0, #ffa8bc)',
            'linear-gradient(180deg, #d6ffd6, #a8ffa8)',
        ];

        const EN_TEXT_PATTERNS = [
            'repeating-linear-gradient(45deg,#4a7cff 0 8px,#6a9cff 8px 16px)',
            'repeating-linear-gradient(0deg,#ff6b6b 0 8px,#ff9f43 8px 16px)',
            'repeating-linear-gradient(120deg,#2ed573 0 8px,#7bed9f 8px 16px)',
            'repeating-linear-gradient(60deg,#a29bfe 0 8px,#dfe6e9 8px 16px)'
        ];

        class BilingualWordPuzzleGame {
            constructor() {
                this.playArea = document.getElementById('playArea');
                this.status = document.getElementById('status');
                this.wordStatus = document.getElementById('wordStatus');
                this.winMessage = document.getElementById('winMessage');
                this.faSlotsEl = document.getElementById('faSlots');
                this.enSlotsEl = document.getElementById('enSlots');
                this.faOverlay = document.getElementById('faOverlay');
                this.enOverlay = document.getElementById('enOverlay');

                this.levelIndex = 0;
                this.WORDS = [];

                this.faSlots = [];
                this.faTiles = [];
                this.faLockedCount = 0;
                this.faDone = false;

                this.enSlots = [];
                this.enTiles = [];
                this.enLockedCount = 0;
                this.enDone = false;

                this.activeTile = null;
                this.pointerOffset = { x: 0, y: 0 };
                this.faMetrics = null;
                this.enMetrics = null;
                this.resizeFrame = 0;
                this.started = false;

                this.loadProgress();

                this.handleResize = this.handleResize.bind(this);
                const resetBtn = document.getElementById('resetBtn');
                if (resetBtn) {
                    resetBtn.addEventListener('click', () => this.resetProgress());
                }

                this.init();
            }

            hasWordBreaks(word) {
                return /[\s\u200C]/.test(word);
            }

            isWordSuitable(entry) {
                if (this.hasWordBreaks(entry.fa)) return false;
                if (this.hasWordBreaks(entry.en)) return false;
                if (entry.fa.length < 2 || entry.fa.length > 5) return false;
                if (entry.en.length < 2 || entry.en.length > 8) return false;
                if (!/^[a-zA-Z]+$/.test(entry.en)) return false;
                if (!/^[\u0600-\u06FF]+$/.test(entry.fa)) return false;
                return true;
            }

            async loadWords() {
                const response = await fetch('data/farsi-word-bank.json');
                if (!response.ok) {
                    throw new Error(`Failed to load word bank: ${response.status}`);
                }
                const bank = await response.json();
                const suitable = bank.filter(e => this.isWordSuitable(e));

                const bankByFa = new Map(suitable.map(e => [e.fa, e]));
                return BILINGUAL_WORD_ORDER
                    .filter(fa => !this.hasWordBreaks(fa))
                    .map(fa => {
                        const entry = bankByFa.get(fa);
                        if (!entry) return null;
                        return entry;
                    })
                    .filter(e => e !== null);
            }

            async init() {
                this.syncViewportHeight();
                window.addEventListener('resize', this.handleResize, { passive: true });
                window.addEventListener('orientationchange', this.handleResize, { passive: true });
                if (window.visualViewport) {
                    window.visualViewport.addEventListener('resize', this.handleResize, { passive: true });
                }

                this.WORDS = await this.loadWords();

                const begin = () => {
                    if (this.started) return;
                    this.started = true;
                    this.startLevel();
                };

                if (document.fonts && document.fonts.ready) {
                    Promise.race([
                        document.fonts.ready,
                        new Promise(resolve => setTimeout(resolve, 700))
                    ]).then(begin);
                } else {
                    setTimeout(begin, 60);
                }
            }

            syncViewportHeight() {
                const viewportHeight = Math.round(window.visualViewport?.height || window.innerHeight || 0);
                if (viewportHeight > 0) {
                    document.documentElement.style.setProperty('--app-height', `${viewportHeight}px`);
                }
            }

            clamp(value, min, max) {
                return Math.min(max, Math.max(min, value));
            }

            readNumber(value, fallback) {
                const parsed = parseFloat(value);
                return Number.isFinite(parsed) ? parsed : fallback;
            }

            formatEnglishLabel(label) {
                if (!label) return '';
                return label.charAt(0).toUpperCase() + label.slice(1);
            }

            toPersianDigits(value) {
                return String(value).replace(/\d/g, digit => '۰۱۲۳۴۵۶۷۸۹'[Number(digit)]);
            }

            charsOf(word) {
                return [...word];
            }

            canConnectBefore(ch) {
                return !!PRESENTATION_FORMS[ch];
            }

            canConnectAfter(ch) {
                return !!PRESENTATION_FORMS[ch] && !NON_JOIN_LEFT.has(ch);
            }

            shapedChar(chars, i) {
                const ch = chars[i];
                const forms = PRESENTATION_FORMS[ch];
                if (!forms) return ch;

                const prev = chars[i - 1];
                const next = chars[i + 1];
                const joinsPrev = !!prev && this.canConnectAfter(prev) && this.canConnectBefore(ch);
                const joinsNext = !!next && this.canConnectAfter(ch) && this.canConnectBefore(next);

                if (joinsPrev && joinsNext && forms.medial) return forms.medial;
                if (joinsPrev && forms.final) return forms.final;
                if (joinsNext && forms.initial) return forms.initial;
                return forms.isolated || ch;
            }

            shapedWordUnits(word) {
                const chars = this.charsOf(word);
                return chars.map((base, i) => ({
                    base,
                    shaped: this.shapedChar(chars, i),
                    index: i,
                    joinsPrev: i > 0 && this.canConnectAfter(chars[i - 1]) && this.canConnectBefore(base),
                    joinsNext: i < chars.length - 1 && this.canConnectAfter(base) && this.canConnectBefore(chars[i + 1])
                }));
            }

            getCardPadding(unit) {
                const tight = 4;
                const loose = 14;

                if (unit.base === 'آ' && !unit.joinsPrev && !unit.joinsNext) {
                    return { left: 22, right: 22 };
                }

                return {
                    left: unit.joinsNext ? tight : loose,
                    right: unit.joinsPrev ? tight : loose
                };
            }

            getGlyphAdjustments(unit) {
                if (unit.base === 'آ' && !unit.joinsPrev && !unit.joinsNext) {
                    return { x: 0, y: 20 };
                }

                if (BOTTOM_HEAVY_LETTERS.has(unit.base)) {
                    return { x: 0, y: -8 };
                }

                return { x: 0, y: 8 };
            }

            applyCardPadding(card, unit) {
                const { left, right } = this.getCardPadding(unit);
                card.style.setProperty('--pad-left', `${left}px`);
                card.style.setProperty('--pad-right', `${right}px`);
            }

            applyGlyphAdjustments(card, unit) {
                const { x, y } = this.getGlyphAdjustments(unit);
                card.style.setProperty('--char-shift-x', `${x}px`);
                card.style.setProperty('--char-shift-y', `${y}px`);
            }

            getLevelMessage(level) {
                if (level === 1) return 'آفرین!';
                if (level === 2) return 'عالی!';
                if (level === 5) return 'قشنگ!';
                if (level === 10) return 'قهرمان!';
                if (level % 5 === 0) return `مرحله ${this.toPersianDigits(level)}`;
                if (level % 3 === 0) return 'داغ داغ!';
                return 'آفرین!';
            }

            handleResize() {
                this.syncViewportHeight();
                if (!this.started) return;

                cancelAnimationFrame(this.resizeFrame);
                this.resizeFrame = requestAnimationFrame(() => {
                    this.relayoutLevel();
                });
            }

            loadProgress() {
                try {
                    const saved = localStorage.getItem('bilingual-word-puzzle-progress');
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (typeof data.levelIndex === 'number') this.levelIndex = data.levelIndex;
                    }
                } catch (_) { }
            }

            saveProgress() {
                try {
                    localStorage.setItem('bilingual-word-puzzle-progress', JSON.stringify({
                        levelIndex: this.levelIndex
                    }));
                } catch (_) { }
            }

            resetProgress() {
                if (!confirm('آیا مطمئن هستید؟ تمام مراحل پاک می‌شوند.')) return;
                localStorage.removeItem('bilingual-word-puzzle-progress');
                this.levelIndex = 0;
                this.startLevel();
            }

            getNextGuidedIndex(slots) {
                const nextSlot = slots.find(slot => !slot.classList.contains('good'));
                return nextSlot ? Number(nextSlot.dataset.index) : null;
            }

            syncGuidedState(slots, tiles) {
                const nextIndex = this.getNextGuidedIndex(slots);

                slots.forEach(slot => {
                    slot.classList.remove('next', 'waiting');
                    if (slot.classList.contains('good')) return;
                    slot.classList.add(Number(slot.dataset.index) === nextIndex ? 'next' : 'waiting');
                });

                tiles.forEach(tile => {
                    const isLocked = tile.classList.contains('locked');
                    const isNext = nextIndex !== null && Number(tile.dataset.index) === nextIndex;
                    const shouldDisable = !isLocked && !isNext;
                    tile.classList.toggle('next', !isLocked && isNext);
                    tile.classList.toggle('disabled', shouldDisable);
                    tile.setAttribute('aria-disabled', String(shouldDisable));
                });

                if (this.activeTile && nextIndex !== null && Number(this.activeTile.dataset.index) !== nextIndex) {
                    const tile = this.activeTile;
                    tile.classList.remove('dragging');
                    this.activeTile = null;
                    this.returnToHome(tile);
                }
            }

            startLevel() {
                this.faSlotsEl.innerHTML = '';
                this.enSlotsEl.innerHTML = '';
                this.playArea.querySelectorAll('.tile,.spark').forEach(el => el.remove());
                this.winMessage.classList.remove('show');
                this.faOverlay.classList.remove('show');
                this.enOverlay.classList.remove('show');

                this.faSlots = [];
                this.faTiles = [];
                this.faLockedCount = 0;
                this.faDone = false;

                this.enSlots = [];
                this.enTiles = [];
                this.enLockedCount = 0;
                this.enDone = false;

                this.currentEntry = this.WORDS[this.levelIndex % this.WORDS.length];
                const faWord = this.currentEntry.fa;
                const enWord = this.currentEntry.en.toLowerCase();

                this.status.textContent = `مرحله ${this.toPersianDigits(this.levelIndex + 1)}`;
                const emoji = this.currentEntry.emoji || '';
                this.wordStatus.textContent = `${emoji} ${faWord} → ${this.formatEnglishLabel(enWord)}`.trim();

                this.setupFaPuzzle(faWord);
                this.setupEnPuzzle(enWord);

                this.relayoutLevel({ randomizeUnlocked: true });
                this.syncGuidedState(this.faSlots, this.faTiles);
                this.syncGuidedState(this.enSlots, this.enTiles);
            }

            setupFaPuzzle(word) {
                const units = this.shapedWordUnits(word);
                const tileUnits = [...units].reverse();
                const totalUnits = units.length;

                units.forEach(unit => {
                    const slot = document.createElement('div');
                    slot.className = 'slot ready';
                    slot.dataset.index = String(unit.index);
                    slot.dataset.base = unit.base;
                    slot.dataset.shaped = unit.shaped;
                    slot.dataset.type = 'fa';
                    this.applyCardPadding(slot, unit);
                    this.applyGlyphAdjustments(slot, unit);
                    slot.dataset.stackOrder = String(10 + totalUnits - unit.index);
                    slot.style.zIndex = slot.dataset.stackOrder;
                    slot.innerHTML = `<span class="char">${unit.shaped}</span>`;
                    this.faSlotsEl.appendChild(slot);
                });

                this.faSlots = [...this.faSlotsEl.children];

                tileUnits.forEach((unit, n) => {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.dataset.index = String(unit.index);
                    tile.dataset.base = unit.base;
                    tile.dataset.type = 'fa';
                    tile.style.setProperty('--text-pattern', TEXT_PATTERNS[n % TEXT_PATTERNS.length]);
                    tile.style.setProperty('--bg-pattern', TILE_BG_PATTERNS[n % TILE_BG_PATTERNS.length]);
                    tile.style.setProperty('--rot', `${(Math.random() * 26 - 13).toFixed(1)}deg`);
                    this.applyCardPadding(tile, unit);
                    this.applyGlyphAdjustments(tile, unit);
                    tile.style.zIndex = '3';
                    tile.innerHTML = `<span class="char">${unit.shaped}</span>`;
                    this.playArea.appendChild(tile);
                    this.wireTile(tile, this.faSlots, 'fa');
                    this.faTiles.push(tile);
                });
            }

            setupEnPuzzle(word) {
                const chars = [...word];

                chars.forEach((ch, i) => {
                    const slot = document.createElement('div');
                    slot.className = 'slot ready en-slot';
                    slot.dataset.index = String(i);
                    slot.dataset.base = ch;
                    slot.dataset.shaped = ch.toUpperCase();
                    slot.dataset.type = 'en';
                    slot.style.setProperty('--pad-left', '6px');
                    slot.style.setProperty('--pad-right', '6px');
                    slot.style.setProperty('--char-shift-x', '0px');
                    slot.style.setProperty('--char-shift-y', '0px');
                    slot.dataset.stackOrder = String(10 + chars.length - i);
                    slot.style.zIndex = slot.dataset.stackOrder;
                    slot.innerHTML = `<span class="char">${ch.toUpperCase()}</span>`;
                    this.enSlotsEl.appendChild(slot);
                });

                this.enSlots = [...this.enSlotsEl.children];

                const shuffledIndices = [...Array(chars.length).keys()].sort(() => Math.random() - 0.5);
                shuffledIndices.forEach((idx, n) => {
                    const ch = chars[idx];
                    const tile = document.createElement('div');
                    tile.className = 'tile en-tile';
                    tile.dataset.index = String(idx);
                    tile.dataset.base = ch;
                    tile.dataset.type = 'en';
                    tile.style.setProperty('--text-pattern', EN_TEXT_PATTERNS[n % EN_TEXT_PATTERNS.length]);
                    tile.style.setProperty('--bg-pattern', TILE_BG_PATTERNS[n % TILE_BG_PATTERNS.length]);
                    tile.style.setProperty('--rot', `${(Math.random() * 18 - 9).toFixed(1)}deg`);
                    tile.style.setProperty('--pad-left', '6px');
                    tile.style.setProperty('--pad-right', '6px');
                    tile.style.setProperty('--char-shift-x', '0px');
                    tile.style.setProperty('--char-shift-y', '0px');
                    tile.style.zIndex = '3';
                    tile.innerHTML = `<span class="char">${ch.toUpperCase()}</span>`;
                    this.playArea.appendChild(tile);
                    this.wireTile(tile, this.enSlots, 'en');
                    this.enTiles.push(tile);
                });
            }

            wireTile(tile, slots, type) {
                tile.addEventListener('pointerdown', (e) => {
                    if (tile.classList.contains('locked') || tile.classList.contains('disabled')) return;
                    this.activeTile = tile;
                    tile.classList.add('dragging');
                    tile.setPointerCapture(e.pointerId);
                    const tRect = tile.getBoundingClientRect();
                    this.pointerOffset.x = e.clientX - (tRect.left + tRect.width / 2);
                    this.pointerOffset.y = e.clientY - (tRect.top + tRect.height / 2);
                });

                tile.addEventListener('pointermove', (e) => {
                    if (this.activeTile !== tile) return;
                    const areaRect = this.playArea.getBoundingClientRect();
                    tile.style.left = `${e.clientX - areaRect.left - this.pointerOffset.x}px`;
                    tile.style.top = `${e.clientY - areaRect.top - this.pointerOffset.y}px`;
                });

                const release = () => {
                    if (this.activeTile !== tile) return;
                    tile.classList.remove('dragging');
                    this.activeTile = null;
                    this.tryLockTile(tile, slots, type);
                };

                tile.addEventListener('pointerup', release);
                tile.addEventListener('pointercancel', release);
            }

            findMatchingSlot(tile, slots) {
                const tileIndex = Number(tile.dataset.index);
                const nextIndex = this.getNextGuidedIndex(slots);
                if (nextIndex === null || tileIndex !== nextIndex) return null;

                const tileBase = tile.dataset.base;
                const tileRect = tile.getBoundingClientRect();
                const tileCx = tileRect.left + tileRect.width / 2;
                const tileCy = tileRect.top + tileRect.height / 2;
                let bestSlot = null;
                let bestDistance = Infinity;

                slots.forEach(slot => {
                    if (slot.classList.contains('good')) return;
                    if (slot.dataset.base !== tileBase) return;
                    if (Number(slot.dataset.index) !== tileIndex) return;

                    const slotRect = slot.getBoundingClientRect();
                    const slotCx = slotRect.left + slotRect.width / 2;
                    const slotCy = slotRect.top + slotRect.height / 2;
                    const dist = Math.hypot(slotCx - tileCx, slotCy - tileCy);
                    const threshold = Math.max(50, slotRect.width * 0.45);

                    if (dist <= threshold && dist < bestDistance) {
                        bestDistance = dist;
                        bestSlot = slot;
                    }
                });

                return bestSlot;
            }

            tryLockTile(tile, slots, type) {
                const slot = this.findMatchingSlot(tile, slots);
                if (!slot) {
                    this.returnToHome(tile);
                    return;
                }

                const slotRect = slot.getBoundingClientRect();
                const slotCx = slotRect.left + slotRect.width / 2;
                const slotCy = slotRect.top + slotRect.height / 2;
                const areaRect = this.playArea.getBoundingClientRect();
                tile.style.left = `${slotCx - areaRect.left}px`;
                tile.style.top = `${slotCy - areaRect.top}px`;
                tile.style.setProperty('--rot', '0deg');
                tile.style.zIndex = slot.dataset.stackOrder || '20';
                tile.classList.add('locked');
                tile.dataset.index = slot.dataset.index;
                const charEl = tile.querySelector('.char');
                if (charEl) {
                    charEl.textContent = slot.dataset.shaped;
                }
                slot.classList.remove('ready');
                slot.classList.add('good');
                this.burst(slotCx - areaRect.left, slotCy - areaRect.top);

                if (type === 'fa') {
                    this.faLockedCount += 1;
                    this.syncGuidedState(this.faSlots, this.faTiles);
                    if (this.faLockedCount === this.faSlots.length) {
                        this.faDone = true;
                        this.faOverlay.classList.add('show');
                        this.syncGuidedState(this.enSlots, this.enTiles);
                        this.checkBothDone();
                    }
                } else {
                    this.enLockedCount += 1;
                    this.syncGuidedState(this.enSlots, this.enTiles);
                    if (this.enLockedCount === this.enSlots.length) {
                        this.enDone = true;
                        this.enOverlay.classList.add('show');
                        this.syncGuidedState(this.faSlots, this.faTiles);
                        this.checkBothDone();
                    }
                }
            }

            returnToHome(tile) {
                tile.style.left = `${tile.dataset.homeX}px`;
                tile.style.top = `${tile.dataset.homeY}px`;
                this.storeRelativeTilePosition(tile);
            }

            getSectionBounds(section) {
                const sectionEl = document.getElementById(section === 'fa' ? 'faSection' : 'enSection');
                const areaRect = this.playArea.getBoundingClientRect();
                const secRect = sectionEl.getBoundingClientRect();
                const slotsRow = section === 'fa' ? this.faSlotsEl : this.enSlotsEl;
                const slotsRect = slotsRow.getBoundingClientRect();
                const margin = 12;

                return {
                    minX: margin,
                    maxX: areaRect.width - margin,
                    minY: slotsRect.bottom - areaRect.top + margin,
                    maxY: secRect.bottom - areaRect.top - margin
                };
            }

            storeRelativeTilePosition(tile) {
                const section = tile.dataset.type;
                const key = section === 'fa' ? 'faMetrics' : 'enMetrics';
                const bounds = this[key];
                if (!bounds) return;
                const left = this.readNumber(tile.style.left, 0);
                const top = this.readNumber(tile.style.top, 0);
                const width = bounds.maxX - bounds.minX;
                const height = bounds.maxY - bounds.minY;
                const relX = width > 0 ? (left - bounds.minX) / width : 0.5;
                const relY = height > 0 ? (top - bounds.minY) / height : 0.5;
                tile.dataset.relX = String(this.clamp(relX, 0, 1));
                tile.dataset.relY = String(this.clamp(relY, 0, 1));
            }

            relayoutLevel({ randomizeUnlocked = false } = {}) {
                if (!this.playArea || this.tilesCount() === 0) return;

                const areaRect = this.playArea.getBoundingClientRect();
                if (!areaRect.width || !areaRect.height) return;

                this.faMetrics = this.getSectionBounds('fa');
                this.enMetrics = this.getSectionBounds('en');

                const positionTiles = (tiles, bounds) => {
                    tiles.forEach(tile => {
                        if (tile.classList.contains('locked')) {
                            const slots = tile.dataset.type === 'fa' ? this.faSlots : this.enSlots;
                            const slot = slots.find(s =>
                                s.dataset.index === tile.dataset.index &&
                                s.dataset.base === tile.dataset.base
                            );
                            if (!slot) return;
                            const slotRect = slot.getBoundingClientRect();
                            tile.style.left = `${slotRect.left + slotRect.width / 2 - areaRect.left}px`;
                            tile.style.top = `${slotRect.top + slotRect.height / 2 - areaRect.top}px`;
                            tile.style.setProperty('--rot', '0deg');
                            tile.style.zIndex = slot.dataset.stackOrder || '20';
                            return;
                        }

                        const spanX = bounds.maxX - bounds.minX;
                        const spanY = bounds.maxY - bounds.minY;
                        const relX = randomizeUnlocked || tile.dataset.relX === undefined
                            ? Math.random()
                            : this.clamp(this.readNumber(tile.dataset.relX, 0.5), 0, 1);
                        const relY = randomizeUnlocked || tile.dataset.relY === undefined
                            ? Math.random()
                            : this.clamp(this.readNumber(tile.dataset.relY, 0.5), 0, 1);
                        const x = bounds.minX + spanX * relX;
                        const y = bounds.minY + spanY * relY;

                        tile.style.left = `${x}px`;
                        tile.style.top = `${y}px`;
                        tile.dataset.homeX = String(x);
                        tile.dataset.homeY = String(y);
                        this.storeRelativeTilePosition(tile);
                    });
                };

                positionTiles(this.faTiles, this.faMetrics);
                positionTiles(this.enTiles, this.enMetrics);
            }

            tilesCount() {
                return this.faTiles.length + this.enTiles.length;
            }

            burst(x, y) {
                for (let i = 0; i < 6; i++) {
                    const spark = document.createElement('div');
                    spark.className = 'spark';
                    spark.style.left = `${x}px`;
                    spark.style.top = `${y}px`;
                    spark.style.setProperty('--dx', `${(Math.random() * 100 - 50).toFixed(0)}px`);
                    spark.style.setProperty('--dy', `${(Math.random() * 100 - 50).toFixed(0)}px`);
                    this.playArea.appendChild(spark);
                    setTimeout(() => spark.remove(), 540);
                }
            }

            createConfetti(count = 50) {
                const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bcb', '#a66cff', '#ff9f43', '#00d2d3'];
                const areaRect = this.playArea.getBoundingClientRect();
                const cx = areaRect.width / 2;
                const cy = areaRect.height / 2;

                for (let i = 0; i < count; i++) {
                    const el = document.createElement('div');
                    el.className = 'confetti';
                    const size = 6 + Math.random() * 10;
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 60 + Math.random() * 240;
                    const dx = Math.cos(angle) * distance;
                    const dy = Math.sin(angle) * distance;
                    const dr = Math.random() * 720 - 360;
                    const color = colors[i % colors.length];
                    el.style.cssText = `
                        left:${cx}px; top:${cy}px;
                        width:${size}px; height:${size * (0.5 + Math.random() * 0.8)}px;
                        background:${color};
                        --dx:${dx}px; --dy:${dy}px; --dr:${dr}deg;
                        border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
                    `;
                    this.playArea.appendChild(el);
                    setTimeout(() => el.remove(), 1300);
                }
            }

            checkBothDone() {
                if (this.faDone && this.enDone) {
                    this.finishLevel();
                }
            }

            finishLevel() {
                const areaRect = this.playArea.getBoundingClientRect();
                const badge = this.winMessage.querySelector('.win-badge');
                if (badge) {
                    badge.textContent = this.getLevelMessage(this.levelIndex + 1);
                }
                this.playArea.style.background = WIN_BG_COLORS[this.levelIndex % WIN_BG_COLORS.length];
                this.createConfetti(50);
                setTimeout(() => this.burst(areaRect.width * 0.3, areaRect.height * 0.3), 100);
                setTimeout(() => this.burst(areaRect.width * 0.7, areaRect.height * 0.3), 200);
                setTimeout(() => this.burst(areaRect.width * 0.5, areaRect.height * 0.6), 300);
                this.winMessage.classList.add('show');
                setTimeout(() => {
                    this.winMessage.classList.remove('show');
                    this.levelIndex += 1;
                    this.saveProgress();
                    this.startLevel();
                }, 1400);
            }
        }

        new BilingualWordPuzzleGame();
    </script>
  <script src="pwa.js" data-sw="sw.js" defer></script>
</body>
