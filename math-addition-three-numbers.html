<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Math Addition Game - Three Numbers!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 214, 153, 0.5), transparent 28%),
                radial-gradient(circle at top right, rgba(255, 168, 208, 0.35), transparent 30%),
                linear-gradient(180deg, #dff0ff 0%, #f9fcff 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            outline: none;
            position: relative;
            padding: 20px;
            transition: background 1s ease;
        }

        body::before {
            content: none;
        }

        body::after {
            content: none;
        }

        .container {
            background: linear-gradient(180deg, #ffffff 0%, #fffdf8 100%);
            border-radius: 28px;
            padding: 24px 28px;
            box-shadow: 0 18px 46px rgba(34, 72, 112, 0.14);
            text-align: center;
            max-width: 1000px;
            width: 90%;
            outline: none;
            border: 1px solid rgba(79, 163, 209, 0.16);
            position: relative;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .container::before {
            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            top: -70px;
            right: -60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 217, 61, 0.22) 0%, rgba(255, 217, 61, 0) 70%);
            pointer-events: none;
        }

        .container::after {
            content: "";
            position: absolute;
            width: 150px;
            height: 150px;
            left: -55px;
            bottom: -70px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(107, 207, 127, 0.18) 0%, rgba(107, 207, 127, 0) 70%);
            pointer-events: none;
        }

        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        h1 {
            color: #2f5f7d;
            font-size: 1.4em;
            margin: 0;
            letter-spacing: 0.2px;
            line-height: 1.1;
            text-align: left;
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1::before {
            content: "⭐";
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffe48d, #ffd45c);
            box-shadow: 0 6px 14px rgba(255, 212, 92, 0.28);
            flex-shrink: 0;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(255, 241, 205, 0.75), rgba(235, 246, 255, 0.92));
            border: 1px solid rgba(255, 194, 88, 0.16);
        }

        .score-info {
            font-size: 1.05em;
            background: linear-gradient(135deg, #4fa3d1, #5eb8df);
            color: white;
            margin: 0;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 999px;
            display: inline-block;
            box-shadow: 0 6px 14px rgba(79, 163, 209, 0.24);
            transition: background 0.8s ease, box-shadow 0.8s ease;
            white-space: nowrap;
        }

        .shapes-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-end;
            margin: 18px 0;
            gap: 12px;
            flex-wrap: nowrap;
            padding: 18px 16px;
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(244, 249, 255, 0.95), rgba(255, 246, 250, 0.95));
            box-shadow: inset 0 0 0 1px rgba(79, 163, 209, 0.1);
        }

        .number-with-shapes {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 8px 10px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.58);
        }

        .shapes-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 200px;
            min-height: 70px;
            gap: 5px;
            align-items: center;
            padding: 8px 10px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.85);
        }

        .shape {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.16);
            border: 2px solid rgba(255, 255, 255, 0.6);
        }

        .blue-dot {
            background: linear-gradient(135deg, #4fa3d1, #6bcf7f);
        }

        .green-dot {
            background: linear-gradient(135deg, #ffa45b, #ffd93d);
        }

        .purple-dot {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
        }

        .number {
            font-size: 5em;
            font-weight: 900;
            color: #ff6b9d;
            text-shadow: none;
            min-width: 100px;
            text-align: center;
        }

        .operator {
            font-size: 5em;
            font-weight: 900;
            color: #6bcf7f;
            text-shadow: none;
            min-width: 60px;
            text-align: center;
        }

        .input-container {
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap;
            flex-shrink: 0;
        }

        .digit-input {
            -webkit-user-select: text;
            user-select: text;
            width: 90px;
            height: 100px;
            font-size: 5em;
            text-align: center;
            border: 4px solid #4fa3d1;
            border-radius: 20px;
            outline: none;
            font-weight: 900;
            background: linear-gradient(180deg, #ffffff 0%, #fdf6ff 100%);
            color: #ff6b9d;
            caret-color: transparent;
            cursor: default;
            box-shadow: 0 8px 18px rgba(60, 95, 126, 0.12);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .digit-input:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.16), 0 8px 18px rgba(60, 95, 126, 0.12);
        }

        .digit-input.correct {
            background: linear-gradient(135deg, #6bcf7f, #4fa3d1);
            border-color: #6bcf7f;
            color: white;
            box-shadow: 0 8px 25px rgba(107, 207, 127, 0.5);
        }

        .digit-input.wrong {
            background: linear-gradient(135deg, #ff9ff3, #feca57);
            border-color: #ff9ff3;
            color: white;
            box-shadow: 0 8px 25px rgba(255, 159, 243, 0.5);
        }

        .celebration-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            font-weight: 900;
            z-index: 1000;
            animation: celebrate 1.5s, rainbow 2s linear infinite;
            pointer-events: none;
            background: linear-gradient(135deg, #ff6b9d 0%, #ffa45b 25%, #ffd93d 75%, #6bcf7f 100%);
            padding: 30px 50px;
            border-radius: 35px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.3), 0 0 80px rgba(255, 107, 157, 0.6);
            border: 8px solid #ffffff;
            background-size: 300% 300%;
            color: white;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.3);
        }

        @keyframes celebrate {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2) rotate(10deg); opacity: 1; }
            70% { transform: translate(-50%, -50%) scale(1.05) rotate(-5deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confetti-fall 3s linear forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .instructions {
            display: none;
        }

        .keypad {
            margin: 16px auto 0;
            width: min(270px, 100%);
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            padding: 12px;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(234, 246, 255, 0.95), rgba(255, 244, 237, 0.95));
            box-shadow: inset 0 0 0 1px rgba(79, 163, 209, 0.1);
        }

        .keypad-button {
            min-height: 52px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(180deg, #6ac0e6 0%, #4fa3d1 100%);
            color: white;
            font-size: 1.45em;
            font-weight: 900;
            box-shadow: 0 6px 12px rgba(79, 163, 209, 0.2);
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.12s ease;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        .keypad-button:active {
            transform: translateY(1px);
            filter: brightness(0.97);
        }

        .keypad-button.keypad-action {
            background: linear-gradient(180deg, #ffad77 0%, #ff8b6b 100%);
            box-shadow: 0 6px 12px rgba(255, 139, 107, 0.18);
        }

        @media (max-width: 900px) {
            .container {
                padding: 20px 18px;
                width: 96%;
            }

            .top-bar {
                gap: 10px;
                margin-bottom: 12px;
                padding: 8px 10px;
            }

            h1 {
                font-size: 1.2em;
            }

            .score-info {
                font-size: 0.95em;
                padding: 7px 12px;
            }

            .shapes-container {
                gap: 10px;
                padding: 14px 12px;
            }

            .number,
            .operator {
                font-size: 3.8em;
                min-width: 70px;
            }

            .digit-input {
                width: 72px;
                height: 82px;
                font-size: 3.8em;
            }

            .keypad {
                width: min(246px, 100%);
                padding: 10px;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 16px 12px;
            }

            .top-bar {
                gap: 8px;
                margin-bottom: 10px;
                padding: 7px 8px;
            }

            h1 {
                font-size: 1em;
                gap: 7px;
            }

            h1::before {
                width: 28px;
                height: 28px;
                border-radius: 10px;
                font-size: 0.9em;
            }

            .score-info {
                font-size: 0.82em;
                padding: 6px 10px;
            }

            .shapes-container {
                gap: 8px;
                margin: 18px 0;
                padding: 12px 10px;
            }

            .number,
            .operator {
                font-size: 2.8em;
                min-width: 46px;
            }

            .digit-input {
                width: 54px;
                height: 64px;
                font-size: 2.8em;
                border-width: 4px;
                border-radius: 16px;
            }

            .shape {
                width: 20px;
                height: 20px;
            }

            .shapes-group {
                max-width: 110px;
                min-height: 48px;
                gap: 4px;
                padding: 6px 8px;
            }

            .keypad {
                gap: 7px;
                width: min(216px, 100%);
                padding: 9px;
            }

            .keypad-button {
                min-height: 44px;
                font-size: 1.2em;
                border-radius: 14px;
            }
        }

        .bounce {
            animation: none;
        }
    </style>
</head>
<body>
    <div class="container" id="game-container">
        <div class="top-bar">
            <h1>Math Addition</h1>
            <div class="score-info" id="score-info">Score: 1</div>
        </div>

        <div class="shapes-container" id="shapes-container">
            <div class="number-with-shapes">
                <div class="shapes-group" id="shapes-left"></div>
                <span class="number" id="num1">1</span>
            </div>
            <span class="operator">+</span>
            <div class="number-with-shapes">
                <div class="shapes-group" id="shapes-middle"></div>
                <span class="number" id="num2">1</span>
            </div>
            <span class="operator">+</span>
            <div class="number-with-shapes">
                <div class="shapes-group" id="shapes-right"></div>
                <span class="number" id="num3">1</span>
            </div>
            <span class="operator">=</span>
            <div class="input-container" id="input-container">
                <input type="text" class="digit-input" id="digit0" maxlength="1" inputmode="numeric" pattern="[0-9]*">
            </div>
        </div>

        <div class="keypad" id="keypad" aria-label="Number keypad">
            <button type="button" class="keypad-button" data-digit="1">1</button>
            <button type="button" class="keypad-button" data-digit="2">2</button>
            <button type="button" class="keypad-button" data-digit="3">3</button>
            <button type="button" class="keypad-button" data-digit="4">4</button>
            <button type="button" class="keypad-button" data-digit="5">5</button>
            <button type="button" class="keypad-button" data-digit="6">6</button>
            <button type="button" class="keypad-button" data-digit="7">7</button>
            <button type="button" class="keypad-button" data-digit="8">8</button>
            <button type="button" class="keypad-button" data-digit="9">9</button>
            <button type="button" class="keypad-button keypad-action" data-action="backspace">⌫</button>
            <button type="button" class="keypad-button" data-digit="0">0</button>
            <button type="button" class="keypad-button keypad-action" data-action="clear">C</button>
        </div>
    </div>

    <div class="celebration" id="celebration"></div>

    <script>
        class MathGame {
            constructor() {
                this.score = 1;
                this.consecutiveWrong = 0;
                this.currentProblem = {};
                this.previousProblem = null;
                this.correctAnswer = 0;

                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();

                const messages = [
                    "Awesome! 🎉", "Great job! ⭐", "Perfect! 🌟",
                    "Amazing! 🎊", "Wonderful! 🎈", "Fantastic! 🌈",
                    "Super! 🚀", "Brilliant! ✨"
                ];
                this.messages = messages;

                this.init();
            }

            init() {
                this.generateProblem();
                this.setupEventListeners();
                this.updateScore();
            }

            playCelebrationSound() {
                const now = this.audioContext.currentTime;

                // Create a fun ascending tone sequence
                const frequencies = [523.25, 659.25, 783.99]; // C, E, G notes

                frequencies.forEach((freq, index) => {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);

                    oscillator.frequency.value = freq;
                    oscillator.type = 'sine';

                    const startTime = now + index * 0.1;
                    gainNode.gain.setValueAtTime(0, startTime);
                    gainNode.gain.linearRampToValueAtTime(0.3, startTime + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);

                    oscillator.start(startTime);
                    oscillator.stop(startTime + 0.3);
                });
            }

            playErrorSound() {
                const now = this.audioContext.currentTime;

                // Create a descending "wrong" sound
                const frequencies = [400, 300, 200]; // Descending tones

                frequencies.forEach((freq, index) => {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);

                    oscillator.frequency.value = freq;
                    oscillator.type = 'sawtooth';

                    const startTime = now + index * 0.08;
                    gainNode.gain.setValueAtTime(0, startTime);
                    gainNode.gain.linearRampToValueAtTime(0.2, startTime + 0.03);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.2);

                    oscillator.start(startTime);
                    oscillator.stop(startTime + 0.2);
                });
            }

            generateProblem() {
                // Clean up any existing timeouts
                if (this.clearWrongTimeout) {
                    clearTimeout(this.clearWrongTimeout);
                }

                let num1, num2, num3;
                let attempts = 0;
                const maxAttempts = 50;

                do {
                    // Generate random numbers between 1 and current score
                    num1 = Math.floor(Math.random() * this.score) + 1;
                    num2 = Math.floor(Math.random() * this.score) + 1;
                    num3 = Math.floor(Math.random() * this.score) + 1;

                    attempts++;
                } while (
                    this.previousProblem &&
                    this.isProblemSimilar(num1, num2, num3) &&
                    attempts < maxAttempts
                );

                // Store previous problem to avoid repeats
                this.previousProblem = { num1, num2, num3 };
                this.currentProblem = { num1, num2, num3 };
                this.correctAnswer = num1 + num2 + num3;

                this.displayProblem();
                this.generateShapes();
            }

            isProblemSimilar(num1, num2, num3) {
                // Check if this problem is a permutation of the previous one
                const current = [num1, num2, num3].sort();
                const previous = [this.previousProblem.num1, this.previousProblem.num2, this.previousProblem.num3].sort();

                return current[0] === previous[0] &&
                       current[1] === previous[1] &&
                       current[2] === previous[2];
            }

            displayProblem() {
                document.getElementById('num1').textContent = this.currentProblem.num1;
                document.getElementById('num2').textContent = this.currentProblem.num2;
                document.getElementById('num3').textContent = this.currentProblem.num3;

                const inputContainer = document.getElementById('input-container');
                inputContainer.innerHTML = '';

                const answerLength = this.correctAnswer.toString().length;
                for (let i = 0; i < answerLength; i++) {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'digit-input';
                    input.maxLength = 1;
                    input.id = `digit${i}`;
                    input.inputMode = 'numeric';
                    input.pattern = '[0-9]*';
                    input.addEventListener('input', (e) => this.handleInput(e, i));
                    input.addEventListener('keydown', (e) => this.handleKeydown(e, i));
                    inputContainer.appendChild(input);
                }

                // Set focus to first input
                setTimeout(() => {
                    document.getElementById('digit0').focus();
                }, 100);

                // Setup global keyboard listener
                this.setupGlobalKeyboard();
            }

            getAnswerInputs() {
                return Array.from(document.querySelectorAll('.digit-input'));
            }

            findTargetInput() {
                const inputs = this.getAnswerInputs();
                if (inputs.length === 0) {
                    return null;
                }

                const focusedInput = document.activeElement;
                if (focusedInput && focusedInput.classList.contains('digit-input')) {
                    return focusedInput;
                }

                for (const input of inputs) {
                    if (input.value === '') {
                        return input;
                    }
                }

                return inputs[0];
            }

            enterDigit(digit) {
                const targetInput = this.findTargetInput();
                if (!targetInput) {
                    return;
                }

                targetInput.value = digit;
                targetInput.focus();
                targetInput.dispatchEvent(new Event('input', { bubbles: true }));
            }

            backspaceInput() {
                if (this.clearWrongTimeout) {
                    clearTimeout(this.clearWrongTimeout);
                    this.clearWrongTimeout = null;
                }

                const inputs = this.getAnswerInputs();
                if (inputs.length === 0) {
                    return;
                }

                const focusedInput = document.activeElement;
                let targetInput = null;

                if (focusedInput && focusedInput.classList.contains('digit-input')) {
                    if (focusedInput.value !== '') {
                        targetInput = focusedInput;
                    } else {
                        const position = Number(focusedInput.id.replace('digit', ''));
                        targetInput = document.getElementById(`digit${position - 1}`) || focusedInput;
                    }
                } else {
                    for (let index = inputs.length - 1; index >= 0; index--) {
                        if (inputs[index].value !== '') {
                            targetInput = inputs[index];
                            break;
                        }
                    }
                }

                if (!targetInput) {
                    targetInput = inputs[0];
                }

                targetInput.value = '';
                targetInput.classList.remove('correct', 'wrong');
                targetInput.focus();
            }

            clearInputs() {
                if (this.clearWrongTimeout) {
                    clearTimeout(this.clearWrongTimeout);
                    this.clearWrongTimeout = null;
                }

                this.getAnswerInputs().forEach((input, index) => {
                    input.value = '';
                    input.classList.remove('correct', 'wrong');
                    if (index === 0) {
                        input.focus();
                    }
                });
            }

            generateShapes() {
                const shapesLeft = document.getElementById('shapes-left');
                const shapesMiddle = document.getElementById('shapes-middle');
                const shapesRight = document.getElementById('shapes-right');

                shapesLeft.innerHTML = '';
                shapesMiddle.innerHTML = '';
                shapesRight.innerHTML = '';

                // Generate blue dots for first number
                for (let i = 0; i < this.currentProblem.num1; i++) {
                    const shape = document.createElement('div');
                    shape.className = 'shape blue-dot';
                    shapesLeft.appendChild(shape);
                }

                // Generate green dots for second number
                for (let i = 0; i < this.currentProblem.num2; i++) {
                    const shape = document.createElement('div');
                    shape.className = 'shape green-dot';
                    shapesMiddle.appendChild(shape);
                }

                // Generate purple dots for third number
                for (let i = 0; i < this.currentProblem.num3; i++) {
                    const shape = document.createElement('div');
                    shape.className = 'shape purple-dot';
                    shapesRight.appendChild(shape);
                }
            }

            handleInput(e, position) {
                const value = e.target.value;
                const input = e.target;

                if (this.clearWrongTimeout) {
                    clearTimeout(this.clearWrongTimeout);
                    this.clearWrongTimeout = null;
                }

                if (!/^\d$/.test(value)) {
                    input.value = '';
                    return;
                }

                const correctDigit = this.correctAnswer.toString()[position];
                if (value === correctDigit) {
                    input.classList.remove('wrong');
                    input.classList.add('correct');

                    // Move to next input if available
                    const nextInput = document.getElementById(`digit${position + 1}`);
                    if (nextInput) {
                        nextInput.focus();
                    }

                    // Check if complete answer is correct
                    this.checkCompleteAnswer();
                } else {
                    // Wrong digit - increment consecutive wrong counter
                    this.consecutiveWrong++;

                    // If 2 consecutive wrong answers, decrease score
                    if (this.consecutiveWrong >= 2) {
                        this.score = Math.max(1, this.score - 1);
                        this.consecutiveWrong = 0;
                        this.updateScore();
                    }

                    input.classList.remove('correct');
                    input.classList.add('wrong');
                    this.shakeEquation();
                    // Error sound removed for better user experience
                    // this.playErrorSound();

                    // Clear any existing timeout
                    if (this.clearWrongTimeout) {
                        clearTimeout(this.clearWrongTimeout);
                    }

                    // Auto-clear wrong answer after 0.5 seconds
                    this.clearWrongTimeout = setTimeout(() => {
                        if (input && input.parentNode && document.contains(input)) {
                            input.value = '';
                            input.classList.remove('wrong');
                            input.focus();
                        }
                        this.clearWrongTimeout = null;
                    }, 500);
                }
            }

            handleKeydown(e, position) {
                if (e.key === 'Backspace' && e.target.value === '') {
                    const prevInput = document.getElementById(`digit${position - 1}`);
                    if (prevInput) {
                        prevInput.focus();
                        prevInput.select();
                    }
                }
            }

            checkCompleteAnswer() {
                const inputs = document.querySelectorAll('.digit-input');
                let userAnswer = '';
                let allFilled = true;

                inputs.forEach(input => {
                    if (input.value === '') {
                        allFilled = false;
                    } else {
                        userAnswer += input.value;
                    }
                });

                if (allFilled && parseInt(userAnswer) === this.correctAnswer) {
                    // Correct answer - increase score and reset wrong counter
                    this.score++;
                    this.consecutiveWrong = 0;
                    this.updateScore();

                    this.celebrate();

                    setTimeout(() => {
                        this.generateProblem();
                    }, 2000);
                }
            }

            celebrate() {
                // Clear any pending timeouts
                if (this.clearWrongTimeout) {
                    clearTimeout(this.clearWrongTimeout);
                }

                this.playCelebrationSound();

                const gameContainer = document.getElementById('game-container');
                gameContainer.classList.add('bounce');

                // Show celebration message
                const msg = this.messages[Math.floor(Math.random() * this.messages.length)];
                const celebration = document.createElement('div');
                celebration.className = 'celebration-overlay';
                celebration.textContent = msg;
                document.body.appendChild(celebration);

                setTimeout(() => {
                    celebration.remove();
                }, 1500);

                this.createConfetti();

                setTimeout(() => {
                    gameContainer.classList.remove('bounce');
                }, 1500);
            }

            createConfetti() {
                const celebration = document.getElementById('celebration');
                const colors = ['#ff6b9d', '#ffa45b', '#ffd93d', '#6bcf7f', '#4fa3d1', '#ff9ff3'];

                for (let i = 0; i < 50; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    celebration.appendChild(confetti);

                    setTimeout(() => {
                        confetti.remove();
                    }, 3000);
                }
            }

            shakeEquation() {
                const container = document.getElementById('shapes-container');
                container.classList.add('shake');
                setTimeout(() => {
                    container.classList.remove('shake');
                }, 500);
            }

            updateScore() {
                const scoreInfo = document.getElementById('score-info');
                scoreInfo.textContent = `Score: ${this.score}`;
                this.updateTheme();
            }

            updateTheme() {
                const score = this.score;

                let bgGradient;
                let scoreColor;
                let shadowColor;

                if (score <= 5) {
                    bgGradient = 'linear-gradient(180deg, #dff0ff 0%, #f5fbff 100%)';
                    scoreColor = '#4fa3d1';
                    shadowColor = 'rgba(79, 163, 209, 0.22)';
                } else if (score <= 10) {
                    bgGradient = 'linear-gradient(180deg, #e7f7ef 0%, #f8fcfa 100%)';
                    scoreColor = '#6bcf7f';
                    shadowColor = 'rgba(107, 207, 127, 0.22)';
                } else {
                    bgGradient = 'linear-gradient(180deg, #fff2e6 0%, #fffaf5 100%)';
                    scoreColor = '#ff8b6b';
                    shadowColor = 'rgba(255, 139, 107, 0.22)';
                }

                document.body.style.background = bgGradient;
                const scoreInfo = document.getElementById('score-info');
                scoreInfo.style.background = scoreColor;
                scoreInfo.style.boxShadow = `0 4px 12px ${shadowColor}`;
                this.updateFloatingDecorations();
            }

            updateFloatingDecorations() {
                return;
            }

            setupGlobalKeyboard() {
                // Remove any existing global keyboard listener
                if (this.globalKeyboardHandler) {
                    document.removeEventListener('keydown', this.globalKeyboardHandler);
                }

                this.globalKeyboardHandler = (e) => {
                    // Only handle number keys
                    if (/^[0-9]$/.test(e.key)) {
                        e.preventDefault();
                        this.enterDigit(e.key);
                    }
                };

                document.addEventListener('keydown', this.globalKeyboardHandler);
            }

            setupEventListeners() {
                // Setup global keyboard handling
                this.setupGlobalKeyboard();

                const keypad = document.getElementById('keypad');
                keypad.addEventListener('click', (e) => {
                    const button = e.target.closest('.keypad-button');
                    if (!button) {
                        return;
                    }

                    const digit = button.dataset.digit;
                    if (digit !== undefined) {
                        this.enterDigit(digit);
                        return;
                    }

                    if (button.dataset.action === 'backspace') {
                        this.backspaceInput();
                    }

                    if (button.dataset.action === 'clear') {
                        this.clearInputs();
                    }
                });
            }
        }

        // Ensure the page is always ready to receive keypresses
        window.addEventListener('load', () => {
            document.body.setAttribute('tabindex', '0');
            document.body.focus();
            new MathGame();
        });

        // Refocus body if focus is lost
        document.addEventListener('click', () => {
            document.body.focus();
        });
    </script>
</body>
</html>
