<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تایپینگ فارسی برای کودکان</title>
    <style>
        @font-face {
            font-family: 'Koodak';
            src: url('public/koodak.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }

        :root {
            --farsi-font: 'Koodak', 'Tahoma', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--farsi-font);
            background: linear-gradient(135deg, #a8e6cf 0%, #ffd3b6 50%, #ffaaa5 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            outline: none;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            position: relative;
            -webkit-text-size-adjust: 100%;
        }

        body::before {
            content: '⭐';
            position: absolute;
            font-size: 2em;
            animation: float 3s ease-in-out infinite;
            top: 10%;
            left: 10%;
            opacity: 0.4;
        }

        body::after {
            content: '⚡';
            position: absolute;
            font-size: 2.5em;
            animation: float 4s ease-in-out infinite;
            bottom: 10%;
            right: 10%;
            opacity: 0.4;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(8deg); }
        }

        .star-decoration {
            position: absolute;
            font-size: 1.5em;
            animation: twinkle 2s ease-in-out infinite;
            pointer-events: none;
            opacity: 0.4;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.15); }
        }

        .game-container {
            background: linear-gradient(135deg, #ffffff 0%, #fff5f7 100%);
            border-radius: 30px;
            padding: 40px 50px;
            box-shadow: 0 20px 60px rgba(255,105,180,0.3), 0 0 0 6px rgba(255,182,193,0.5);
            max-width: 900px;
            width: 100%;
            text-align: center;
            position: relative;
            border: 6px solid transparent;
            background-clip: padding-box;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #ffa45b, #ffd93d, #6bcf7f, #4fa3d1, #ff6b9d);
            border-radius: 36px;
            z-index: -1;
            animation: rainbow 3s linear infinite;
            background-size: 300% 300%;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .title {
            color: #ff6b9d;
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 2px 2px 0px #ffa45b, 4px 4px 0px #ffd93d;
            animation: titleBounce 2s ease-in-out infinite;
            letter-spacing: 2px;
        }

        @keyframes titleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .word-display {
            font-size: 180px;
            font-weight: 700;
            margin: 40px 0;
            min-height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
            animation: wordPulse 2s ease-in-out infinite;
        }

        @keyframes wordPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .letter {
            display: inline;
            transition: all 0.3s ease;
        }

        .letter.default {
            color: #c8b7db;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.1);
        }

        .letter.correct {
            color: #6bcf7f;
            text-shadow: 0 0 20px rgba(107, 207, 127, 0.8), 3px 3px 0px rgba(0,0,0,0.2);
            animation: letterPop 0.4s ease-out;
        }

        @keyframes letterPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .letter.incorrect {
            color: #ff9ff3;
            text-shadow: 0 0 20px rgba(255, 159, 243, 0.8), 3px 3px 0px rgba(0,0,0,0.2);
            animation: shake 0.5s ease-in-out;
        }

        .input-area {
            margin: 30px 0;
        }

        .typing-input {
            font-size: 24px;
            padding: 15px 20px;
            border: 3px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            width: 300px;
            text-align: center;
            font-family: var(--farsi-font);
            direction: rtl;
        }

        .typing-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .progress {
            font-size: 1.4em;
            background: linear-gradient(135deg, #ff6b9d, #ffa45b);
            color: white;
            margin: 20px auto 0 auto;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 6px 15px rgba(255, 107, 157, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confetti-fall 3s linear forwards;
        }

        .success-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #6bcf7f 0%, #4fa3d1 25%, #ffd93d 75%, #6bcf7f 100%);
            color: white;
            padding: 30px 50px;
            border-radius: 35px;
            font-size: 3em;
            font-weight: 900;
            z-index: 1000;
            animation: celebrate 1.5s, rainbow 2s linear infinite;
            display: none;
            box-shadow: 0 25px 70px rgba(255,182,193,0.6), 0 0 80px rgba(107, 207, 127, 0.6);
            border: 8px solid #ffffff;
            background-size: 300% 300%;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.3);
        }

        .error-warning {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ff9ff3, #feca57);
            color: white;
            padding: 20px 40px;
            border-radius: 25px;
            font-size: 1.8em;
            font-weight: 700;
            z-index: 1000;
            animation: error-shake 0.5s ease-out forwards;
            display: none;
            box-shadow: 0 15px 40px rgba(255, 159, 243, 0.6);
            border: 5px solid #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.5s;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes celebrate {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2) rotate(10deg); opacity: 1; }
            70% { transform: translate(-50%, -50%) scale(1.05) rotate(-5deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes error-shake {
            0%, 100% { transform: translate(-50%, -50%); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-55%, -50%); }
            20%, 40%, 60%, 80% { transform: translate(-45%, -50%); }
        }

        .instructions {
            color: white;
            font-size: 1.1em;
            margin-top: 15px;
            padding: 15px;
            background: linear-gradient(135deg, #4fa3d1, #6bcf7f);
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(79, 163, 209, 0.4);
            font-weight: bold;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .bounce {
            animation: bounce 0.5s ease-in-out 3;
        }
    </style>
</head>
<body>
    <!-- Floating decorations -->
    <div class="star-decoration" style="top: 5%; left: 15%;">🚀</div>
    <div class="star-decoration" style="top: 15%; right: 20%; animation-delay: 0.5s;">📚</div>
    <div class="star-decoration" style="bottom: 20%; left: 10%; animation-delay: 1s;">⌨️</div>
    <div class="star-decoration" style="bottom: 15%; right: 15%; animation-delay: 1.5s;">✨</div>
    <div class="star-decoration" style="top: 50%; left: 5%; animation-delay: 0.8s;">🎮</div>
    <div class="star-decoration" style="top: 60%; right: 8%; animation-delay: 1.2s;">🌟</div>

    <div class="game-container" id="game-container">
        <h1 class="title">🎮 بازی تایپینگ فارسی 🚀</h1>

        <div class="word-display" id="wordDisplay"></div>

        <div class="progress" id="progress">کلمه ۱ از ۱۷۵</div>

        <div class="instructions">شروع به تایپ کنید! 🎯</div>
    </div>

    <div class="celebration" id="celebration"></div>
    <div class="success-message" id="successMessage">آفرین! 🎉</div>
    <div class="error-warning" id="errorWarning">حرف اشتباه!</div>

    <script>
        const TYPING_WORD_ORDER = [
            // مرحله ۱: کلمات بسیار ساده (۱-۲۰) - Very simple words
            "من", "تو", "او", "ما", "آب", "نان", "گل", "سیب", "توپ", "ماه",
            "بابا", "مامان", "نی نی", "بله", "نه", "دم", "پا", "سر", "چشم", "دست",

            // مرحله ۲: حیوانات ساده (۲۱-۴۰) - Simple animals
            "گربه", "سگ", "مرغ", "ماهی", "گاو", "گوسفند", "بز", "اسب", "خروس", "موش",
            "پرنده", "جوجه", "خرگوش", "فیل", "شیر", "خرس", "میمون", "زرافه", "ببر", "پروانه",

            // مرحله ۳: میوه‌ها (۴۱-۶۰) - Fruits
            "موز", "پرتقال", "انگور", "هندوانه", "خربزه", "گیلاس", "آلبالو", "هلو", "گلابی", "انار",
            "توت", "زردآلو", "لیمو", "کیوی", "آناناس", "طالبی", "انجیر", "خرما", "آلو", "بادام",

            // مرحله ۴: رنگ‌ها و اشیاء ساده (۶۱-۸۰) - Colors and simple objects
            "قرمز", "آبی", "زرد", "سبز", "سفید", "سیاه", "صورتی", "نارنجی", "بنفش", "قهوه‌ای",
            "خانه", "در", "پنجره", "میز", "صندلی", "تخت", "کتاب", "مداد", "کیف", "لباس",

            // مرحله ۵: فعالیت‌ها و اشیاء (۸۱-۱۰۰) - Activities and objects
            "بازی", "خواب", "غذا", "شیر", "آب", "نوشیدنی", "کفش", "جوراب", "کلاه", "عینک",
            "ماشین", "اتوبوس", "دوچرخه", "قایق", "بادبادک", "توپ", "عروسک", "خرس", "اسباب", "پارک",

            // مرحله ۶: خانواده و محیط (۱۰۱-۱۲۰) - Family and environment
            "پدر", "مادر", "برادر", "خواهر", "عمو", "دایی", "خاله", "عمه", "بابابزرگ", "مامان‌بزرگ",
            "دوست", "معلم", "دکتر", "آسمان", "ستاره", "خورشید", "ابر", "باران", "برف", "باد",

            // مرحله ۷: طبیعت و مکان‌ها (۱۲۱-۱۴۰) - Nature and places
            "درخت", "برگ", "شاخه", "ریشه", "باغ", "مزرعه", "جنگل", "کوه", "دریا", "رودخانه",
            "ساحل", "شن", "سنگ", "چمن", "علف", "مدرسه", "بیمارستان", "فروشگاه", "رستوران", "سینما",

            // مرحله ۸: غذاها و اشیاء روزمره (۱۴۱-۱۶۰) - Foods and daily items
            "برنج", "ماست", "پنیر", "تخم", "مرغ", "گوشت", "ماکارونی", "سوپ", "ساندویچ", "کیک",
            "شیرینی", "بستنی", "آب‌میوه", "چای", "شکلات", "نان", "قاشق", "چنگال", "بشقاب", "لیوان",

            // مرحله ۹: حشرات و پرندگان (۱۶۱-۱۷۵) - Insects and birds
            "زنبور", "مورچه", "ملخ", "سوسک", "کرم", "عنکبوت", "کبوتر", "کلاغ", "گنجشک", "طوطی",
            "قو", "اردک", "غاز", "بلبل", "هدهد"
        ];

        let words = [];

        let currentWordIndex = 0;
        let currentWord = '';
        let typedText = '';

        const wordDisplay = document.getElementById('wordDisplay');
        const progress = document.getElementById('progress');
        const celebration = document.getElementById('celebration');
        const successMessage = document.getElementById('successMessage');
        const errorWarning = document.getElementById('errorWarning');
        const instructions = document.querySelector('.instructions');

        // Initialize Audio Context for sound effects
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // Persian-style success sound - bright and celebratory
        function playSuccessSound() {
            const now = audioContext.currentTime;

            // Bright ascending major arpeggio with Persian flavor
            // C major triad ascending: C, E, G, high C - universally positive sound
            const frequencies = [523.25, 659.25, 783.99, 1046.50]; // C, E, G, C

            frequencies.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = freq;
                oscillator.type = 'sine'; // Smooth, melodic tone

                const startTime = now + index * 0.08; // Faster for excitement
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.3, startTime + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.25);

                oscillator.start(startTime);
                oscillator.stop(startTime + 0.25);
            });

            // Add sparkle with higher harmonics
            const sparkleFreqs = [1318.51, 1567.98]; // E and G high octave
            sparkleFreqs.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = freq;
                oscillator.type = 'triangle';

                const startTime = now + 0.25 + index * 0.05;
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.2, startTime + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);

                oscillator.start(startTime);
                oscillator.stop(startTime + 0.3);
            });
        }

        // Persian-style error sound - descending pattern
        function playErrorSound() {
            const now = audioContext.currentTime;

            // Descending "wrong" tones with Persian intervals
            const frequencies = [493.88, 440, 392]; // B, A, G - descending

            frequencies.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = freq;
                oscillator.type = 'triangle'; // Slightly harsher for error

                const startTime = now + index * 0.08;
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.15, startTime + 0.03);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.2);

                oscillator.start(startTime);
                oscillator.stop(startTime + 0.2);
            });
        }

        // Helper function to check if a character is any type of space
        function isAnySpace(char) {
            // Regular space, half-space (ZWNJ), NBSP, thin space, etc.
            return char === ' ' || char === '\u200C' || char === '\u00A0' ||
                   char === '\u2009' || char === '\u202F' || /\s/.test(char);
        }

        // Remove all spaces from a string for comparison
        function removeSpaces(str) {
            return str.replace(/[\s\u200C\u00A0\u2009\u202F]/g, '');
        }

        function normalizeChar(char) {
            // Accept ا for آ
            if (char === 'ا') return 'آ';
            // Normalize all space types to regular space
            if (isAnySpace(char)) return ' ';
            return char;
        }

        function showError() {
            // Removed error sound - visual feedback only

            const gameContainer = document.getElementById('game-container');
            gameContainer.classList.add('shake');

            errorWarning.style.display = 'block';

            setTimeout(() => {
                gameContainer.classList.remove('shake');
                errorWarning.style.display = 'none';
            }, 800);
        }

        async function loadTypingWords() {
            const response = await fetch('data/farsi-word-bank.json');
            if (!response.ok) {
                throw new Error(`Failed to load shared Farsi word bank: ${response.status}`);
            }

            const bank = await response.json();
            const bankByFa = new Map(bank.map(entry => [entry.fa, entry]));

            return TYPING_WORD_ORDER.map(word => {
                const entry = bankByFa.get(word);
                if (!entry) {
                    throw new Error(`Missing shared bank entry for "${word}"`);
                }
                return entry.fa;
            });
        }

        async function initGame() {
            try {
                words = await loadTypingWords();
            } catch (error) {
                console.error(error);
                instructions.textContent = 'بارگذاری واژه‌ها انجام نشد.';
                progress.textContent = 'خطا';
                return;
            }

            currentWordIndex = 0;
            showWord();
            
            // Ensure the body is focused so keyboard events work
            document.body.focus();
        }

        function showWord() {
            currentWord = words[currentWordIndex];
            typedText = '';
            updateWordDisplay();
            updateProgress();
        }

        function updateWordDisplay() {
            const correctPart = currentWord.substring(0, typedText.length);
            let remainingPart = currentWord.substring(typedText.length);
            
            // Check if current typing is correct so far
            const isCorrectSoFar = currentWord.startsWith(typedText);
            
            let html = '';
            if (typedText.length > 0) {
                if (isCorrectSoFar) {
                    html += `<span class="letter correct">${correctPart}</span>`;
                } else {
                    // Show the correct part in green and incorrect part in red
                    let correctLength = 0;
                    for (let i = 0; i < Math.min(typedText.length, currentWord.length); i++) {
                        if (typedText[i] === currentWord[i]) {
                            correctLength++;
                        } else {
                            break;
                        }
                    }
                    if (correctLength > 0) {
                        html += `<span class="letter correct">${currentWord.substring(0, correctLength)}</span>`;
                    }
                    if (correctLength < typedText.length) {
                        html += `<span class="letter incorrect">${currentWord.substring(correctLength, typedText.length)}</span>`;
                    }
                    remainingPart = currentWord.substring(typedText.length);
                }
            }
            
            if (remainingPart) {
                html += `<span class="letter default">${remainingPart}</span>`;
            }
            
            wordDisplay.innerHTML = html;
        }

        function toPersianDigits(value) {
            return String(value).replace(/\d/g, digit => '۰۱۲۳۴۵۶۷۸۹'[Number(digit)]);
        }

        function updateProgress() {
            progress.textContent = `کلمه ${toPersianDigits(currentWordIndex + 1)} از ${toPersianDigits(words.length)}`;
        }

        function createConfetti() {
            const colors = ['#ff6b9d', '#ffa45b', '#ffd93d', '#6bcf7f', '#4fa3d1', '#ff9ff3'];

            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                celebration.appendChild(confetti);

                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }
        }

        function showSuccess() {
            playSuccessSound();

            const gameContainer = document.getElementById('game-container');
            gameContainer.classList.add('bounce');

            successMessage.style.display = 'block';
            createConfetti();

            setTimeout(() => {
                gameContainer.classList.remove('bounce');
            }, 1500);

            setTimeout(() => {
                successMessage.style.display = 'none';
                currentWordIndex++;

                if (currentWordIndex >= words.length) {
                    currentWordIndex = 0; // Reset to start
                }

                showWord();
            }, 2000);
        }

        document.addEventListener('keydown', function(e) {
            if (!currentWord) return;

            // Handle backspace
            if (e.key === 'Backspace') {
                e.preventDefault();
                if (typedText.length > 0) {
                    typedText = typedText.slice(0, -1);
                    updateWordDisplay();
                }
                return;
            }

            // Handle regular characters
            if (e.key.length === 1) {
                e.preventDefault();

                // Get the expected character at current position
                let expectedChar = currentWord[typedText.length];
                const normalizedTypedChar = normalizeChar(e.key);
                const normalizedExpectedChar = normalizeChar(expectedChar);

                // If user typed a space and the expected character is a space, accept it
                if (isAnySpace(e.key) && isAnySpace(expectedChar)) {
                    typedText += expectedChar;
                    updateWordDisplay();

                    // Check if word is completed correctly
                    if (typedText === currentWord) {
                        showSuccess();
                    }
                    return;
                }

                // If user typed a non-space but expected a space, skip the space(s)
                if (!isAnySpace(e.key) && isAnySpace(expectedChar)) {
                    // Skip all consecutive spaces in the word
                    let nextPos = typedText.length;
                    while (nextPos < currentWord.length && isAnySpace(currentWord[nextPos])) {
                        typedText += currentWord[nextPos];
                        nextPos++;
                    }

                    // Now check if the typed character matches the next non-space character
                    expectedChar = currentWord[typedText.length];
                    if (expectedChar && normalizedTypedChar === normalizeChar(expectedChar)) {
                        typedText += expectedChar;
                        updateWordDisplay();

                        // Check if word is completed correctly
                        if (typedText === currentWord) {
                            showSuccess();
                        }
                        return;
                    } else if (!expectedChar) {
                        // We've reached the end
                        updateWordDisplay();
                        if (typedText === currentWord) {
                            showSuccess();
                        }
                        return;
                    } else {
                        // Wrong character after skipping spaces
                        // Undo the space skipping
                        typedText = typedText.substring(0, typedText.length - nextPos + typedText.length - (nextPos - typedText.length));
                        showError();
                        return;
                    }
                }

                // Normal character matching (both non-space or user typed space when not expected)
                if (normalizedTypedChar === normalizedExpectedChar) {
                    // Correct character - advance cursor
                    typedText += expectedChar; // Use the original expected character to maintain word integrity
                    updateWordDisplay();

                    // Check if word is completed correctly
                    if (typedText === currentWord) {
                        showSuccess();
                    }
                } else {
                    // Incorrect character - show error and don't advance cursor
                    showError();
                }
            }
        });

        // Ensure focus when page loads
        window.addEventListener('load', function() {
            void initGame();
            document.body.focus();
        });

        // Re-focus if user clicks somewhere
        document.addEventListener('click', function() {
            document.body.focus();
        });
    </script>
</body>
