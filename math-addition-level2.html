<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Math Addition - Level 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #f0f5ff 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            padding: 16px;
        }

        .container {
            background: #ffffff;
            border-radius: 28px;
            padding: 32px 36px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 800px;
            width: 100%;
            max-height: 95vh;
            max-height: 95dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        .level-badge {
            font-size: 1em;
            font-weight: 700;
            color: #5b7fa5;
            background: #eef3f9;
            padding: 8px 18px;
            border-radius: 999px;
        }

        .reset-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: #eef3f9;
            color: #5b7fa5;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            line-height: 1;
        }

        .reset-btn:active {
            background: #dce4ef;
        }

        .equation {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 4px 0;
        }

        .num {
            font-size: 5em;
            font-weight: 900;
            color: #3b5f8a;
            min-width: 80px;
            text-align: center;
            line-height: 1.1;
        }

        .op {
            font-size: 4em;
            font-weight: 900;
            color: #7cab7e;
            min-width: 48px;
            text-align: center;
        }

        .blank {
            width: 90px;
            height: 100px;
            font-size: 5em;
            font-weight: 900;
            text-align: center;
            border: 4px dashed #b0c8e4;
            border-radius: 16px;
            background: #fafcff;
            color: #3b5f8a;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            line-height: 1;
        }

        .blank.drag-over {
            border-color: #5b7fa5;
            border-style: solid;
            background: #eef3f9;
            transform: scale(1.06);
        }

        .blank.correct {
            border-color: #7cab7e;
            border-style: solid;
            background: #e8f5e9;
            color: #3a7a3c;
            animation: pop 0.35s ease;
        }

        .blank.wrong {
            border-color: #d4a0a0;
            border-style: solid;
            background: #fdf0f0;
            animation: shake 0.35s;
        }

        @keyframes pop {
            0% { transform: scale(0.85); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-4px); }
        }

        .options {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .option {
            width: 80px;
            height: 90px;
            font-size: 3.4em;
            font-weight: 900;
            color: #ffffff;
            background: linear-gradient(135deg, #7cab7e, #5b9f5d);
            border: none;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            box-shadow: 0 4px 12px rgba(90, 140, 90, 0.25);
            transition: transform 0.15s, opacity 0.15s;
            touch-action: none;
        }

        .option:active {
            transform: scale(0.92);
            cursor: grabbing;
        }

        .option.used {
            opacity: 0.25;
            pointer-events: none;
        }

        .option.dragging {
            opacity: 0.4;
        }

        .touch-clone {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.92;
        }

        .celebration {
            font-size: 2.8em;
            font-weight: 900;
            color: #5b9f5d;
            animation: pop 0.5s ease;
            padding: 8px 0;
            min-height: 1.4em;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 20px;
                gap: 16px;
            }
            .num { font-size: 3.6em; min-width: 60px; }
            .op { font-size: 3em; min-width: 36px; }
            .blank { width: 68px; height: 80px; font-size: 3.6em; }
            .option { width: 64px; height: 74px; font-size: 2.6em; }
            .celebration { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container" id="game">
        <div class="header">
            <span class="level-badge" id="levelBadge">Level 1</span>
            <button class="reset-btn" id="resetBtn" aria-label="Reset progress">↻</button>
        </div>

        <div class="equation" id="equation"></div>

        <div class="options" id="options"></div>

        <div class="celebration" id="celebration"></div>
    </div>

    <script>
        class Game {
            constructor() {
                this.level = 1;
                this.questionIndex = 0;
                this.questionsPerLevel = 5;
                this.problem = {};
                this.blankPositions = [];
                this.userAnswers = {};
                this.draggedEl = null;
                this.touchEl = null;
                this.touchClone = null;

                this.load();
                this.render();
            }

            // ---- persistence ----

            load() {
                try {
                    const d = JSON.parse(localStorage.getItem('math-addition-level2') || '{}');
                    this.level = d.level || 1;
                    this.questionIndex = d.questionIndex || 0;
                } catch (_) {}
            }

            save() {
                try {
                    localStorage.setItem('math-addition-level2', JSON.stringify({
                        level: this.level,
                        questionIndex: this.questionIndex
                    }));
                } catch (_) {}
            }

            reset() {
                this.level = 1;
                this.questionIndex = 0;
                this.save();
                this.render();
            }

            // ---- problem generation ----

            maxSum() {
                const table = [0, 9, 10, 12, 14, 16, 18, 20, 23, 26, 29, 32, 35, 38];
                if (this.level < table.length) return table[this.level];
                return 40;
            }

            genProblem() {
                const max = this.maxSum();
                const sum = Math.floor(Math.random() * (max - 1)) + 2;
                const a = Math.floor(Math.random() * (sum + 1));
                const b = sum - a;
                const c = sum;
                this.problem = { a, b, c };
                const positions = ['a', 'b', 'c'];
                this.blankPositions = [positions[Math.floor(Math.random() * 3)]];
                this.userAnswers = {};
            }

            genOptions() {
                const correct = [];
                this.blankPositions.forEach(p => {
                    String(this.problem[p]).split('').forEach(d => correct.push(d));
                });
                const opts = [...correct];
                const all = '0123456789'.split('');
                while (opts.length < 4) {
                    const r = all[Math.floor(Math.random() * 10)];
                    if (!opts.includes(r)) opts.push(r);
                }
                for (let i = opts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [opts[i], opts[j]] = [opts[j], opts[i]];
                }
                return opts;
            }

            // ---- rendering ----

            render() {
                this.genProblem();

                const eq = document.getElementById('equation');
                eq.innerHTML = '';

                const parts = [
                    { v: this.problem.a, k: 'a' },
                    { v: '+', k: 'op1' },
                    { v: this.problem.b, k: 'b' },
                    { v: '=', k: 'op2' },
                    { v: this.problem.c, k: 'c' }
                ];

                parts.forEach(p => {
                    if (p.k === 'op1' || p.k === 'op2') {
                        const el = document.createElement('div');
                        el.className = 'op';
                        el.textContent = p.v;
                        eq.appendChild(el);
                    } else if (this.blankPositions.includes(p.k)) {
                        const digits = String(p.v);
                        for (let i = 0; i < digits.length; i++) {
                            const b = document.createElement('div');
                            b.className = 'blank';
                            b.dataset.position = p.k;
                            b.dataset.index = i;
                            b.dataset.expected = digits[i];
                            this.setupDrop(b);
                            eq.appendChild(b);
                        }
                    } else {
                        const el = document.createElement('div');
                        el.className = 'num';
                        el.textContent = p.v;
                        eq.appendChild(el);
                    }
                });

                this.renderOptions();
                this.updateBadge();
                document.getElementById('celebration').textContent = '';
            }

            updateBadge() {
                document.getElementById('levelBadge').textContent = `Level ${this.level}`;
            }

            renderOptions() {
                const grid = document.getElementById('options');
                grid.innerHTML = '';

                this.genOptions().forEach(d => {
                    const el = document.createElement('div');
                    el.className = 'option';
                    el.textContent = d;
                    el.dataset.digit = d;
                    el.draggable = true;

                    el.addEventListener('dragstart', e => {
                        this.draggedEl = el;
                        el.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('text/plain', d);
                    });
                    el.addEventListener('dragend', () => {
                        el.classList.remove('dragging');
                        this.draggedEl = null;
                    });

                    el.addEventListener('touchstart', e => this.onTouchStart(e), { passive: false });
                    el.addEventListener('touchmove', e => this.onTouchMove(e), { passive: false });
                    el.addEventListener('touchend', e => this.onTouchEnd(e), { passive: false });

                    grid.appendChild(el);
                });
            }

            setupDrop(blank) {
                blank.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    blank.classList.add('drag-over');
                });
                blank.addEventListener('dragleave', () => blank.classList.remove('drag-over'));
                blank.addEventListener('drop', e => {
                    e.preventDefault();
                    blank.classList.remove('drag-over');
                    this.check(blank, e.dataTransfer.getData('text/plain'), blank.dataset.expected);
                });
            }

            // ---- touch drag ----

            onTouchStart(e) {
                e.preventDefault();
                this.touchEl = e.currentTarget;
                const r = this.touchEl.getBoundingClientRect();
                this.touchClone = this.touchEl.cloneNode(true);
                this.touchClone.className = 'option touch-clone';
                this.touchClone.style.width = r.width + 'px';
                this.touchClone.style.height = r.height + 'px';
                this.touchClone.style.left = '0';
                this.touchClone.style.top = '0';
                document.body.appendChild(this.touchClone);
                this.touchEl.classList.add('dragging');
                this.touchOffX = r.width / 2;
                this.touchOffY = r.height / 2;
                this.moveClone(e.touches[0]);
            }

            onTouchMove(e) {
                e.preventDefault();
                if (this.touchClone) this.moveClone(e.touches[0]);
            }

            moveClone(t) {
                this.touchClone.style.transform = `translate3d(${t.clientX - this.touchOffX}px, ${t.clientY - this.touchOffY}px, 0)`;
            }

            onTouchEnd(e) {
                e.preventDefault();
                if (!this.touchEl || !this.touchClone) return;
                const t = e.changedTouches[0];
                const target = document.elementFromPoint(t.clientX, t.clientY);
                this.touchEl.classList.remove('dragging');
                if (this.touchClone.parentNode) this.touchClone.parentNode.removeChild(this.touchClone);
                this.touchClone = null;
                if (target && target.classList.contains('blank')) {
                    this.check(target, this.touchEl.dataset.digit, target.dataset.expected);
                }
                this.touchEl = null;
            }

            // ---- answer checking ----

            check(blank, digit, expected) {
                if (digit === expected) {
                    blank.classList.remove('wrong');
                    blank.classList.add('correct');
                    blank.textContent = digit;

                    const pos = blank.dataset.position;
                    const idx = parseInt(blank.dataset.index);
                    if (!this.userAnswers[pos]) this.userAnswers[pos] = [];
                    this.userAnswers[pos][idx] = digit;

                    if (this.draggedEl) this.draggedEl.classList.add('used');
                    else if (this.touchEl) this.touchEl.classList.add('used');

                    if (this.allCorrect()) this.next();
                } else {
                    blank.classList.remove('correct');
                    blank.classList.add('wrong');
                    setTimeout(() => blank.classList.remove('wrong'), 350);
                }
            }

            allCorrect() {
                return Array.from(document.querySelectorAll('.blank')).every(b => b.classList.contains('correct'));
            }

            next() {
                this.questionIndex++;
                if (this.questionIndex >= this.questionsPerLevel) {
                    this.level++;
                    this.questionIndex = 0;
                }
                this.save();

                const msg = ['Great!', 'Awesome!', 'Nice!', 'Perfect!', 'Well done!', 'Super!', 'Correct!', 'Amazing!']
                    [Math.floor(Math.random() * 8)];
                document.getElementById('celebration').textContent = msg;

                setTimeout(() => this.render(), 1200);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const g = new Game();
            document.getElementById('resetBtn').addEventListener('click', () => g.reset());
        });
    </script>
</body>
</html>
