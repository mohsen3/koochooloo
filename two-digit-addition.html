<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Two-Digit Addition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #f0f5ff 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            padding: 16px;
        }

        .container {
            background: #ffffff;
            border-radius: 28px;
            padding: 32px 36px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 600px;
            width: 100%;
            max-height: 95vh;
            max-height: 95dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .q-badge {
            font-size: 1em;
            font-weight: 700;
            color: #5b7fa5;
            background: #eef3f9;
            padding: 8px 18px;
            border-radius: 999px;
            white-space: nowrap;
        }

        .reset-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: #eef3f9;
            color: #5b7fa5;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            line-height: 1;
        }

        .reset-btn:active {
            background: #dce4ef;
        }

        .mode-select {
            font-size: 0.85em;
            padding: 6px 14px;
            border: 2px solid #d0dcec;
            border-radius: 999px;
            background: #f8faff;
            color: #5b7fa5;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            appearance: auto;
            -webkit-appearance: auto;
        }

        .problem {
            display: inline-block;
            margin: 2px auto;
        }

        .carry-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            min-height: 34px;
        }

        .carry-cell {
            width: 60px;
            height: 32px;
            font-size: 1.5em;
            font-weight: 700;
            color: #c44569;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .carry-cell.visible {
            opacity: 1;
        }

        .num-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 2px 16px;
        }

        .op-sign {
            font-size: 3em;
            font-weight: 900;
            color: #7cab7e;
            width: 48px;
            text-align: center;
            flex-shrink: 0;
        }

        .digit-cell {
            width: 60px;
            height: 62px;
            font-size: 3.5em;
            font-weight: 900;
            color: #3b5f8a;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
        }

        .ans-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 4px 16px 0;
            border-top: 3px solid #d0dcec;
            min-height: 76px;
            margin-top: 2px;
        }

        .blank {
            width: 66px;
            height: 76px;
            font-size: 3.2em;
            font-weight: 900;
            border: 4px dashed #b0c8e4;
            border-radius: 14px;
            background: #fafcff;
            color: #3b5f8a;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            line-height: 1;
        }

        .blank.drag-over {
            border-color: #5b7fa5;
            border-style: solid;
            background: #eef3f9;
            transform: scale(1.06);
        }

        .blank.correct {
            border-color: #7cab7e;
            border-style: solid;
            background: #e8f5e9;
            color: #3a7a3c;
            animation: pop 0.3s ease;
        }

        .blank.wrong {
            border-color: #d4a0a0;
            border-style: solid;
            background: #fdf0f0;
            animation: shake 0.3s;
        }

        @keyframes pop {
            0% { transform: scale(0.85); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-4px); }
        }

        .options {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 2px;
        }

        .option {
            width: 64px;
            height: 72px;
            font-size: 2.6em;
            font-weight: 900;
            color: #ffffff;
            background: linear-gradient(135deg, #7cab7e, #5b9f5d);
            border: none;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            box-shadow: 0 4px 12px rgba(90, 140, 90, 0.25);
            transition: transform 0.15s, opacity 0.15s;
            touch-action: none;
        }

        .option:active {
            transform: scale(0.92);
            cursor: grabbing;
        }

        .option.used {
            opacity: 0.25;
            pointer-events: none;
        }

        .option.dragging {
            opacity: 0.4;
        }

        .touch-clone {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.92;
        }

        .celebration {
            font-size: 2em;
            font-weight: 700;
            color: #5b9f5d;
            animation: pop 0.5s ease;
            padding: 2px 0;
            min-height: 1.4em;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 14px;
                gap: 12px;
            }
            .digit-cell {
                width: 48px;
                height: 48px;
                font-size: 2.6em;
            }
            .blank {
                width: 52px;
                height: 60px;
                font-size: 2.4em;
            }
            .option {
                width: 50px;
                height: 58px;
                font-size: 2em;
            }
            .op-sign {
                font-size: 2.2em;
                width: 36px;
            }
            .carry-cell {
                width: 48px;
                height: 24px;
                font-size: 1.2em;
            }
            .celebration {
                font-size: 1.5em;
            }
        }
    </style>
  <!-- pwa:head -->
  <meta name="theme-color" content="#ea7a3d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Koochooloo">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <!-- /pwa:head -->
</head>
<body>
    <div class="container" id="game">
        <div class="header">
            <span class="q-badge" id="qBadge">Q1</span>
            <select class="mode-select" id="modeSelect">
                <option value="all">All</option>
                <option value="no-carry">No Carry</option>
                <option value="+01">+1</option>
                <option value="+02">+2</option>
                <option value="+03">+3</option>
                <option value="+10">+10</option>
                <option value="+20">+20</option>
                <option value="+30">+30</option>
            </select>
            <button class="reset-btn" id="resetBtn" aria-label="Reset progress">↻</button>
        </div>

        <div class="problem" id="problem"></div>

        <div class="options" id="options"></div>

        <div class="celebration" id="celebration"></div>
    </div>

    <script>
        class Game {
            constructor() {
                this.questionIndex = 1;
                this.num1 = 0;
                this.num2 = 0;
                this.answer = 0;
                this.mode = 'all';
                this.draggedEl = null;
                this.touchEl = null;
                this.touchClone = null;

                this.load();

                document.getElementById('modeSelect').addEventListener('change', e => {
                    this.mode = e.target.value;
                    this.render();
                });
                document.getElementById('resetBtn').addEventListener('click', () => {
                    this.questionIndex = 1;
                    this.save();
                    this.render();
                });

                this.render();
            }

            load() {
                try {
                    const d = JSON.parse(localStorage.getItem('two-digit-addition') || '{}');
                    this.questionIndex = d.questionIndex || 1;
                    this.mode = d.mode || 'all';
                    document.getElementById('modeSelect').value = this.mode;
                } catch (_) {}
            }

            save() {
                try {
                    localStorage.setItem('two-digit-addition', JSON.stringify({
                        questionIndex: this.questionIndex,
                        mode: this.mode
                    }));
                } catch (_) {}
            }

            genProblem() {
                let num1, num2;
                switch (this.mode) {
                    case 'no-carry':
                        do {
                            num1 = Math.floor(Math.random() * 90) + 10;
                            num2 = Math.floor(Math.random() * 90) + 10;
                        } while (this.hasCarry(num1, num2));
                        break;
                    case '+01': num1 = Math.floor(Math.random() * 90) + 10; num2 = 1; break;
                    case '+02': num1 = Math.floor(Math.random() * 90) + 10; num2 = 2; break;
                    case '+03': num1 = Math.floor(Math.random() * 90) + 10; num2 = 3; break;
                    case '+10': num1 = Math.floor(Math.random() * 90) + 10; num2 = 10; break;
                    case '+20': num1 = Math.floor(Math.random() * 90) + 10; num2 = 20; break;
                    case '+30': num1 = Math.floor(Math.random() * 90) + 10; num2 = 30; break;
                    default:
                        num1 = Math.floor(Math.random() * 90) + 10;
                        num2 = Math.floor(Math.random() * 90) + 10;
                }
                this.num1 = num1;
                this.num2 = num2;
                this.answer = num1 + num2;
            }

            hasCarry(num1, num2) {
                return (num1 % 10 + num2 % 10 >= 10) || (Math.floor(num1 / 10) + Math.floor(num2 / 10) >= 10);
            }

            genOptions() {
                const digits = this.answer.toString().split('');
                const opts = [...digits];
                const all = '0123456789'.split('');
                while (opts.length < 4) {
                    const r = all[Math.floor(Math.random() * 10)];
                    if (!opts.includes(r)) opts.push(r);
                }
                for (let i = opts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [opts[i], opts[j]] = [opts[j], opts[i]];
                }
                return opts;
            }

            render() {
                this.genProblem();
                this.renderProblem();
                this.renderOptions();
                document.getElementById('qBadge').textContent = `Q${this.questionIndex}`;
                document.getElementById('celebration').textContent = '';
            }

            renderProblem() {
                const container = document.getElementById('problem');
                container.innerHTML = '';

                const aStr = this.num1.toString().padStart(2, ' ');
                const bStr = this.num2.toString().padStart(2, ' ');
                const ansStr = this.answer.toString();
                const len = ansStr.length;

                const carryRow = document.createElement('div');
                carryRow.className = 'carry-row';
                if (len === 3) {
                    const ch = document.createElement('div');
                    ch.className = 'carry-cell';
                    ch.id = 'carry-h';
                    carryRow.appendChild(ch);
                }
                const ct = document.createElement('div');
                ct.className = 'carry-cell';
                ct.id = 'carry-t';
                carryRow.appendChild(ct);
                const co = document.createElement('div');
                co.className = 'carry-cell';
                carryRow.appendChild(co);
                container.appendChild(carryRow);

                const r1 = document.createElement('div');
                r1.className = 'num-row';
                const sp1 = document.createElement('div');
                sp1.className = 'op-sign';
                r1.appendChild(sp1);
                for (const ch of aStr) {
                    const d = document.createElement('div');
                    d.className = 'digit-cell';
                    d.textContent = ch.trim() || '';
                    r1.appendChild(d);
                }
                container.appendChild(r1);

                const r2 = document.createElement('div');
                r2.className = 'num-row';
                const op = document.createElement('div');
                op.className = 'op-sign';
                op.textContent = '+';
                r2.appendChild(op);
                for (const ch of bStr) {
                    const d = document.createElement('div');
                    d.className = 'digit-cell';
                    d.textContent = ch.trim() || '';
                    r2.appendChild(d);
                }
                container.appendChild(r2);

                const ansRow = document.createElement('div');
                ansRow.className = 'ans-row';
                if (len === 2) {
                    const sp = document.createElement('div');
                    sp.className = 'op-sign';
                    ansRow.appendChild(sp);
                }
                for (let i = 0; i < len; i++) {
                    const b = document.createElement('div');
                    b.className = 'blank';
                    b.dataset.index = i;
                    b.dataset.expected = ansStr[i];
                    this.setupDrop(b);
                    ansRow.appendChild(b);
                }
                container.appendChild(ansRow);
            }

            renderOptions() {
                const grid = document.getElementById('options');
                grid.innerHTML = '';
                this.genOptions().forEach(d => {
                    const el = document.createElement('div');
                    el.className = 'option';
                    el.textContent = d;
                    el.dataset.digit = d;
                    el.draggable = true;

                    el.addEventListener('dragstart', e => {
                        this.draggedEl = el;
                        el.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('text/plain', d);
                    });
                    el.addEventListener('dragend', () => {
                        el.classList.remove('dragging');
                        this.draggedEl = null;
                    });

                    el.addEventListener('touchstart', e => this.onTouchStart(e), { passive: false });
                    el.addEventListener('touchmove', e => this.onTouchMove(e), { passive: false });
                    el.addEventListener('touchend', e => this.onTouchEnd(e), { passive: false });

                    grid.appendChild(el);
                });
            }

            setupDrop(blank) {
                blank.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    blank.classList.add('drag-over');
                });
                blank.addEventListener('dragleave', () => blank.classList.remove('drag-over'));
                blank.addEventListener('drop', e => {
                    e.preventDefault();
                    blank.classList.remove('drag-over');
                    if (blank.classList.contains('correct')) return;
                    this.check(blank, e.dataTransfer.getData('text/plain'), blank.dataset.expected);
                });
            }

            onTouchStart(e) {
                e.preventDefault();
                this.touchEl = e.currentTarget;
                const r = this.touchEl.getBoundingClientRect();
                this.touchClone = this.touchEl.cloneNode(true);
                this.touchClone.className = 'option touch-clone';
                this.touchClone.style.width = r.width + 'px';
                this.touchClone.style.height = r.height + 'px';
                this.touchClone.style.left = '0';
                this.touchClone.style.top = '0';
                document.body.appendChild(this.touchClone);
                this.touchEl.classList.add('dragging');
                this.touchOffX = r.width / 2;
                this.touchOffY = r.height / 2;
                this.moveClone(e.touches[0]);
            }

            onTouchMove(e) {
                e.preventDefault();
                if (this.touchClone) this.moveClone(e.touches[0]);
            }

            moveClone(t) {
                this.touchClone.style.transform = `translate3d(${t.clientX - this.touchOffX}px, ${t.clientY - this.touchOffY}px, 0)`;
            }

            onTouchEnd(e) {
                e.preventDefault();
                if (!this.touchEl || !this.touchClone) return;
                const t = e.changedTouches[0];
                const target = document.elementFromPoint(t.clientX, t.clientY);
                this.touchEl.classList.remove('dragging');
                if (this.touchClone.parentNode) this.touchClone.parentNode.removeChild(this.touchClone);
                this.touchClone = null;
                if (target && target.classList.contains('blank') && !target.classList.contains('correct')) {
                    this.check(target, this.touchEl.dataset.digit, target.dataset.expected);
                }
                this.touchEl = null;
            }

            check(blank, digit, expected) {
                if (digit === expected) {
                    blank.classList.remove('wrong');
                    blank.classList.add('correct');
                    blank.textContent = digit;

                    if (this.draggedEl) this.draggedEl.classList.add('used');
                    else if (this.touchEl) this.touchEl.classList.add('used');

                    this.showCarry();

                    if (this.allCorrect()) this.next();
                } else {
                    blank.classList.remove('correct');
                    blank.classList.add('wrong');
                    setTimeout(() => blank.classList.remove('wrong'), 350);
                }
            }

            showCarry() {
                const blanks = document.querySelectorAll('.blank');
                const ansStr = this.answer.toString();

                const last = blanks[blanks.length - 1];
                if (last && last.classList.contains('correct')) {
                    const ones1 = this.num1 % 10;
                    const ones2 = this.num2 % 10;
                    if (ones1 + ones2 >= 10) {
                        const ct = document.getElementById('carry-t');
                        if (ct) { ct.textContent = '1'; ct.classList.add('visible'); }
                    }
                }

                if (ansStr.length === 3 && blanks.length >= 2) {
                    const mid = blanks[1];
                    if (mid && mid.classList.contains('correct')) {
                        const tens1 = Math.floor(this.num1 / 10) % 10;
                        const tens2 = Math.floor(this.num2 / 10) % 10;
                        const onesCarry = (this.num1 % 10 + this.num2 % 10 >= 10) ? 1 : 0;
                        if (tens1 + tens2 + onesCarry >= 10) {
                            const ch = document.getElementById('carry-h');
                            if (ch) { ch.textContent = '1'; ch.classList.add('visible'); }
                        }
                    }
                }
            }

            allCorrect() {
                return Array.from(document.querySelectorAll('.blank')).every(b => b.classList.contains('correct'));
            }

            next() {
                this.questionIndex++;
                this.save();
                const msgs = ['Great!', 'Awesome!', 'Nice!', 'Perfect!', 'Well done!', 'Super!', 'Correct!', 'Amazing!'];
                document.getElementById('celebration').textContent = msgs[Math.floor(Math.random() * msgs.length)];
                setTimeout(() => this.render(), 1200);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new Game();
        });
    </script>
  <script src="pwa.js" data-sw="sw.js" defer></script>
</body>
</html>
