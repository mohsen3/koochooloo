<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>جورچین کلمات فارسی</title>
    <style>
        @font-face {
            font-family: 'Koodak';
            src: url("public/koodak.ttf") format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }

        :root {
            --app-height: 100dvh;
            --farsi-font: 'Koodak', 'Tahoma', sans-serif;
            --paper: #f7e7cf;
            --card: #fff9f0;
            --line: #d9b68a;
            --ink: #4f3a22;
            --good: #36b66d;
            --body-bg-light: #f5dfc2;
            --body-bg-paper: #f7e7cf;
            --game-border-color: rgba(255, 255, 255, 0.9);
            --play-area-border: rgba(150, 100, 60, 0.2);
        }

        html {
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }
        * { box-sizing: border-box; }
        html,
        body,
        .game,
        .game * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            margin: 0;
            font-family: var(--farsi-font);
            min-height: 100vh;
            min-height: 100dvh;
            min-height: var(--app-height);
            height: var(--app-height);
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 15% 15%, rgba(255,255,255,0.7), transparent 20%),
                radial-gradient(circle at 80% 20%, rgba(255,220,170,0.45), transparent 20%),
                linear-gradient(135deg, var(--body-bg-light), var(--body-bg-paper));
            overflow: hidden;
            padding: 8px;
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        .game {
            width: min(1100px, 95vw);
            height: min(920px, calc(var(--app-height) - 16px));
            min-height: 0;
            display: flex;
            flex-direction: column;
            border-radius: 28px;
            border: 5px solid var(--game-border-color);
            box-shadow: 0 20px 60px rgba(89, 60, 32, 0.22);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 247, 234, 0.95));
            position: relative;
            padding: 20px clamp(14px, 2vw, 20px) clamp(14px, 2vw, 20px);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            color: var(--ink);
            margin-bottom: 16px;
        }
        .topbar-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        h1 {
            margin: 0;
            font-size: clamp(24px, 3.4vw, 50px);
            letter-spacing: 0.5px;
            line-height: 1;
        }
        .status {
            background: #fff;
            border: 2px solid #f1d6b1;
            border-radius: 999px;
            padding: 6px 16px;
            font-size: clamp(18px, 2vw, 30px);
            box-shadow: 0 6px 16px rgba(60, 40, 20, 0.1);
            white-space: nowrap;
        }
        .word-status {
            direction: ltr;
            text-align: center;
            font-family: 'Trebuchet MS', 'Arial', sans-serif;
            letter-spacing: 0.4px;
        }

        .play-area {
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
            border-radius: 20px;
            border: 2px dashed var(--play-area-border);
            transition: background 300ms ease;
            overflow: hidden;
        }

        .word-slots {
            position: absolute;
            top: clamp(18px, 7vmin, 120px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: row;
            direction: rtl;
            gap: clamp(0px, 0.15vw, 2px);
            pointer-events: none;
            z-index: 2;
        }

        .slot {
            position: relative;
            height: clamp(200px, 32vmin, 420px);
            min-width: 120px;
            padding: 52px var(--pad-right, 28px) 60px var(--pad-left, 28px);
            border: 8px dashed #c99757;
            border-radius: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(170px, 28vmin, 400px);
            line-height: 1;
            color: rgba(110, 75, 40, 0.45);
            background: rgba(255, 251, 243, 0.9);
            overflow: hidden;
            white-space: nowrap;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        }
        .slot.ready {
            border-color: #e4c8a2;
            background: rgba(255, 252, 247, 0.85);
        }
        .slot.waiting {
            opacity: 0.38;
            filter: saturate(0.72);
        }
        .slot.next {
            border-style: solid;
            border-color: #ffb446;
            background: rgba(255, 247, 214, 0.98);
            color: rgba(110, 75, 40, 0.8);
            box-shadow: 0 0 0 8px rgba(255, 198, 92, 0.18);
            animation: guidePulse 1100ms ease-in-out infinite;
        }
        .slot.good {
            border-style: solid;
            border-color: #8ddeaf;
            background: rgba(214, 255, 232, 0.95);
            transform: scale(1.06);
            animation: pop 260ms ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0.88); }
            100% { transform: scale(1.06); }
        }
        @keyframes guidePulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 8px rgba(255, 198, 92, 0.18); }
            50% { transform: scale(1.03); box-shadow: 0 0 0 12px rgba(255, 198, 92, 0.28); }
        }

        .tile {
            position: absolute;
            height: clamp(200px, 32vmin, 420px);
            min-width: 120px;
            padding: 52px var(--pad-right, 28px) 60px var(--pad-left, 28px);
            border-radius: 40px;
            border: 7px solid rgba(177, 114, 45, 0.45);
            box-shadow: 0 18px 27px rgba(62, 44, 26, 0.24);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(170px, 28vmin, 400px);
            line-height: 1;
            user-select: none;
            touch-action: none;
            cursor: grab;
            z-index: 3;
            transform: translate(-50%, -50%) rotate(var(--rot));
            transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
            background: var(--bg-pattern, #fff4de);
            overflow: hidden;
            white-space: nowrap;
        }

        .slot .char,
        .tile .char {
            display: block;
            line-height: 1.08;
            transform: translate(var(--char-shift-x, 0px), var(--char-shift-y, 1px));
            transform-origin: center;
        }

        .slot .char {
            color: rgba(110, 75, 40, 0.45);
        }

        .tile .char {
            color: #4f3a22;
            -webkit-background-clip: text;
            background-clip: text;
            background-image: var(--text-pattern);
            text-shadow: 2px 2px rgba(255,255,255,0.4);
            filter: drop-shadow(1px 2px 0 rgba(20, 20, 20, 0.2));
        }

        .tile.dragging {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.08) rotate(0deg);
            box-shadow: 0 18px 26px rgba(34, 25, 14, 0.3);
            z-index: 9;
        }

        .tile.locked {
            cursor: default;
            pointer-events: none;
            animation: ding 320ms ease-out;
        }
        .tile.next {
            box-shadow: 0 20px 28px rgba(62, 44, 26, 0.28), 0 0 0 8px rgba(255, 195, 72, 0.2);
        }
        .tile.disabled {
            opacity: 0.32;
            filter: grayscale(0.24) saturate(0.7);
            pointer-events: none;
            cursor: default;
        }

        @keyframes ding {
            0% { filter: saturate(1); }
            30% { filter: saturate(1.8) brightness(1.14); }
            100% { filter: saturate(1); }
        }

        .spark {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #ffe46a 55%, transparent 70%);
            pointer-events: none;
            animation: spark 500ms ease-out forwards;
            z-index: 10;
        }

        @keyframes spark {
            from { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
            to { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.25); opacity: 0; }
        }

        .win {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            background: rgba(255, 246, 225, 0.82);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 300ms ease;
            z-index: 100;
        }
        .win-badge {
            position: relative;
            padding: 22px 38px 18px;
            border: 4px solid rgba(95, 62, 28, 0.22);
            border-radius: 28px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 240, 210, 0.96));
            box-shadow:
                0 20px 34px rgba(72, 46, 21, 0.22),
                0 0 40px rgba(255, 200, 80, 0.3),
                inset 0 0 0 6px rgba(255, 255, 255, 0.5);
            font-size: clamp(52px, 8vw, 96px);
            color: #2f8f62;
            font-weight: 700;
            text-shadow: 0 2px 0 rgba(255, 255, 255, 0.6);
            z-index: 1;
            opacity: 0;
            transform: scale(0.2);
        }
        .win.show {
            opacity: 1;
            pointer-events: auto;
        }
        .win.show .win-badge {
            animation: badgeBounce 520ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes badgeBounce {
            0% { transform: scale(0.2); opacity: 0; }
            50% { transform: scale(1.12); opacity: 1; }
            70% { transform: scale(0.92); }
            100% { transform: scale(1); opacity: 1; }
        }

        .confetti {
            position: absolute;
            pointer-events: none;
            z-index: 60;
            animation: confettiBurst 1200ms ease-out forwards;
        }
        @keyframes confettiBurst {
            0% { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--dr)) scale(0.3); }
        }

        #resetBtn {
            cursor: pointer;
            border: none;
            font: inherit;
            color: var(--ink);
            background: rgba(220, 90, 100, 0.12);
            transition: background 180ms ease, transform 180ms ease;
            display: grid;
            place-items: center;
            min-width: 48px;
            padding: 6px 12px;
            line-height: 1;
        }
        #resetBtn:hover,
        #resetBtn:active {
            background: rgba(220, 90, 100, 0.28);
            transform: scale(1.04);
        }



        @media (max-height: 900px) and (orientation: landscape) {
            .game {
                padding: 14px;
            }

            .topbar {
                margin-bottom: 8px;
            }

            h1 {
                font-size: clamp(22px, 2.8vw, 34px);
            }

            .status {
                padding: 5px 14px;
                font-size: clamp(17px, 1.8vw, 24px);
            }

            .word-slots {
                top: clamp(12px, 4.5vmin, 40px);
            }

            .slot {
                height: clamp(140px, 22vmin, 300px);
                font-size: clamp(120px, 20vmin, 280px);
                min-width: 90px;
                padding: 36px var(--pad-right, 20px) 42px var(--pad-left, 20px);
                border-width: 6px;
                border-radius: 28px;
            }

            .tile {
                height: clamp(140px, 22vmin, 300px);
                font-size: clamp(120px, 20vmin, 280px);
                min-width: 90px;
                padding: 36px var(--pad-right, 20px) 42px var(--pad-left, 20px);
                border-radius: 28px;
                border-width: 6px;
            }
        }

        @media (max-width: 760px) {
            .game {
                height: min(920px, calc(var(--app-height) - 12px));
                padding: 12px;
            }
        }

        @media (max-width: 1024px) and (orientation: portrait) {
            .game {
                width: min(100vw - 10px, 900px);
                height: min(1100px, calc(var(--app-height) - 10px));
                border-radius: 22px;
                padding: 12px 10px;
            }

            .topbar {
                margin-bottom: 10px;
                gap: 8px;
                align-items: flex-start;
            }

            .topbar-meta {
                gap: 8px;
            }

            h1 {
                font-size: clamp(22px, 3.8vw, 38px);
            }

            .status {
                padding: 5px 12px;
                font-size: clamp(17px, 2.1vw, 24px);
            }

            .word-slots {
                top: clamp(10px, 3.5vmin, 28px);
            }

            .slot {
                height: clamp(160px, 24vmin, 320px);
                font-size: clamp(140px, 22vmin, 300px);
            }

            .tile {
                height: clamp(160px, 24vmin, 320px);
                font-size: clamp(140px, 22vmin, 300px);
            }
        }
    </style>
</head>
<body>
    <div class="game">
        <div class="topbar">
            <h1>جورچین کلمات فارسی</h1>
            <div class="topbar-meta">
                <div class="status word-status" id="wordStatus">Water</div>
                <div class="status" id="status">مرحله ۱</div>
                <button type="button" class="status" id="resetBtn" aria-label="Reset progress">↻</button>
            </div>
        </div>
        <div class="play-area" id="playArea">
            <div class="word-slots" id="wordSlots"></div>
            <div class="win" id="winMessage"><div class="win-badge">آفرین!</div></div>
        </div>
    </div>

    <script>
        const PUZZLE_WORD_ORDER = [
            'آب', 'نان', 'گل', 'سیب', 'توپ', 'ماه', 'پا', 'دست',
            'بابا', 'مامان', 'مادر', 'پدر', 'دوست', 'بازی', 'تاب', 'پارک',
            'خانه', 'کتاب', 'مداد', 'کیف', 'کفش', 'کلاه', 'عروسک', 'ماشین',
            'میز', 'پنجره', 'ماهی', 'گربه', 'سگ', 'مرغ', 'جوجه', 'پرنده',
            'باغ', 'برگ', 'درخت', 'ابر', 'باران', 'برف', 'خورشید', 'ستاره',
            'مدرسه', 'گنجشک', 'خرگوش', 'دوچرخه', 'سرسره',
            'قرمز', 'آبی', 'زرد', 'سبز', 'سفید', 'سیاه', 'صورتی', 'نارنجی',
            'گاو', 'اسب', 'بز', 'اردک', 'خرس', 'فیل', 'شیر', 'زرافه',
            'دفتر', 'پاکن', 'کلاس', 'معلم', 'صندلی', 'تخته', 'زنگ',
            'ایران', 'برادر', 'چپ', 'راست', 'بالا', 'پایین', 'جلو', 'عقب'
        ];

        let WORDS = [];

        const NON_JOIN_LEFT = new Set(['ا', 'آ', 'د', 'ذ', 'ر', 'ز', 'ژ', 'و']);
        const BOTTOM_HEAVY_LETTERS = new Set(['ب', 'پ', 'ت', 'ث', 'ج', 'چ', 'خ', 'ی']);

        document.addEventListener('gesturestart', function (e) { e.preventDefault(); }, { passive: false });
        {
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function (e) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) e.preventDefault();
                lastTouchEnd = now;
            }, { passive: false });
        }

        const PRESENTATION_FORMS = {
            'ا': { isolated: '\uFE8D', final: '\uFE8E' },
            'آ': { isolated: '\uFE81', final: '\uFE82' },
            'ب': { isolated: '\uFE8F', final: '\uFE90', initial: '\uFE91', medial: '\uFE92' },
            'پ': { isolated: '\uFB56', final: '\uFB57', initial: '\uFB58', medial: '\uFB59' },
            'ت': { isolated: '\uFE95', final: '\uFE96', initial: '\uFE97', medial: '\uFE98' },
            'ث': { isolated: '\uFE99', final: '\uFE9A', initial: '\uFE9B', medial: '\uFE9C' },
            'ج': { isolated: '\uFE9D', final: '\uFE9E', initial: '\uFE9F', medial: '\uFEA0' },
            'چ': { isolated: '\uFB7A', final: '\uFB7B', initial: '\uFB7C', medial: '\uFB7D' },
            'ح': { isolated: '\uFEA1', final: '\uFEA2', initial: '\uFEA3', medial: '\uFEA4' },
            'خ': { isolated: '\uFEA5', final: '\uFEA6', initial: '\uFEA7', medial: '\uFEA8' },
            'د': { isolated: '\uFEA9', final: '\uFEAA' },
            'ذ': { isolated: '\uFEAB', final: '\uFEAC' },
            'ر': { isolated: '\uFEAD', final: '\uFEAE' },
            'ز': { isolated: '\uFEAF', final: '\uFEB0' },
            'ژ': { isolated: '\uFB8A', final: '\uFB8B' },
            'س': { isolated: '\uFEB1', final: '\uFEB2', initial: '\uFEB3', medial: '\uFEB4' },
            'ش': { isolated: '\uFEB5', final: '\uFEB6', initial: '\uFEB7', medial: '\uFEB8' },
            'ص': { isolated: '\uFEB9', final: '\uFEBA', initial: '\uFEBB', medial: '\uFEBC' },
            'ض': { isolated: '\uFEBD', final: '\uFEBE', initial: '\uFEBF', medial: '\uFEC0' },
            'ط': { isolated: '\uFEC1', final: '\uFEC2', initial: '\uFEC3', medial: '\uFEC4' },
            'ظ': { isolated: '\uFEC5', final: '\uFEC6', initial: '\uFEC7', medial: '\uFEC8' },
            'ع': { isolated: '\uFEC9', final: '\uFECA', initial: '\uFECB', medial: '\uFECC' },
            'غ': { isolated: '\uFECD', final: '\uFECE', initial: '\uFECF', medial: '\uFED0' },
            'ف': { isolated: '\uFED1', final: '\uFED2', initial: '\uFED3', medial: '\uFED4' },
            'ق': { isolated: '\uFED5', final: '\uFED6', initial: '\uFED7', medial: '\uFED8' },
            'ک': { isolated: '\uFB8E', final: '\uFB8F', initial: '\uFB90', medial: '\uFB91' },
            'گ': { isolated: '\uFB92', final: '\uFB93', initial: '\uFB94', medial: '\uFB95' },
            'ل': { isolated: '\uFEDD', final: '\uFEDE', initial: '\uFEDF', medial: '\uFEE0' },
            'م': { isolated: '\uFEE1', final: '\uFEE2', initial: '\uFEE3', medial: '\uFEE4' },
            'ن': { isolated: '\uFEE5', final: '\uFEE6', initial: '\uFEE7', medial: '\uFEE8' },
            'ه': { isolated: '\uFEE9', final: '\uFEEA', initial: '\uFEEB', medial: '\uFEEC' },
            'و': { isolated: '\uFEED', final: '\uFEEE' },
            'ی': { isolated: '\uFBFC', final: '\uFBFD', initial: '\uFBFE', medial: '\uFBFF' }
        };

        const TEXT_PATTERNS = [
            'repeating-linear-gradient(45deg,#6a5cff 0 9px,#8a79ff 9px 18px)',
            'radial-gradient(circle at 25% 30%,#99f2ff 0 24%,#2bb6d9 26% 100%)',
            'repeating-linear-gradient(0deg,#ff7d7d 0 8px,#ffb35d 8px 16px)',
            'repeating-linear-gradient(120deg,#82d760 0 9px,#c7ed73 9px 18px)',
            'repeating-linear-gradient(60deg,#ff65be 0 8px,#ff95df 8px 16px)'
        ];

        const TILE_BG_PATTERNS = [
            'linear-gradient(135deg,#fffdf5,#f7f3ff)',
            'linear-gradient(135deg,#f8fff3,#fff6f0)',
            'linear-gradient(135deg,#f2ffff,#fff7f7)',
            'linear-gradient(135deg,#fffde6,#f5f2ff)'
        ];

        const LEVEL_PALETTES = [
            { bgLight: '#f5dfc2', paper: '#f7e7cf', line: '#d9b68a', ink: '#4f3a22', gameBorder: 'rgba(255,255,255,0.9)', playAreaBorder: 'rgba(150,100,60,0.2)' },
            { bgLight: '#c5dfe8', paper: '#d4e8f0', line: '#8ab3c9', ink: '#1a4a5e', gameBorder: 'rgba(140,210,240,0.85)', playAreaBorder: 'rgba(60,100,150,0.2)' },
            { bgLight: '#e8c5d0', paper: '#f0d4e0', line: '#c98a9e', ink: '#5e1a3a', gameBorder: 'rgba(230,130,170,0.85)', playAreaBorder: 'rgba(150,60,100,0.2)' },
            { bgLight: '#e8d8b0', paper: '#efe4c0', line: '#c9b06a', ink: '#4a3a1a', gameBorder: 'rgba(220,190,60,0.85)', playAreaBorder: 'rgba(150,130,60,0.25)' },
        ];

        const ANSWER_AREA_COLORS = [
            'linear-gradient(180deg, #fff8ec, #ffefd5)',
            'linear-gradient(180deg, #e8f4f8, #cce5f0)',
            'linear-gradient(180deg, #fce4ec, #f5cbd8)',
            'linear-gradient(180deg, #e8f5e9, #c8e6c9)',
            'linear-gradient(180deg, #ede7f6, #d1c4e9)',
        ];

        class FarsiWordPuzzleGame {
            constructor() {
                this.playArea = document.getElementById('playArea');
                this.wordSlots = document.getElementById('wordSlots');
                this.status = document.getElementById('status');
                this.wordStatus = document.getElementById('wordStatus');
                this.winMessage = document.getElementById('winMessage');
                this.slots = [];
                this.levelIndex = 0;
                this.tiles = [];
                this.currentEntry = null;
                this.currentWord = '';
                this.lockedCount = 0;
                this.activeTile = null;
                this.pointerOffset = { x: 0, y: 0 };
                this.layoutMetrics = null;
                this.resizeFrame = 0;
                this.started = false;
                this.guidedRtlMode = true;
                this.answerColorIndex = 0;
                this.loadProgress();
                this.handleResize = this.handleResize.bind(this);

                const resetBtn = document.getElementById('resetBtn');
                if (resetBtn) {
                    resetBtn.addEventListener('click', () => this.resetProgress());
                }

                this.init();
            }

            hasWordBreaks(word) {
                return /[\s\u200C]/.test(word);
            }

            async loadWords() {
                const response = await fetch('data/farsi-word-bank.json');
                if (!response.ok) {
                    throw new Error(`Failed to load shared Farsi word bank: ${response.status}`);
                }

                const bank = await response.json();
                const bankByFa = new Map(bank.map(entry => [entry.fa, entry]));

                return PUZZLE_WORD_ORDER.filter(word => !this.hasWordBreaks(word)).map(word => {
                    const entry = bankByFa.get(word);
                    if (!entry) {
                        throw new Error(`Missing shared bank entry for "${word}"`);
                    }
                    return {
                        fa: entry.fa,
                        en: entry.en
                    };
                });
            }

            async init() {
                this.syncViewportHeight();
                window.addEventListener('resize', this.handleResize, { passive: true });
                window.addEventListener('orientationchange', this.handleResize, { passive: true });
                if (window.visualViewport) {
                    window.visualViewport.addEventListener('resize', this.handleResize, { passive: true });
                }

                WORDS = await this.loadWords();

                const begin = () => {
                    if (this.started) return;
                    this.started = true;
                    this.startLevel();
                };

                if (document.fonts && document.fonts.ready) {
                    Promise.race([
                        document.fonts.ready,
                        new Promise(resolve => setTimeout(resolve, 700))
                    ]).then(begin);
                } else {
                    setTimeout(begin, 60);
                }
            }

            syncViewportHeight() {
                const viewportHeight = Math.round(window.visualViewport?.height || window.innerHeight || 0);
                if (viewportHeight > 0) {
                    document.documentElement.style.setProperty('--app-height', `${viewportHeight}px`);
                }
            }

            clamp(value, min, max) {
                return Math.min(max, Math.max(min, value));
            }

            readNumber(value, fallback) {
                const parsed = parseFloat(value);
                return Number.isFinite(parsed) ? parsed : fallback;
            }

            formatEnglishLabel(label) {
                if (!label) return '';
                return label.charAt(0).toUpperCase() + label.slice(1);
            }

            toPersianDigits(value) {
                return String(value).replace(/\d/g, digit => '۰۱۲۳۴۵۶۷۸۹'[Number(digit)]);
            }

            applyLevelTheme(level) {
                const palette = LEVEL_PALETTES[(level - 1) % LEVEL_PALETTES.length];
                const root = document.documentElement;
                root.style.setProperty('--body-bg-light', palette.bgLight);
                root.style.setProperty('--body-bg-paper', palette.paper);
                root.style.setProperty('--game-border-color', palette.gameBorder);
                root.style.setProperty('--play-area-border', palette.playAreaBorder);
                root.style.setProperty('--paper', palette.paper);
                root.style.setProperty('--line', palette.line);
                root.style.setProperty('--ink', palette.ink);
            }

            getLevelMessage(level) {
                if (level === 1) return 'آفرین!';
                if (level === 2) return 'عالی!';
                if (level === 5) return '🎉 عالی!';
                if (level === 10) return '🔥 قهرمان!';
                if (level % 5 === 0) return `🏆 مرحله ${this.toPersianDigits(level)}`;
                if (level % 3 === 0) return 'داغ داغ!';
                return 'آفرین!';
            }

            handleResize() {
                this.syncViewportHeight();
                if (!this.started) return;

                cancelAnimationFrame(this.resizeFrame);
                this.resizeFrame = requestAnimationFrame(() => {
                    this.relayoutLevel();
                });
            }

            loadProgress() {
                try {
                    const saved = localStorage.getItem('farsi-word-puzzle-progress');
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (typeof data.levelIndex === 'number') this.levelIndex = data.levelIndex;
                    }
                } catch (_) { /* ignore */ }
            }

            saveProgress() {
                try {
                    localStorage.setItem('farsi-word-puzzle-progress', JSON.stringify({
                        levelIndex: this.levelIndex
                    }));
                } catch (_) { /* ignore */ }
            }

            resetProgress() {
                if (!confirm('آیا مطمئن هستید؟ تمام مراحل پاک می‌شوند.')) return;
                localStorage.removeItem('farsi-word-puzzle-progress');
                this.levelIndex = 0;
                this.startLevel();
            }

            charsOf(word) {
                return [...word];
            }

            canConnectBefore(ch) {
                return !!PRESENTATION_FORMS[ch];
            }

            canConnectAfter(ch) {
                return !!PRESENTATION_FORMS[ch] && !NON_JOIN_LEFT.has(ch);
            }

            shapedChar(chars, i) {
                const ch = chars[i];
                const forms = PRESENTATION_FORMS[ch];
                if (!forms) return ch;

                const prev = chars[i - 1];
                const next = chars[i + 1];
                const joinsPrev = !!prev && this.canConnectAfter(prev) && this.canConnectBefore(ch);
                const joinsNext = !!next && this.canConnectAfter(ch) && this.canConnectBefore(next);

                if (joinsPrev && joinsNext && forms.medial) return forms.medial;
                if (joinsPrev && forms.final) return forms.final;
                if (joinsNext && forms.initial) return forms.initial;
                return forms.isolated || ch;
            }

            shapedWordUnits(word) {
                const chars = this.charsOf(word);
                return chars.map((base, i) => ({
                    base,
                    shaped: this.shapedChar(chars, i),
                    index: i,
                    joinsPrev: i > 0 && this.canConnectAfter(chars[i - 1]) && this.canConnectBefore(base),
                    joinsNext: i < chars.length - 1 && this.canConnectAfter(base) && this.canConnectBefore(chars[i + 1])
                }));
            }

            getCardPadding(unit) {
                const tight = 4;
                const loose = 14;

                if (unit.base === 'آ' && !unit.joinsPrev && !unit.joinsNext) {
                    return { left: 22, right: 22 };
                }

                return {
                    left: unit.joinsNext ? tight : loose,
                    right: unit.joinsPrev ? tight : loose
                };
            }

            getGlyphAdjustments(unit) {
                if (unit.base === 'آ' && !unit.joinsPrev && !unit.joinsNext) {
                    return { x: 0, y: 20 };
                }

                if (BOTTOM_HEAVY_LETTERS.has(unit.base)) {
                    return { x: 0, y: -8 };
                }

                return { x: 0, y: 8 };
            }

            applyCardPadding(card, unit) {
                const { left, right } = this.getCardPadding(unit);
                card.style.setProperty('--pad-left', `${left}px`);
                card.style.setProperty('--pad-right', `${right}px`);
            }

            applyGlyphAdjustments(card, unit) {
                const { x, y } = this.getGlyphAdjustments(unit);
                card.style.setProperty('--char-shift-x', `${x}px`);
                card.style.setProperty('--char-shift-y', `${y}px`);
            }

            getStackOrder(unit, total, base = 0) {
                return base + (total - unit.index);
            }

            getNextGuidedIndex() {
                const nextSlot = this.slots.find(slot => !slot.classList.contains('good'));
                return nextSlot ? Number(nextSlot.dataset.index) : null;
            }

            syncGuidedState() {
                const nextIndex = this.getNextGuidedIndex();

                this.slots.forEach(slot => {
                    slot.classList.remove('next', 'waiting');
                    if (slot.classList.contains('good')) return;
                    slot.classList.add(Number(slot.dataset.index) === nextIndex ? 'next' : 'waiting');
                });

                this.tiles.forEach(tile => {
                    const isLocked = tile.classList.contains('locked');
                    const isNext = nextIndex !== null && Number(tile.dataset.index) === nextIndex;
                    const shouldDisable = !isLocked && !isNext;
                    tile.classList.toggle('next', !isLocked && isNext);
                    tile.classList.toggle('disabled', shouldDisable);
                    tile.setAttribute('aria-disabled', String(shouldDisable));
                });

                if (
                    this.activeTile &&
                    nextIndex !== null &&
                    Number(this.activeTile.dataset.index) !== nextIndex
                ) {
                    const tile = this.activeTile;
                    tile.classList.remove('dragging');
                    this.activeTile = null;
                    this.returnToHome(tile);
                }
            }

            startLevel() {
                this.wordSlots.innerHTML = '';
                this.playArea.querySelectorAll('.tile,.spark').forEach(el => el.remove());
                this.winMessage.classList.remove('show');
                this.tiles = [];
                this.lockedCount = 0;

                this.currentEntry = WORDS[this.levelIndex % WORDS.length];
                this.currentWord = this.currentEntry.fa;
                const units = this.shapedWordUnits(this.currentWord);
                const tileUnits = [...units].reverse();
                const totalUnits = units.length;
                this.applyLevelTheme(this.levelIndex + 1);
                this.answerColorIndex = 0;
                this.playArea.style.background = ANSWER_AREA_COLORS[0];
                this.status.textContent = `مرحله ${this.toPersianDigits(this.levelIndex + 1)}`;
                this.wordStatus.textContent = this.formatEnglishLabel(this.currentEntry.en);

                units.forEach(unit => {
                    const slot = document.createElement('div');
                    slot.className = 'slot ready';
                    slot.dataset.index = String(unit.index);
                    slot.dataset.base = unit.base;
                    slot.dataset.shaped = unit.shaped;
                    this.applyCardPadding(slot, unit);
                    this.applyGlyphAdjustments(slot, unit);
                    slot.dataset.stackOrder = String(this.getStackOrder(unit, totalUnits, 10));
                    slot.style.zIndex = slot.dataset.stackOrder;
                    slot.innerHTML = `<span class="char">${unit.shaped}</span>`;
                    this.wordSlots.appendChild(slot);
                });

                const slots = [...this.wordSlots.children];
                this.slots = slots;

                tileUnits.forEach((unit, n) => {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.dataset.index = String(unit.index);
                    tile.dataset.base = unit.base;
                    tile.style.setProperty('--text-pattern', TEXT_PATTERNS[n % TEXT_PATTERNS.length]);
                    tile.style.setProperty('--bg-pattern', TILE_BG_PATTERNS[n % TILE_BG_PATTERNS.length]);
                    tile.style.setProperty('--rot', `${(Math.random() * 26 - 13).toFixed(1)}deg`);
                    this.applyCardPadding(tile, unit);
                    this.applyGlyphAdjustments(tile, unit);
                    tile.style.zIndex = '3';
                    tile.innerHTML = `<span class="char">${unit.shaped}</span>`;

                    this.playArea.appendChild(tile);
                    this.wireTile(tile, slots);
                    this.tiles.push(tile);
                });

                this.relayoutLevel({ randomizeUnlocked: true });
                this.syncGuidedState();
            }

            wireTile(tile, slots) {
                tile.addEventListener('pointerdown', (e) => {
                    if (tile.classList.contains('locked') || tile.classList.contains('disabled')) return;
                    this.activeTile = tile;
                    tile.classList.add('dragging');
                    tile.setPointerCapture(e.pointerId);
                    const tRect = tile.getBoundingClientRect();
                    this.pointerOffset.x = e.clientX - (tRect.left + tRect.width / 2);
                    this.pointerOffset.y = e.clientY - (tRect.top + tRect.height / 2);
                });

                tile.addEventListener('pointermove', (e) => {
                    if (this.activeTile !== tile) return;
                    const areaRect = this.playArea.getBoundingClientRect();
                    tile.style.left = `${e.clientX - areaRect.left - this.pointerOffset.x}px`;
                    tile.style.top = `${e.clientY - areaRect.top - this.pointerOffset.y}px`;
                });

                const release = () => {
                    if (this.activeTile !== tile) return;
                    tile.classList.remove('dragging');
                    this.activeTile = null;
                    this.tryLockTile(tile, slots);
                };

                tile.addEventListener('pointerup', release);
                tile.addEventListener('pointercancel', release);
            }

            getTileChar(tile) {
                return tile.querySelector('.char');
            }

            findMatchingSlotForTile(tile, slots) {
                const tileIndex = Number(tile.dataset.index);
                const nextIndex = this.getNextGuidedIndex();
                if (nextIndex === null || tileIndex !== nextIndex) {
                    return null;
                }

                const tileBase = tile.dataset.base;
                const tileRect = tile.getBoundingClientRect();
                const tileCx = tileRect.left + tileRect.width / 2;
                const tileCy = tileRect.top + tileRect.height / 2;
                let bestSlot = null;
                let bestDistance = Infinity;

                slots.forEach(slot => {
                    if (slot.classList.contains('good')) return;
                    if (slot.dataset.base !== tileBase) return;
                    if (Number(slot.dataset.index) !== tileIndex) return;

                    const slotRect = slot.getBoundingClientRect();
                    const slotCx = slotRect.left + slotRect.width / 2;
                    const slotCy = slotRect.top + slotRect.height / 2;
                    const dist = Math.hypot(slotCx - tileCx, slotCy - tileCy);
                    const threshold = Math.max(60, slotRect.width * 0.42);

                    if (dist <= threshold && dist < bestDistance) {
                        bestDistance = dist;
                        bestSlot = slot;
                    }
                });

                return bestSlot;
            }

            tryLockTile(tile, slots) {
                const slot = this.findMatchingSlotForTile(tile, slots);
                if (!slot) {
                    this.returnToHome(tile);
                    return;
                }

                const slotRect = slot.getBoundingClientRect();
                const slotCx = slotRect.left + slotRect.width / 2;
                const slotCy = slotRect.top + slotRect.height / 2;
                const areaRect = this.playArea.getBoundingClientRect();
                tile.style.left = `${slotCx - areaRect.left}px`;
                tile.style.top = `${slotCy - areaRect.top}px`;
                tile.style.setProperty('--rot', '0deg');
                tile.style.zIndex = slot.dataset.stackOrder || '20';
                tile.classList.add('locked');
                tile.dataset.index = slot.dataset.index;
                const charEl = this.getTileChar(tile);
                if (charEl) {
                    charEl.textContent = slot.dataset.shaped;
                }
                slot.classList.remove('ready');
                slot.classList.add('good');
                this.burst(slotCx - areaRect.left, slotCy - areaRect.top);
                this.lockedCount += 1;
                this.answerColorIndex = (this.answerColorIndex + 1) % ANSWER_AREA_COLORS.length;
                this.playArea.style.background = ANSWER_AREA_COLORS[this.answerColorIndex];
                this.syncGuidedState();

                if (this.lockedCount === slots.length) {
                    this.finishLevel();
                }
            }

            returnToHome(tile) {
                tile.style.left = `${tile.dataset.homeX}px`;
                tile.style.top = `${tile.dataset.homeY}px`;
                this.storeRelativeTilePosition(tile);
            }

            getTileBounds(tile, rect, trayTop, bottomMargin = 16) {
                const tileHalfWidth = tile.offsetWidth / 2;
                const tileHalfHeight = tile.offsetHeight / 2;
                const marginX = Math.max(12, Math.min(22, rect.width * 0.03));
                const marginY = Math.max(10, bottomMargin);
                const minX = tileHalfWidth + marginX;
                const maxX = Math.max(minX, rect.width - tileHalfWidth - marginX);
                const desiredMinY = trayTop + tileHalfHeight;
                const maxY = Math.max(tileHalfHeight + marginY, rect.height - tileHalfHeight - marginY);
                const minY = Math.min(Math.max(tileHalfHeight + marginY, desiredMinY), maxY);

                return { minX, maxX, minY, maxY };
            }

            storeRelativeTilePosition(tile, bounds = null) {
                if (!this.layoutMetrics || tile.classList.contains('locked')) return;

                const safeBounds = bounds || this.getTileBounds(
                    tile,
                    { width: this.layoutMetrics.rectWidth, height: this.layoutMetrics.rectHeight },
                    this.layoutMetrics.trayTop,
                    this.layoutMetrics.bottomMargin
                );
                const left = this.readNumber(tile.style.left, this.readNumber(tile.dataset.homeX, safeBounds.minX));
                const top = this.readNumber(tile.style.top, this.readNumber(tile.dataset.homeY, safeBounds.minY));
                const width = safeBounds.maxX - safeBounds.minX;
                const height = safeBounds.maxY - safeBounds.minY;
                const relX = width > 0 ? (left - safeBounds.minX) / width : 0.5;
                const relY = height > 0 ? (top - safeBounds.minY) / height : 0.5;

                tile.dataset.relX = String(this.clamp(relX, 0, 1));
                tile.dataset.relY = String(this.clamp(relY, 0, 1));
            }

            relayoutLevel({ randomizeUnlocked = false } = {}) {
                if (!this.playArea || this.tiles.length === 0 || this.slots.length === 0) return;

                const rect = this.playArea.getBoundingClientRect();
                if (!rect.width || !rect.height) return;

                const slotsRect = this.wordSlots.getBoundingClientRect();
                const trayGap = Math.max(12, Math.min(28, rect.height * 0.05));
                const bottomMargin = Math.max(12, Math.min(22, rect.height * 0.04));
                const trayTop = slotsRect.bottom - rect.top + trayGap;

                this.layoutMetrics = {
                    rectWidth: rect.width,
                    rectHeight: rect.height,
                    trayTop,
                    bottomMargin
                };

                this.tiles.forEach(tile => {
                    if (tile.classList.contains('locked')) {
                        const slot = this.slots.find(candidate =>
                            candidate.dataset.index === tile.dataset.index &&
                            candidate.dataset.base === tile.dataset.base
                        );
                        if (!slot) return;

                        const slotRect = slot.getBoundingClientRect();
                        const slotCx = slotRect.left + slotRect.width / 2;
                        const slotCy = slotRect.top + slotRect.height / 2;
                        tile.style.left = `${slotCx - rect.left}px`;
                        tile.style.top = `${slotCy - rect.top}px`;
                        tile.style.setProperty('--rot', '0deg');
                        tile.style.zIndex = slot.dataset.stackOrder || '20';
                        return;
                    }

                    const bounds = this.getTileBounds(tile, rect, trayTop, bottomMargin);
                    const spanX = bounds.maxX - bounds.minX;
                    const spanY = bounds.maxY - bounds.minY;
                    const relX = randomizeUnlocked || tile.dataset.relX === undefined
                        ? Math.random()
                        : this.clamp(this.readNumber(tile.dataset.relX, 0.5), 0, 1);
                    const relY = randomizeUnlocked || tile.dataset.relY === undefined
                        ? Math.random()
                        : this.clamp(this.readNumber(tile.dataset.relY, 0.5), 0, 1);
                    const x = bounds.minX + spanX * relX;
                    const y = bounds.minY + spanY * relY;

                    tile.style.left = `${x}px`;
                    tile.style.top = `${y}px`;
                    tile.dataset.homeX = String(x);
                    tile.dataset.homeY = String(y);
                    this.storeRelativeTilePosition(tile, bounds);
                });
            }

            burst(x, y) {
                for (let i = 0; i < 8; i++) {
                    const spark = document.createElement('div');
                    spark.className = 'spark';
                    spark.style.left = `${x}px`;
                    spark.style.top = `${y}px`;
                    spark.style.setProperty('--dx', `${(Math.random() * 120 - 60).toFixed(0)}px`);
                    spark.style.setProperty('--dy', `${(Math.random() * 120 - 60).toFixed(0)}px`);
                    this.playArea.appendChild(spark);
                    setTimeout(() => spark.remove(), 540);
                }
            }

            createConfetti(count = 60) {
                const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bcb', '#a66cff', '#ff9f43', '#00d2d3'];
                const areaRect = this.playArea.getBoundingClientRect();
                const cx = areaRect.width / 2;
                const cy = areaRect.height / 2;

                for (let i = 0; i < count; i++) {
                    const el = document.createElement('div');
                    el.className = 'confetti';
                    const size = 6 + Math.random() * 10;
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 80 + Math.random() * 260;
                    const dx = Math.cos(angle) * distance;
                    const dy = Math.sin(angle) * distance;
                    const dr = Math.random() * 720 - 360;
                    const color = colors[i % colors.length];
                    el.style.cssText = `
                        left:${cx}px; top:${cy}px;
                        width:${size}px; height:${size * (0.5 + Math.random() * 0.8)}px;
                        background:${color};
                        --dx:${dx}px; --dy:${dy}px; --dr:${dr}deg;
                        border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
                    `;
                    this.playArea.appendChild(el);
                    setTimeout(() => el.remove(), 1300);
                }
            }

            finishLevel() {
                const areaRect = this.playArea.getBoundingClientRect();
                const badge = this.winMessage.querySelector('.win-badge');
                if (badge) {
                    badge.textContent = this.getLevelMessage(this.levelIndex + 1);
                }
                this.createConfetti(60);
                setTimeout(() => this.burst(areaRect.width * 0.3, areaRect.height * 0.3), 100);
                setTimeout(() => this.burst(areaRect.width * 0.7, areaRect.height * 0.3), 200);
                setTimeout(() => this.burst(areaRect.width * 0.5, areaRect.height * 0.6), 300);
                this.winMessage.classList.add('show');
                setTimeout(() => {
                    this.winMessage.classList.remove('show');
                    this.levelIndex += 1;
                    this.saveProgress();
                    this.startLevel();
                }, 1400);
            }
        }

        new FarsiWordPuzzleGame();
    </script>
</body>
</html>
