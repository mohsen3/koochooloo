<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Number Comparison Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
            background: #e8f4f8;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            outline: none;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 24px;
            padding: 30px 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 800px;
            width: 90%;
            position: relative;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .reset-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 1.5em;
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            padding: 4px 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .reset-btn:hover {
            background: #f0f0f0;
        }

        h1 {
            color: #333;
            font-size: 1.8em;
            margin-bottom: 12px;
        }

        .level-info {
            font-size: 1.2em;
            background: #4fa3d1;
            color: white;
            margin: 0 auto 16px auto;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 20px;
            display: inline-block;
        }

        .question {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .question .highlight-more {
            color: #6bcf7f;
        }

        .question .highlight-less {
            color: #ff6b9d;
        }

        .numbers-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .number-box {
            background: #6bcf7f;
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border: none;
            box-shadow: 0 4px 12px rgba(107, 207, 127, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .number-box:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 18px rgba(107, 207, 127, 0.4);
        }

        .number-box:active {
            transform: scale(0.96);
        }

        .number {
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
        }

        .feedback {
            font-size: 1.5em;
            font-weight: bold;
            margin: 12px 0;
            min-height: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .correct {
            color: #6bcf7f;
        }

        .wrong {
            color: #ff9ff3;
            font-size: 1.2em;
        }

        .progress {
            font-size: 1em;
            color: #888;
            margin-top: 10px;
        }

        .instructions {
            font-size: 0.95em;
            color: #666;
            margin-top: 16px;
            padding: 12px;
            background: #f8f8f8;
            border-radius: 12px;
        }

        .congrats {
            font-size: 2em;
            font-weight: 900;
            color: #4fa3d1;
        }

        .relation-text {
            font-size: 0.8em;
            color: #888;
            margin-top: 4px;
        }

        @keyframes correctBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        .feedback.correct-active {
            animation: correctBounce 0.35s;
        }
    </style>
</head>
<body>
    <div class="container" id="gameContainer">
        <button class="reset-btn" id="resetBtn" title="Restart">↻</button>
        <h1>Number Comparison</h1>
        <div class="level-info" id="levelInfo">Level 1</div>
        <div class="question" id="question">Which number is <span class="highlight-more">larger</span>?</div>

        <div class="numbers-container" id="numbersContainer"></div>

        <div class="feedback" id="feedback"></div>
        <div class="progress" id="progress">0 / 5</div>

        <div class="instructions" id="instructions">Click a number or press it on your keyboard</div>
    </div>

    <script>
        const STORAGE_KEY = 'comparisonGame';

        let level = 1;
        let correctCount = 0;
        let numbers = [];
        let questionType = 'more';
        let waitingForNext = false;

        function loadProgress() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    level = data.level || 1;
                    correctCount = data.correctCount || 0;
                }
            } catch (e) {}
        }

        function saveProgress() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ level, correctCount }));
            } catch (e) {}
        }

        function resetProgress() {
            localStorage.removeItem(STORAGE_KEY);
            level = 1;
            correctCount = 0;
            generateNumbers();
        }

        function getNumberCount(level) {
            if (level <= 2) return 2;
            if (level <= 4) return 3;
            if (level <= 6) return 4;
            if (level <= 8) return 6;
            return 8;
        }

        const messages = [
            "Correct!", "Great job!", "Well done!",
            "Nice!", "Excellent!", "Keep going!"
        ];

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateNumbers() {
            waitingForNext = false;
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('feedback').className = 'feedback';

            const count = getNumberCount(level);
            numbers = [];

            const used = new Set();
            while (numbers.length < count) {
                const num = Math.floor(Math.random() * 15) + 1;
                if (!used.has(num)) {
                    numbers.push(num);
                    used.add(num);
                }
            }

            shuffle(numbers);

            if (level >= 2) {
                questionType = Math.random() < 0.5 ? 'more' : 'less';
            } else {
                questionType = 'more';
            }

            updateDisplay();
        }

        function getSizeScale(num, nums) {
            const min = Math.min(...nums);
            const max = Math.max(...nums);
            if (min === max) return 1;
            const ratio = (num - min) / (max - min);
            return 0.65 + ratio * 1.0;
        }

        function updateDisplay() {
            const container = document.getElementById('numbersContainer');
            const count = numbers.length;
            container.innerHTML = '';

            numbers.forEach((num) => {
                const scale = getSizeScale(num, numbers);
                const baseSize = Math.min(80, 200 / Math.sqrt(count));
                const fontSize = Math.round(baseSize * scale);
                const boxSize = Math.round((baseSize + 40) * scale);

                const box = document.createElement('div');
                box.className = 'number-box';
                box.style.width = boxSize + 'px';
                box.style.height = boxSize + 'px';
                box.onclick = () => selectNumber(num);

                const numberDiv = document.createElement('div');
                numberDiv.className = 'number';
                numberDiv.style.fontSize = fontSize + 'px';
                numberDiv.textContent = num;

                box.appendChild(numberDiv);
                container.appendChild(box);
            });

            const questionEl = document.getElementById('question');
            if (questionType === 'more') {
                questionEl.innerHTML = 'Which number is <span class="highlight-more">larger</span>?';
            } else {
                questionEl.innerHTML = 'Which number is <span class="highlight-less">smaller</span>?';
            }

            document.getElementById('levelInfo').textContent = 'Level ' + level;
            document.getElementById('progress').textContent = correctCount + ' / 5';
        }

        function selectNumber(selectedNum) {
            if (waitingForNext) return;

            let correct = false;
            if (questionType === 'more') {
                correct = (selectedNum === Math.max(...numbers));
            } else {
                correct = (selectedNum === Math.min(...numbers));
            }

            handleAnswer(correct, selectedNum);
        }

        function handleAnswer(correct) {
            if (waitingForNext) return;

            var feedback = document.getElementById('feedback');

            if (correct) {
                waitingForNext = true;
                correctCount++;
                var msg = messages[Math.floor(Math.random() * messages.length)];
                saveProgress();

                var correctAnswer = questionType === 'more' ? Math.max(...numbers) : Math.min(...numbers);
                var relation = correctAnswer + ' is ' + (questionType === 'more' ? 'larger' : 'smaller');

                feedback.className = 'feedback correct-active';
                feedback.innerHTML = '<div class="correct">' + msg + '</div><div class="relation-text">' + relation + '</div>';

                if (correctCount >= 5) {
                    if (level < 10) {
                        level++;
                        correctCount = 0;
                        saveProgress();
                        setTimeout(function () {
                            feedback.innerHTML = '<div class="congrats">Level ' + level + ' Unlocked!</div>';
                            setTimeout(generateNumbers, 1500);
                        }, 1500);
                    } else {
                        setTimeout(function () {
                            feedback.innerHTML = '<div class="congrats">You completed all levels!</div>';
                            setTimeout(function () {
                                correctCount = 0;
                                saveProgress();
                                generateNumbers();
                            }, 2500);
                        }, 1500);
                    }
                } else {
                    setTimeout(generateNumbers, 1500);
                }
            } else {
                correctCount = 0;
                saveProgress();
                feedback.innerHTML = '<div class="wrong">Try again</div>';
                setTimeout(function () {
                    feedback.innerHTML = '';
                }, 800);
                updateDisplay();
            }
        }

        document.addEventListener('keydown', function (e) {
            if (waitingForNext) return;
            if (e.key >= '0' && e.key <= '9') {
                e.preventDefault();
                var pressedNum = parseInt(e.key);
                if (numbers.indexOf(pressedNum) !== -1) {
                    selectNumber(pressedNum);
                }
            }
        }, true);

        window.addEventListener('load', function () {
            document.body.setAttribute('tabindex', '0');
            document.body.focus();
        });

        document.addEventListener('click', function () {
            document.body.focus();
        });

        document.getElementById('resetBtn').addEventListener('click', resetProgress);

        loadProgress();
        generateNumbers();
    </script>
</body>
</html>
