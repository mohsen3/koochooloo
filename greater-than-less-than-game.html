<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Number Comparison Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            outline: none;
            padding: 20px;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: bgShift 12s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-shapes {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bg-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.12;
        }

        .bg-shape:nth-child(1) {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #f093fb, transparent);
            top: -100px; left: -100px;
            animation: floatA 18s ease-in-out infinite;
        }

        .bg-shape:nth-child(2) {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #4facfe, transparent);
            bottom: -50px; right: -50px;
            animation: floatB 22s ease-in-out infinite;
        }

        .bg-shape:nth-child(3) {
            width: 200px; height: 200px;
            background: radial-gradient(circle, #43e97b, transparent);
            top: 50%; left: 60%;
            animation: floatA 16s ease-in-out infinite reverse;
        }

        .bg-shape:nth-child(4) {
            width: 150px; height: 150px;
            background: radial-gradient(circle, #fa709a, transparent);
            top: 20%; right: 10%;
            animation: floatB 20s ease-in-out infinite;
        }

        @keyframes floatA {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        @keyframes floatB {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-30px, 40px) scale(1.08); }
            66% { transform: translate(25px, -15px) scale(0.92); }
        }

        .container {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 36px 44px;
            box-shadow:
                0 8px 32px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.15);
            text-align: center;
            max-width: 800px;
            width: 90%;
            position: relative;
            z-index: 1;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: box-shadow 0.4s;
        }

        .container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 34px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent, rgba(255,255,255,0.08));
            z-index: -1;
            pointer-events: none;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 20px;
        }

        h1 {
            color: rgba(255,255,255,0.9);
            font-size: 1.4em;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .level-info {
            font-size: 0.95em;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            font-weight: 700;
            padding: 6px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(79,172,254,0.35);
        }

        .reset-btn {
            font-size: 1.4em;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            padding: 4px 10px;
            border-radius: 10px;
            transition: all 0.25s;
        }

        .reset-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.25);
            transform: rotate(90deg);
        }

        .question {
            font-size: 1.5em;
            color: rgba(255,255,255,0.85);
            margin-bottom: 24px;
            font-weight: 600;
        }

        .question .highlight-more {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulseGlow 2s ease-in-out infinite;
        }

        .question .highlight-less {
            background: linear-gradient(135deg, #fa709a, #fee140);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .numbers-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            perspective: 600px;
        }

        .number-box {
            border-radius: 20px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            animation: numberAppear 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .number-box:nth-child(1) { animation-delay: 0.02s; }
        .number-box:nth-child(2) { animation-delay: 0.06s; }
        .number-box:nth-child(3) { animation-delay: 0.10s; }
        .number-box:nth-child(4) { animation-delay: 0.14s; }
        .number-box:nth-child(5) { animation-delay: 0.18s; }
        .number-box:nth-child(6) { animation-delay: 0.22s; }
        .number-box:nth-child(7) { animation-delay: 0.26s; }
        .number-box:nth-child(8) { animation-delay: 0.30s; }

        @keyframes numberAppear {
            0% {
                opacity: 0;
                transform: scale(0.3) rotateY(60deg) translateY(40px);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateY(0deg) translateY(0);
            }
        }

        .number-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent, rgba(255,255,255,0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .number-box::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .number-box:hover::after {
            opacity: 1;
        }

        .number-box.wrong-pick {
            animation: shakeBox 0.5s ease !important;
        }

        .number-box.correct-pick {
            animation: correctPop 0.5s ease both !important;
        }

        @keyframes shakeBox {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-12px) rotate(-3deg); }
            30% { transform: translateX(10px) rotate(3deg); }
            45% { transform: translateX(-8px) rotate(-2deg); }
            60% { transform: translateX(6px) rotate(1deg); }
            80% { transform: translateX(-3px); }
        }

        @keyframes correctPop {
            0% { transform: scale(1); }
            30% { transform: scale(1.15); }
            60% { transform: scale(0.95); }
            100% { transform: scale(1); opacity: 1; }
        }

        .number-box-glow {
            position: absolute;
            inset: -4px;
            border-radius: 24px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
            filter: blur(12px);
        }

        .number-box:hover .number-box-glow {
            opacity: 0.7;
        }

        .number {
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }

        .feedback {
            font-size: 1.5em;
            font-weight: bold;
            margin: 10px 0;
            min-height: 54px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .correct-msg {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.2em;
        }

        .wrong-msg {
            color: #ff6b8a;
            font-size: 1.1em;
            animation: wrongShake 0.4s ease;
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        .relation-text {
            font-size: 0.65em;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
            -webkit-text-fill-color: rgba(255,255,255,0.5);
        }

        .congrats {
            font-size: 1.6em;
            font-weight: 900;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: congratsPulse 1s ease-in-out infinite;
        }

        @keyframes congratsPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .progress-wrap {
            width: 100%;
            max-width: 280px;
            margin: 6px auto 0;
            height: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            background: linear-gradient(90deg, #43e97b, #38f9d7, #4facfe);
            background-size: 200% 100%;
            animation: progressShimmer 2s linear infinite;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes progressShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .progress-label {
            font-size: 0.85em;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
        }

        .instructions {
            font-size: 0.85em;
            color: rgba(255,255,255,0.3);
            margin-top: 18px;
            padding: 10px 16px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg) scale(0.3);
                opacity: 0;
            }
        }

        @media (max-width: 500px) {
            .container { padding: 24px 18px; }
            h1 { font-size: 1.1em; }
            .question { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="bg-shape"></div>
        <div class="bg-shape"></div>
        <div class="bg-shape"></div>
        <div class="bg-shape"></div>
    </div>

    <div class="container" id="gameContainer">
        <div class="header">
            <h1>Number Comparison</h1>
            <div class="level-info" id="levelInfo">Level 1</div>
            <button class="reset-btn" id="resetBtn" title="Restart">↻</button>
        </div>
        <div class="question" id="question">Which number is <span class="highlight-more">larger</span>?</div>

        <div class="numbers-container" id="numbersContainer"></div>

        <div class="feedback" id="feedback"></div>
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-label" id="progressLabel">0 / 5</div>

        <div class="instructions" id="instructions">Click a number or press it on your keyboard</div>
    </div>

    <script>
        const STORAGE_KEY = 'comparisonGame';

        let level = 1;
        let correctCount = 0;
        let numbers = [];
        let questionType = 'more';
        let waitingForNext = false;

        function loadProgress() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    level = data.level || 1;
                    correctCount = data.correctCount || 0;
                }
            } catch (e) {}
        }

        function saveProgress() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ level, correctCount }));
            } catch (e) {}
        }

        function resetProgress() {
            localStorage.removeItem(STORAGE_KEY);
            level = 1;
            correctCount = 0;
            generateNumbers();
        }

        function getNumberCount(level) {
            if (level <= 2) return 2;
            if (level <= 4) return 3;
            if (level <= 6) return 4;
            if (level <= 8) return 6;
            return 8;
        }

        const messages = [
            "Correct!", "Great job!", "Well done!",
            "Nice!", "Excellent!", "Keep going!"
        ];

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getGradientForIndex(i, total) {
            const presets = [
                ['#f093fb', '#f5576c'],
                ['#4facfe', '#00f2fe'],
                ['#43e97b', '#38f9d7'],
                ['#fa709a', '#fee140'],
                ['#a18cd1', '#fbc2eb'],
                ['#fccb90', '#d57eeb'],
                ['#e0c3fc', '#8ec5fc'],
                ['#f5576c', '#ff9a9e'],
            ];
            const p = presets[i % presets.length];
            return `linear-gradient(135deg, ${p[0]}, ${p[1]})`;
        }

        function spawnConfetti() {
            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);
            const colors = ['#f093fb','#f5576c','#4facfe','#43e97b','#fee140','#fa709a','#a18cd1','#38f9d7'];
            for (let i = 0; i < 50; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = (Math.random() * 8 + 4) + 'px';
                el.style.height = (Math.random() * 8 + 4) + 'px';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                el.style.animationDelay = (Math.random() * 0.8) + 's';
                container.appendChild(el);
            }
            setTimeout(() => container.remove(), 3500);
        }

        function generateNumbers() {
            waitingForNext = false;
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('feedback').className = 'feedback';

            const count = getNumberCount(level);
            numbers = [];

            const used = new Set();
            while (numbers.length < count) {
                const num = Math.floor(Math.random() * 15) + 1;
                if (!used.has(num)) {
                    numbers.push(num);
                    used.add(num);
                }
            }

            shuffle(numbers);

            if (level >= 2) {
                questionType = Math.random() < 0.5 ? 'more' : 'less';
            } else {
                questionType = 'more';
            }

            updateDisplay();
        }

        function getSizeScale(num, nums) {
            const min = Math.min(...nums);
            const max = Math.max(...nums);
            if (min === max) return 1;
            const ratio = (num - min) / (max - min);
            return 0.65 + ratio * 1.0;
        }

        function updateDisplay() {
            const container = document.getElementById('numbersContainer');
            const count = numbers.length;
            container.innerHTML = '';

            numbers.forEach((num, idx) => {
                const scale = getSizeScale(num, numbers);
                const baseSize = Math.min(80, 200 / Math.sqrt(count));
                const fontSize = Math.round(baseSize * scale);
                const boxSize = Math.round((baseSize + 40) * scale);

                const box = document.createElement('div');
                box.className = 'number-box';
                box.style.width = boxSize + 'px';
                box.style.height = boxSize + 'px';
                box.style.background = getGradientForIndex(idx, count);
                box.style.boxShadow = `0 6px 24px rgba(0,0,0,0.25), 0 0 30px -5px rgba(255,255,255,0.08)`;
                box.onclick = () => selectNumber(num, box);

                const numberDiv = document.createElement('div');
                numberDiv.className = 'number';
                numberDiv.style.fontSize = fontSize + 'px';
                numberDiv.textContent = num;

                box.appendChild(numberDiv);
                container.appendChild(box);
            });

            const questionEl = document.getElementById('question');
            if (questionType === 'more') {
                questionEl.innerHTML = 'Which number is <span class="highlight-more">larger</span>?';
            } else {
                questionEl.innerHTML = 'Which number is <span class="highlight-less">smaller</span>?';
            }

            document.getElementById('levelInfo').textContent = 'Level ' + level;
            updateProgress();
        }

        function updateProgress() {
            const pct = (correctCount / 5) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressLabel').textContent = correctCount + ' / 5';
        }

        function selectNumber(selectedNum, boxEl) {
            if (waitingForNext) return;

            let correct = false;
            if (questionType === 'more') {
                correct = (selectedNum === Math.max(...numbers));
            } else {
                correct = (selectedNum === Math.min(...numbers));
            }

            handleAnswer(correct, boxEl);
        }

        function handleAnswer(correct, boxEl) {
            if (waitingForNext) return;

            var feedback = document.getElementById('feedback');

            if (correct) {
                if (boxEl) {
                    boxEl.classList.add('correct-pick');
                }
                waitingForNext = true;
                correctCount++;
                var msg = messages[Math.floor(Math.random() * messages.length)];
                saveProgress();
                updateProgress();

                var correctAnswer = questionType === 'more' ? Math.max(...numbers) : Math.min(...numbers);
                var relation = correctAnswer + ' is ' + (questionType === 'more' ? 'larger' : 'smaller');

                feedback.innerHTML = '<div class="correct-msg">' + msg + '</div><div class="relation-text">' + relation + '</div>';

                spawnConfetti();

                if (correctCount >= 5) {
                    if (level < 10) {
                        level++;
                        correctCount = 0;
                        saveProgress();
                        updateProgress();
                        setTimeout(function () {
                            feedback.innerHTML = '<div class="congrats">Level ' + level + ' Unlocked!</div>';
                            setTimeout(generateNumbers, 1500);
                        }, 1500);
                    } else {
                        setTimeout(function () {
                            feedback.innerHTML = '<div class="congrats">You completed all levels!</div>';
                            spawnConfetti();
                            setTimeout(function () {
                                correctCount = 0;
                                saveProgress();
                                updateProgress();
                                generateNumbers();
                            }, 3000);
                        }, 1500);
                    }
                } else {
                    setTimeout(generateNumbers, 1500);
                }
            } else {
                if (boxEl) {
                    boxEl.classList.add('wrong-pick');
                }
                correctCount = 0;
                saveProgress();
                updateProgress();
                feedback.innerHTML = '<div class="wrong-msg">Try again</div>';
                setTimeout(function () {
                    feedback.innerHTML = '';
                }, 800);
                updateDisplay();
            }
        }

        document.addEventListener('keydown', function (e) {
            if (waitingForNext) return;
            if (e.key >= '0' && e.key <= '9') {
                e.preventDefault();
                var pressedNum = parseInt(e.key);
                var idx = numbers.indexOf(pressedNum);
                if (idx !== -1) {
                    var boxes = document.querySelectorAll('.number-box');
                    selectNumber(pressedNum, boxes[idx]);
                }
            }
        }, true);

        window.addEventListener('load', function () {
            document.body.setAttribute('tabindex', '0');
            document.body.focus();
        });

        document.addEventListener('click', function () {
            document.body.focus();
        });

        document.getElementById('resetBtn').addEventListener('click', resetProgress);

        loadProgress();
        generateNumbers();
    </script>
</body>
</html>
