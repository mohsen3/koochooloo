<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Kiddo Quiz</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- pwa:head -->
  <meta name="theme-color" content="#ea7a3d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Koochooloo">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="../icons/favicon-32.png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
  <!-- /pwa:head -->
</head>
<body>
  <main class="game">
    <button id="settings-toggle" class="settings-btn" type="button" aria-label="Settings">
      <i class="fa-solid fa-gear"></i>
    </button>
    <aside id="settings-panel" class="settings-panel" hidden>
      <div class="settings-panel__section">
        <div class="settings-panel__header">Color Theme</div>
        <div id="theme-list" class="theme-picker" role="radiogroup" aria-label="Color theme"></div>
      </div>
      <div class="settings-panel__section">
        <div class="settings-panel__header">Question Types</div>
        <div class="settings-panel__actions">
          <button id="settings-select-all" type="button">Select all</button>
          <button id="settings-select-none" type="button">Select none</button>
        </div>
        <div id="settings-list" class="settings-panel__list"></div>
      </div>
    </aside>
    <header class="game__header">
      <div>
        <h1>Kiddo Quiz</h1>
        <p class="subtitle">Choose the right answer(s) and level up.</p>
      </div>
      <div class="scoreboard">
        <div class="scoreboard__item">
          <span class="label">Level</span>
          <span id="level">1</span>
        </div>
        <div class="scoreboard__item">
          <span class="label">Correct</span>
          <span id="correct-count">0</span>
        </div>
        <div class="scoreboard__item">
          <span class="label">Incorrect</span>
          <span id="incorrect-count">0</span>
        </div>
      </div>
    </header>

    <section class="card" id="question-card">
      <div class="question__type" id="question-type">Loading...</div>
      <div class="question__body" id="question-body"></div>
      <div class="question__hint" id="question-hint"></div>
    </section>

    <section class="options" id="options"></section>

    <footer class="controls">
      <button id="submit" class="primary">Submit</button>
    </footer>

    <div class="feedback" id="feedback" aria-live="polite"></div>
  </main>

  <script type="module" src="js/main.js"></script>
  <script src="../pwa.js" data-sw="../sw.js" defer></script>
</body>
</html>
